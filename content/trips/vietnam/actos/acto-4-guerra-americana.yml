kicker: Historia de Vietnam · acto cuarto de cinco
title: La guerra que aquí llaman *«americana»*
lead: >-
  Lo primero que descoloca al viajero occidental: en Vietnam aquella guerra se llama **«la guerra
  americana»**, y con lógica — para ellos fue la segunda mitad de treinta años seguidos de guerra
  (1945–1975), primero contra Francia, luego contra Estados Unidos. Ho Chi Minh proclama la
  independencia en Hanoi el 2 de septiembre de 1945 *citando la Declaración de Independencia
  americana*, un detalle que él eligió deliberadamente.
body: |
  Cronología mínima: guerra contra Francia 1946–54; división en 1954 —Norte comunista con capital en
  Hanoi, Sur anticomunista con capital en Saigón—; las elecciones de reunificación previstas para
  1956 nunca se celebraron, porque el régimen del Sur, con respaldo de Washington, sabía que Ho Chi
  Minh las ganaría. En 1964, tras el incidente del golfo de Tonkín, el Congreso de EE.UU. da carta
  blanca a Johnson; en 1965 desembarcan tropas de combate. En su pico, más de medio millón de
  soldados estadounidenses. La ofensiva del Tết (1968) fue derrota militar pero victoria psicológica
  del Norte: convenció a la opinión pública americana de que la guerra no se podía ganar.

  Contada desde ambos lados: para Washington era contención del comunismo —la «teoría del dominó»—;
  para Hanoi era la continuación de mil años de resistencia a potencias extranjeras, **nacionalismo
  antes que ideología**, y esa diferencia de relato explica el desenlace. Para el Sur fue además una
  guerra civil con heridas que aún duelen.

  Hanoi bajo las bombas tuvo su clímax en la **Navidad de 1972**: la operación Linebacker II, once
  días de bombardeo con B-52 sobre Hanoi y Haiphong para forzar la firma de París. La noche del 26 de
  diciembre, la calle Khâm Thiên, densamente residencial, fue arrasada: 287 muertos en una sola
  noche. Los hanoienses derribaron una quincena de B-52 y llaman a aquello «el Điện Biên Phủ del
  aire».

  > Semanas después se firmaron los acuerdos de París; el 30 de abril de 1975 los tanques del Norte
  > entraron en Saigón, y en 1976 el país se reunificó.

  Coste humano: unos 58.000 americanos muertos y, según estimaciones, entre dos y tres millones de
  vietnamitas.
connect:
  label: Lo veréis sobre el terreno
  body: |
    La prisión de **Hỏa Lò** —el «Hanoi Hilton» de los pilotos americanos, antes cárcel colonial
    francesa— muestra el relato oficial del Norte; visitadla sabiendo que es eso: un relato, con sus
    silencios.

    Y en el lago **Hữu Tiệp**, entre las casas del barrio de Ngọc Hà, siguen asomando del agua los
    restos de un **B-52 derribado** — uno de los rincones más extraños de la ciudad.
