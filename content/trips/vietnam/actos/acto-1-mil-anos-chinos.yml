kicker: Historia de Vietnam · acto primero de cinco
title: Los mil años chinos y el nacimiento de la identidad *viet*
lead: >-
  Toda la historia de Vietnam arranca de una paradoja: el país que hoy se define por su resistencia
  a China es, culturalmente, hijo de China. En el año 111 a.C. el imperio Han anexionó el delta del
  río Rojo —el corazón de lo que hoy es el norte de Vietnam— y lo mantuvo, con interrupciones,
  durante más de mil años.
body: |
  De esa larga ocupación vienen los palillos, el confucianismo, el budismo mahayana (que llegó vía
  China, no vía India como en Tailandia), la burocracia de mandarines y buena parte del vocabulario.
  Pero también vino algo más raro: **una identidad forjada *en contra***. El episodio fundacional
  son las **hermanas Trưng**, dos aristócratas que en el año 40 d.C. levantaron en armas el delta
  contra el gobernador Han, se proclamaron reinas y resistieron tres años hasta que el general Ma
  Yuan aplastó la revuelta. Según la tradición, se arrojaron a un río antes que rendirse. Que las
  primeras heroínas nacionales sean dos mujeres montadas en elefantes de guerra dice mucho: en Hanoi
  tienen templo propio (Hai Bà Trưng, «las dos señoras Trưng», que da nombre a un distrito entero) y
  cada ciudad vietnamita tiene una calle con su nombre.

  El final de los mil años chinos es una de las escenas más cinematográficas de la historia militar
  asiática. En 938, el señor viet **Ngô Quyền** esperó a la flota china de los Han del Sur en el
  estuario del río **Bạch Đằng**, cerca de la actual bahía de Halong. Había plantado en el lecho del
  río estacas de madera con puntas de hierro, invisibles con la marea alta. Sus barcas ligeras
  fingieron atacar y retirarse; cuando la marea bajó, los pesados juncos chinos quedaron empalados y
  la flota fue aniquilada. La treta funcionó tan bien que los vietnamitas la repetirían —contra los
  mongoles— 350 años después, en el mismo río.

  Conviene retener la idea que veréis repetida en cada museo: Vietnam no niega la herencia china;
  niega la *sumisión* china.

  > Los vietnamitas tomaron de China las herramientas y las usaron para no ser China.
