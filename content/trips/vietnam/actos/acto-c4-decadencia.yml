title: Decadencia, abandono y el mito del *«descubrimiento»*
lead: >-
  El declive fue lento y multicausal. El budismo **theravada**, humilde y sin necesidad de
  templos-montaña ni de dioses-reyes, se extendió desde el siglo XIII y disolvió la ideología que
  justificaba las grandes obras.
body: |
  Antes incluso, el trono dio un violento bandazo religioso: bajo **Jayavarman VIII** (r. 1243–1295),
  una **reacción hinduista** picó y mutiló **miles de imágenes budistas** del Bayon y de otros templos
  de su predecesor. Cuando el theravada acabó imponiéndose, la maquinaria del dios-rey ya estaba herida
  por dentro.

  La climatología dio la puntilla: los anillos de crecimiento de cipreses centenarios revelan **dos
  megasequías —décadas de 1330-1360 y 1400-1420— intercaladas con monzones violentos** que reventaron
  la red hidráulica justo cuando ya no había estado fuerte para repararla. Súmese la presión militar
  del reino siamés de Ayutthaya (saqueo tradicionalmente fechado en **1431**) y el desplazamiento del
  comercio hacia el mar, y la corte se trasladó a la región de Phnom Penh.

  Pero ojo con la palabra «abandono»:

  > Angkor Wat nunca estuvo perdido. Los monjes theravada lo mantuvieron como santuario vivo y
  > destino de peregrinación durante siglos.

  Cuando el naturalista francés **Henri Mouhot** llegó en 1860 y sus diarios se publicaron
  póstumamente, Europa «descubrió» Angkor — pero misioneros ya lo habían descrito antes, y los
  camboyanos, obviamente, siempre supieron dónde estaba. Lo que sí trajo la época francesa fue la
  arqueología científica: la **École française d'Extrême-Orient** limpió, documentó y aplicó la
  **anastilosis** —desmontar un templo derruido y reconstruirlo con sus propias piedras numeradas—,
  cuyo ejemplo estelar es Banteay Srei. Hoy Angkor es Patrimonio Mundial de la UNESCO desde 1992.
