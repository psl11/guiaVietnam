title: '*Đổi mới*: el Vietnam que vais a ver'
lead: >-
  La posguerra fue miseria: economía colectivizada, aislamiento, guerra con Camboya (Vietnam derrocó
  a los Jemeres Rojos en 1979) y una guerra fronteriza breve y feroz con China ese mismo año —dato
  clave para Hà Giang, que fue zona de frente y estuvo minada durante años—. Al borde de la
  hambruna, el Partido Comunista dio en 1986 el volantazo.
body: |
  Se llama **đổi mới** («renovación»): economía de mercado «con orientación socialista» manteniendo
  el partido único. El resultado es uno de los milagros económicos del último medio siglo: el PIB
  per cápita pasó de unos 400 dólares a rondar los 4.000; el país que importaba arroz es hoy de los
  mayores exportadores mundiales de arroz, café y electrónica.

  El símbolo perfecto es la **moto**: unos 65–70 millones registradas para 100 millones de
  habitantes. La moto es oficina, furgoneta de reparto, coche familiar (veréis cuatro personas y un
  frigorífico en una Honda Wave) y rito de paso.

  > Cruzar una calle de Hanoi es la primera lección cultural: se camina despacio, a ritmo constante,
  > sin frenar ni retroceder, y el enjambre te esquiva.

  Una metáfora bastante honesta del contrato social vietnamita: caos aparente, reglas implícitas. El
  país es joven (edad mediana en torno a 32–33 años): la mayoría de la gente con la que hablaréis no
  había nacido cuando acabó la guerra, y la actitud hacia los extranjeros —incluidos los
  americanos— es de un pragmatismo desconcertante: **la guerra está en los museos, no en la calle**.
  Partido único leninista y capitalismo callejero vibrante: esa contradicción aparente, que en
  Vietnam no se percibe como contradicción, es quizá la clave del país actual.
