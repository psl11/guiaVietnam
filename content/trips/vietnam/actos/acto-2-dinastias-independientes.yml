kicker: Historia de Vietnam · acto segundo de cinco
title: Las dinastías independientes, de Hoa Lư al *Templo de la Literatura*
lead: >-
  Tras Ngô Quyền vino el caos: doce señores de la guerra despedazaron el país. Quien lo reunificó
  fue **Đinh Bộ Lĩnh**, un caudillo criado —dice la leyenda— pastoreando búfalos y jugando a
  batallas con juncos por estandartes. En 968 se proclamó emperador de Đại Cồ Việt («el Gran Viet»)
  e instaló su capital en **Hoa Lư**, un anfiteatro de agujas kársticas en la actual Ninh Bình.
body: |
  La elección no fue estética sino militar: las montañas de piedra caliza eran una muralla natural
  contra la caballería china. **Esto es lo esencial para entender Ninh Bình: ese paisaje que hoy se
  fotografía desde una barca fue elegido como fortaleza.** Los templos gemelos que se visitan en Hoa
  Lư —uno dedicado a la dinastía Đinh, otro a la Lê— son reconstrucciones del siglo XVII sobre los
  palacios originales, pero el emplazamiento es el auténtico.

  En 1010, Lý Công Uẩn, fundador de la dinastía Lý, trasladó la capital al delta: según la crónica,
  vio un dragón dorado alzarse desde el río y llamó al lugar **Thăng Long**, «dragón que asciende».
  Es Hanoi. La dinastía Lý construyó lo que aún se ve: la pagoda del Pilar Único y, sobre todo, el
  **Templo de la Literatura (Văn Miếu, 1070)**, dedicado a Confucio, que desde 1076 albergó la
  primera universidad del país, la Academia Imperial. Sus 82 estelas sobre tortugas de piedra
  registran a los doctores que aprobaron los exámenes imperiales entre 1442 y 1779: es el monumento
  perfecto a la idea confuciana de que se gobierna por mérito examinado, no por cuna.

  La dinastía Trần (1225–1400) protagonizó la gesta suprema: rechazó **tres invasiones mongolas**
  (1258, 1285, 1287–88), cuando los mongoles habían arrasado desde Bagdad hasta Corea. El artífice
  fue el príncipe-general **Trần Hưng Đạo**, que en 1288 repitió en el Bạch Đằng el truco de las
  estacas de Ngô Quyền y destruyó la flota de Kublai Kan. Trần Hưng Đạo es hoy semidiós literal:
  tiene altares donde se le rinde culto. Después, la dinastía Lê posterior (fundada por Lê Lợi en
  1428 tras expulsar a los Ming) dio la edad de oro confuciana — y la leyenda del **lago Hoàn
  Kiếm**: una tortuga divina reclamó a Lê Lợi la espada mágica con la que había vencido, en el mismo
  lago que hoy es el corazón de Hanoi.
connect:
  label: Lo veréis sobre el terreno
  body: |
    **Hoa Lư** (Ninh Bình) es la primera capital: los templos Đinh y Lê, y sobre todo el paisaje
    kárstico elegido como muralla. En Hanoi, el **Templo de la Literatura** y sus estelas sobre
    tortugas, y el **lago Hoàn Kiếm** con el templo Ngọc Sơn — la espada de Lê Lợi, en el centro
    de la ciudad.
