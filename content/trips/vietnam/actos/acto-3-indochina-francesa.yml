title: La Indochina francesa *(1858–1954)*
lead: >-
  Francia atacó Đà Nẵng en 1858 con la excusa de proteger a los misioneros católicos y fue mordiendo
  el país durante tres décadas: la Cochinchina (el sur) como colonia en 1862, Annam y Tonkín como
  protectorados en 1883–84, la Unión Indochina en 1887. Menos de un siglo de dominio —nada comparado
  con el milenio chino— pero transformador.
body: |
  De ahí los bulevares y villas del Barrio Francés de Hanoi, el Teatro de la Ópera (copia en
  miniatura del Garnier de París), el ferrocarril, el café, el pan, y una economía de plantación
  (caucho, arroz, minas) brutalmente extractiva, con monopolios estatales de sal, alcohol y opio que
  financiaban la colonia.

  La herencia más asombrosa es el alfabeto. El **quốc ngữ** («escritura nacional») no lo inventaron
  los franceses del XIX sino misioneros católicos del XVII: sobre trabajos previos de jesuitas
  portugueses como Francisco de Pina, el aviñonés **Alexandre de Rhodes** sistematizó una
  transcripción latina del vietnamita con diacríticos para los tonos y publicó en Roma, en 1651, un
  diccionario vietnamita-portugués-latín. Durante dos siglos fue una rareza de sacristía; la
  administración colonial lo promovió, en parte para cortar el cordón cultural con China. El giro
  irónico: los nacionalistas y comunistas lo adoptaron con entusiasmo porque se aprendía en meses, no
  en años como los caracteres, y lo convirtieron en arma de alfabetización masiva. **Vietnam es hoy
  el único país del Asia sinizada que escribe en alfabeto latino** — por eso podéis leer (aunque no
  pronunciar) cada rótulo.

  El final llegó en **Điện Biên Phủ**, un valle junto a la frontera con Laos donde en 1954 el general
  **Võ Nguyên Giáp** —maestro de historia sin formación militar formal— sitió a la guarnición
  francesa arrastrando artillería desmontada a hombros por las montañas, algo que los franceses
  habían descartado como imposible. Tras 57 días, la guarnición se rindió el 7 de mayo de 1954.

  > Fue la primera vez que un ejército colonial europeo era derrotado en batalla campal por un
  > movimiento de independencia asiático.

  Precipitó los acuerdos de Ginebra: Francia se iba, y el país quedaba dividido «provisionalmente»
  por el paralelo 17.
