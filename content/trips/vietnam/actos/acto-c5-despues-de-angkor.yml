kicker: Historia de Camboya · acto quinto de cinco
title: Después de Angkor — del protectorado al *Año Cero*
lead: >-
  Entre 1431 y el siglo XIX, Camboya vivió comprimida entre dos vecinos expansivos, Siam (Tailandia)
  y Vietnam, perdiendo territorio ante ambos. En 1863 el rey Norodom aceptó el **protectorado
  francés**, que duró 90 años. La independencia llegó pacíficamente en 1953 de la mano de **Norodom
  Sihanouk** —rey, luego príncipe, cineasta, saxofonista—, en los años dorados en que Phnom Penh era
  «la perla de Asia».
body: |
  La guerra de Vietnam lo arrasó todo. Entre 1969 y 1973 el **bombardeo estadounidense** —en parte
  secreto— descargó sobre la Camboya rural más de 2,7 millones de toneladas de bombas buscando
  santuarios del Vietcong; el caos engordó a una guerrilla comunista hasta entonces marginal a la que
  Sihanouk había apodado con desdén *les Khmers rouges*. En 1970, un **golpe pro-americano** derrocó a
  Sihanouk y encumbró al general **Lon Nol**; cinco años de guerra civil empujaron al campesinado hacia
  la guerrilla, que acabó ganando la guerra: los **jemeres rojos entraron en Phnom Penh el 17 de abril
  de 1975**.

  Lo que siguió no tiene paralelo: el intento más radical de la historia de reinventar una sociedad
  desde cero. Pol Pot y el «Angkar» vaciaron las ciudades en días, abolieron el dinero, la escuela, la
  religión, la familia y hasta el calendario («Año Cero»), y convirtieron el país en un campo de
  trabajo agrario. Se ejecutó sistemáticamente a intelectuales, monjes, minorías y a cualquiera con
  gafas o manos suaves; el resto murió de hambre y agotamiento.

  > En tres años, ocho meses y veinte días murieron en torno a **1,7 millones de personas —entre el
  > 21 y el 25 % de la población**.

  En enero de **1979 Vietnam invadió y derrocó** a los jemeres rojos —que, pese a todo, **conservaron
  el asiento de Camboya en la ONU hasta 1990**, con el respaldo de Occidente y China: una de las
  vergüenzas de la Guerra Fría—. Los Acuerdos de París (1991) y la administración de la ONU trajeron
  elecciones en 1993 y la monarquía restaurada. Desde 1985 gobernó **Hun Sen**, ex jemer rojo desertor;
  en 2023 traspasó el cargo a su hijo Hun Manet. Pol Pot murió sin juicio en 1998; un tribunal mixto
  ONU-Camboya (**ECCC**) juzgó a un puñado de altos dirigentes, con la última condena en **2022**.
connect:
  label: Cómo mirarlo — y cómo hablarlo
  body: |
    Veréis las huellas sin buscarlas: una **pirámide de edad amputada** —Camboya es visiblemente
    joven, con una llamativa ausencia de ancianos, una generación entera sin abuelos— y, en Siem
    Reap, los memoriales de Wat Thmey.

    **Cómo hablarlo (o no):** no saquéis el tema. Si un camboyano lo saca —pasa más de lo que se
    espera, sobre todo con los guías, que a menudo cuentan la historia de su propia familia—,
    escuchad con respeto y dejad que la otra persona marque el límite. Evitad preguntar «¿qué le pasó
    a tu familia?» a desconocidos y cualquier comentario sobre política actual. Y dos gestos que se
    agradecen: no regatear con crueldad a supervivientes de minas, y no tratar los memoriales como
    atracciones fotográficas.
