title: El gran giro — *1177* y el rey budista
lead: >-
  En 1177 una flota del reino cham (el actual Vietnam central) remontó el Tonle Sap por sorpresa y
  **saqueó Angkor**, matando al rey. Del trauma emergió el personaje más fascinante de esta historia:
  **Jayavarman VII** (r. 1181–~1218), que expulsó a los cham y que rompió con ocho siglos de
  hinduismo de estado para abrazar el **budismo mahayana**.
body: |
  Ya no se construía para un dios lejano, sino desde la compasión —aunque también, sin duda, para la
  propaganda—. Su programa constructor no tiene paralelo en la historia jemer: la ciudad amurallada
  de **Angkor Thom** con el **Bayon** en su centro exacto, **Ta Prohm** (dedicado a su madre),
  **Preah Khan** (a su padre), **102 hospitales** repartidos por el imperio, 121 casas de descanso y
  calzadas elevadas con puentes de piedra.

  > Sus inscripciones dicen: «El dolor del pueblo era el dolor del rey, más que el suyo propio».

  Tras él, el imperio nunca volvió a construir en piedra a esa escala; algunos historiadores creen
  que, literalmente, lo agotó.
connect:
  label: Lo veréis sobre el terreno
  body: |
    Casi todo el segundo día de Angkor es Jayavarman VII: el **Bayon** de las caras, **Ta Prohm**
    devorado por las higueras, **Preah Khan**. Reconoceréis su época por las torres-rostro y por los
    budas raspados a cincel por la reacción hinduista posterior.
