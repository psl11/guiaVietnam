kicker: Historia de Camboya · acto segundo de cinco
title: El apogeo hidráulico — la ciudad más grande del mundo *preindustrial*
lead: >-
  Angkor no fue solo templos: fue una gigantesca máquina de agua. Los reyes excavaron embalses
  colosales llamados **barays** —el Baray Occidental mide 8 × 2,1 km y aún tiene agua— conectados a
  canales, diques y arrozales. El agua tenía doble función: religiosa (recrear el océano cósmico) y
  práctica (regular el caótico monzón para asegurar dos o tres cosechas de arroz al año).
body: |
  Ese excedente de arroz alimentó a un aparato estatal descomunal. Durante décadas se discutió cuánta
  gente vivía allí; la respuesta llegó desde el aire: las campañas de **LIDAR de 2012 y 2015**,
  dirigidas por el arqueólogo Damian Evans, dispararon pulsos láser desde helicópteros que «borraron»
  la selva digitalmente y revelaron más de 20.000 estructuras ocultas —calles, estanques domésticos,
  terrazas de viviendas—, demostrando que los templos eran solo el corazón ceremonial de una inmensa
  ciudad dispersa.

  > Un estudio de 2021 estimó entre **700.000 y 900.000 habitantes** en el Gran Angkor: la mayor
  > aglomeración urbana del planeta preindustrial, comparable en extensión al Berlín actual.

  En este acto reina **Suryavarman II** (r. ~1113–1150), guerrero expansivo y devoto de Vishnu, que
  dedicó su reinado a levantar **Angkor Wat**, el mayor monumento religioso jamás construido: se
  calcula que empleó entre 5 y 10 millones de bloques de arenisca traídos en balsas desde Kulen.
connect:
  label: Lo veréis sobre el terreno
  body: |
    El **Baray Occidental** aún tiene agua ocho siglos después. Y **Angkor Wat** es este acto entero
    en una sola mole: cuando crucéis su calzada sobre el foso, estáis cruzando el océano cósmico
    hacia la montaña del rey-dios.
