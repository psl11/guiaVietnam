title: Orígenes — Funan, Chenla y el rey que se proclamó *dios*
lead: >-
  Mucho antes de Angkor, el delta del Mekong ya comerciaba con Roma y con China. Los anales chinos
  llaman *Funan* (siglos I–VI) a ese primer reino indianizado del sudeste asiático: puertos como Oc
  Eo, brahmanes llegados de la India, sánscrito en las cortes, dioses hindúes injertados sobre cultos
  locales de la tierra y el agua.
body: |
  A Funan lo sucede *Chenla* (siglos VI–VIII), un mosaico de principados jemeres río arriba, que los
  chinos dividían en «Chenla de tierra» y «Chenla de agua». La fecha fundacional que hay que retener
  es **802**: ese año, según una inscripción posterior, un príncipe llamado **Jayavarman II** celebró
  un ritual en la montaña sagrada de **Phnom Kulen**, a 40 km de la actual Siem Reap, en el que se
  proclamó *chakravartin* (monarca universal) e instauró el culto del **devarāja** —literalmente «el
  dios que es rey»—, vinculando para siempre la legitimidad del monarca jemer con Shiva y con una
  montaña.

  > Toda la arquitectura que vais a ver deriva de esa idea: el rey construye una montaña de piedra
  > porque él mismo es el eje del cosmos.

  Kulen, por cierto, se puede visitar: allí están los mil lingas tallados en el lecho del río que
  «carga» de santidad el agua que baja hacia Angkor.
