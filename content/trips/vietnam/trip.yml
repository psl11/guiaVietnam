slug: vietnam
eyebrow: Vietnam y Camboya · 2026
title: Del *río Rojo* a los templos de Angkor
heroMeta: 11 — 26 de septiembre de 2026
lede: >-
  Dieciséis días de Hanoi al altiplano del norte y de vuelta, con un salto final a los templos de
  Angkor. La guía va en dos tiempos: primero **el plan** —qué hacer cada día, dónde dormir, qué
  reservar—; después, **el porqué** —la cultura y la historia que dan sentido a cada parada.
rationale: |
  Vietnam mide mil seiscientos kilómetros de punta a punta: son casi tres países en uno, y dieciséis
  días —cinco de ellos ya en Camboya— no alcanzan para verlo, sino para **elegir bien una rebanada**.
  Este itinerario renuncia al clásico «Hanói–Hoi An–Saigón» de los primerizos —amplio, plano y por los
  sitios más trillados— y apuesta por lo contrario: **profundidad en un solo Vietnam**, el del norte
  hondo, cosido a los templos de [Angkor](#angkor), que son el techo de toda la civilización de la
  región.

  Por eso el eje es el **norte**: la densidad de Hanói, el karst brotando de los arrozales de Ninh Bình
  y, sobre todo, las montañas de **[Hà Giang](#el-loop)** — que no son un premio de consolación por
  saltarse Sapa, sino su versión mejor. Sapa es hoy lo que Hà Giang todavía no: teleférico, hoteles de
  hormigón y autobuses de excursión. Ir allí sería cambiar a peor. Aquí se cruza el paso de Mã Pí Lèng
  sobre la moto y se madruga para el mercado de Mèo Vạc — la montaña del norte sin decorado.

  Y lo que queda fuera, queda fuera con motivo, no por descuido. **Saigón y el sur** son otro Vietnam
  —tropical, comercial, el delta del Mekong, la guerra contada desde el otro lado— y piden un viaje
  propio; además, aquí esa guerra ya se cuenta a fondo desde el norte. **Hoi An**, la única ausencia
  que de verdad escuece a un fotógrafo, cae de lleno en la **temporada de tifones e inundaciones del
  centro** justo en estas fechas: son las propias lluvias de septiembre las que la desaconsejan, antes
  aún que los setecientos kilómetros de por medio. Este no es el viaje que lo ve todo; es el que ve
  **un Vietnam entero**.
