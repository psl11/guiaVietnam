slug: vietnam
eyebrow: Vietnam · el contexto
title: Para *entender* lo que veis, no para tacharlo
heroMeta: 11 — 26 de septiembre de 2026
lede: >-
  Esta parte no es un listado de sitios: es el trasfondo que convierte una carretera de montaña
  en mil años de resistencia, y tres días de piedras en tres días de significado. Se lee *antes*
  de cada tramo. Aquí conviven dos tipos de ficha: las que se leen del tirón, como un capítulo, y
  las que se consultan de un vistazo antes de una visita.
