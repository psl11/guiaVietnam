slug: vietnam
eyebrow: Vietnam y Camboya · 2026
title: Del *río Rojo* a los templos de Angkor
heroMeta: 11 — 26 de septiembre de 2026
lede: >-
  Dieciséis días de Hanoi al altiplano del norte y de vuelta, con un salto final a los templos de
  Angkor. La guía va en dos tiempos: primero **el plan** —qué hacer cada día, dónde dormir, qué
  reservar—; después, **el porqué** —la cultura y la historia que dan sentido a cada parada.
