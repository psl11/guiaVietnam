epithet: >-
  El gran paso de montaña sobre el cañón del Nho Quế: los 23 km tallados en el flanco de la caliza
  entre Đồng Văn y Mèo Vạc. No se viene a Hà Giang a ver el karst — se viene a atravesarlo, y se
  atraviesa aquí.
sections:
  - heading: El rey de los pasos
    body: |
      El **paso de Mã Pí Lèng** son los **23 km** que van de **Đồng Văn** a **Mèo Vạc** tallados en
      el flanco del cañón, con el **Nho Quế** verde jade **800 metros** más abajo. Es el punto
      culminante del **Geoparque Global UNESCO de Đồng Văn** —2.350 km² de caliza que guardan 550
      millones de años de historia terrestre— y la «herida maestra» de todo el karst del altiplano.
      Desde el paso, el río es una raya turquesa en el fondo del abismo.
  - heading: La Carretera de la Felicidad
    body: |
      Mã Pí Lèng es el tramo más bravo de la **«Carretera de la Felicidad» (Đường Hạnh Phúc)**, la
      vía que entre **1959 y 1965** unió por fin este altiplano remoto con el resto del país — el
      nombre se lo puso el propio **Hồ Chí Minh**. La abrieron **a mano** más de **1.300 jóvenes
      voluntarios** (thanh niên xung phong) y un millar de vecinos de las etnias del altiplano: cerca
      de **dos millones de jornadas** de trabajo picando casi tres millones de metros cúbicos de roca,
      con el tramo de Mã Pí Lèng tallado **colgando de cuerdas sobre el vacío del cañón**. **Catorce
      murieron** abriéndola. El nombre no tiene una gota de ironía; que hoy crucéis el paso en moto en
      una mañana es el reverso de aquel esfuerzo.
  - heading: Desde una ventanilla o desde la moto
    body: |
      Sobre todo, **es el motivo mismo del loop**. Desde una ventanilla, Mã Pí Lèng es una postal;
      **en la moto es la experiencia**. El mirador del **Skywalk** es el punto más caliente de todo
      el recorrido —diez motos parando a la vez donde toca—, y la ventaja de vuestro easy rider
      privado es precisamente esquivarlo: parar **donde está la luz, no donde toca**, y buscar
      vuestro propio recodo del paso.
curiosidades:
  - >-
    El paso corta a través del **primer Geoparque Global UNESCO de Vietnam**: 2.350 km² de caliza con
    **550 millones de años** de historia terrestre, huellas de dos extinciones masivas y fósiles
    marinos de cuando todo esto era fondo del mar.
  - >-
    «**Desde una ventanilla es una postal; en la moto es la experiencia**» — la frase que resume por
    qué el loop se hace en moto y no en coche, y por qué merece cada curva.
  - >-
    El **Skywalk** es el rincón más masificado del loop; teniendo moto, la jugada es saltárselo y
    buscar un recodo propio del paso donde parar cuando la luz acompañe.
