title: El loop de Hà Giang
epithet: >-
  No es una excursión de un día: son **cinco jornadas en moto** dando la vuelta al altiplano kárstico
  de *Đồng Văn*, en el extremo norte de Vietnam, pegados a la frontera china. No se viene a *ver* el
  karst — se viene a *atravesarlo*.
sections:
  - heading: Qué es, exactamente
    body: |
      El loop es una **ruta circular de unos 350-384 km** que sale y vuelve a la ciudad de **Hà Giang**,
      trepando desde el valle al altiplano de Đồng Văn y bajando por el gran cañón. Y una aclaración que
      lo cambia todo: **vosotros no conducís**. Vais detrás de un **easy rider**, el piloto local que
      hace de conductor *y* de guía durante los cinco días — una plaza cada uno, a vuestro ritmo (el
      formato lo decide [la ficha de inversión](#loop-ha-giang): privado, no jeep, no grupo de diez
      motos). Estáis en la provincia más montañosa y remota del país, donde **los kinh —el 85 % de
      Vietnam— son minoría** y mandan las etnias de montaña. Como el trazado roza la frontera, hace
      falta un **permiso de zona fronteriza** que tramita el operador; el pasaporte, siempre encima.
  - heading: Por qué se hace
    body: |
      Por dos cosas, y ninguna es el arroz. La primera, **el paisaje más espectacular de Vietnam**:
      pináculos grises hasta el horizonte, el cañón del **Nho Quế** verde jade y, como plato fuerte, el
      paso de **Mã Pí Lèng** tallado en el flanco de la garganta con el río **800 metros más abajo**. La
      segunda, **las minorías viviendo su vida** —hmong, dao, lô lô, tày— en sus aldeas y sus mercados,
      no en un espectáculo montado para el visitante. Y todo converge en Mã Pí Lèng, que es **el motivo
      mismo del loop**: desde la ventanilla de un coche es una postal; en la moto, con el vacío a un
      palmo, es *la experiencia*. Por eso no se va a Hà Giang a ver el karst — se va a cruzarlo.
  - heading: El arco de los cinco días
    body: |
      El círculo se recorre por etapas, cada una con su hito: **Quản Bạ** (la Puerta del Cielo y las
      montañas gemelas) → **Yên Minh** (pinares y la aldea del índigo de Lũng Tám) → **Đồng Văn** (el
      valle de Sủng Là, el palacio del rey hmong de Sà Phìn y la torre de Lũng Cú, el punto más al norte
      del país) → **Mã Pí Lèng** y la barca por el cañón del Nho Quế → **Mèo Vạc** → y de vuelta a Hà
      Giang cerrando el aro. ¿Por qué cinco días y no cuatro? Por **una sola mañana**: el gran mercado
      dominical de Mèo Vạc, que *solo* es el domingo. Todo el formato de 5 días / 4 noches existe para
      amanecer allí ese día — pedir el estándar «4D/3N» os devolvería el sábado y os dejaría sin él.
curiosidades:
  - >-
    Los cinco días se montan alrededor de **una mañana**: el mercado dominical de Mèo Vạc, que solo cae
    en domingo. Es el latido social del altiplano una vez por semana, y por eso el loop es 5D/4N y no el
    «4D/3N» de catálogo.
  - >-
    El loop se elige por el **karst y el cañón, no por el arroz**: la meseta de Đồng Văn es paisaje
    kárstico *mineral* —roca gris, maíz entre piedras—, no las terrazas doradas de postal (esas están en
    Hoàng Su Phì, fuera del loop, y no caben sin sacrificar Ninh Bình).
  - >-
    En temporada alta entran unos **3.000 motoristas extranjeros a la semana**, pero septiembre no es
    pico: entre semana el altiplano está razonablemente calmado. Los puntos que sí se masifican son
    contados — el Skywalk de Mã Pí Lèng, la torre de Lũng Cú y la Puerta del Cielo a la hora dorada.
