title: La Hanoi del cine, los libros y la guerra
epithet: >-
  Para *entender, no tachar*: lo que conviene leer y ver antes de pisar la ciudad, y los rincones
  donde esos relatos siguen en pie sobre el terreno.
sections:
  - heading: Graham Greene y *El americano impasible*
    body: |
      Greene se alojó en el **Metropole** en 1951 como corresponsal y gestó allí
      [*El americano impasible*](https://www.goodreads.com/book/show/3698.The_Quiet_American) — la
      profecía de la intervención americana escrita antes de que ocurriera. La
      [**película de 2002**](https://www.filmaffinity.com/es/film920187.html) (Michael Caine) sí se
      rodó en Vietnam: la calle **Hàng Mã**, el propio Metropole, Ninh Bình y
      Hoi An. La peregrinación completa: un martini en el **Bamboo Bar** + un paseo por Hàng Mã.
  - heading: Los libros — la guerra por dentro
    body: |
      - [***El dolor de la guerra***](https://www.goodreads.com/book/show/780889.The_Sorrow_of_War)
        (Bảo Ninh, 1991) — **la obra cumbre de la literatura vietnamita contemporánea**: descarnada,
        poética y autobiográfica, la guerra vista por un soldado del Norte. Se publicó *contra* la
        voluntad del gobierno por su tono nada heroico; hoy es un clásico mundial.
      - [***Las montañas cantan***](https://www.goodreads.com/book/show/49631287-the-mountains-sing)
        (Nguyễn Phan Quế Mai, 2020) — cuatro generaciones de una familia atravesando el siglo XX
        vietnamita: hambruna, reforma agraria, guerra. Lírica y desgarradora, escrita en inglés por
        una de las grandes voces actuales del país.
      - [***The Sympathizer***](https://www.goodreads.com/book/show/23168277-the-sympathizer) (Viet
        Thanh Nguyen, premio Pulitzer;
        [serie HBO 2024](https://www.filmaffinity.com/es/film600948.html) de Park Chan-wook): la guerra
        desde un espía comunista infiltrado. Vietnam denegó los permisos y se rodó fuera — nada que ver
        aquí, pero leedla igualmente.
  - heading: El cine — y un documental que lo cambia todo
    body: |
      - [***En pleno verano***](https://www.filmaffinity.com/es/film452907.html) (Trần Anh Hùng, 2000)
        — **rodada en Hanoi**: tres hermanas, la ciudad en verano, una luz líquida. El retrato más
        bello de la vida hanoiense, del director vietnamita de referencia.
      - [***El olor de la papaya verde***](https://www.filmaffinity.com/es/film355393.html) (Trần Anh
        Hùng, 1993) — Caméra d'Or en Cannes y candidata al Óscar. Un país entero contado con el mimo de
        una cocina y un jardín.
      - [***Indochine***](https://www.filmaffinity.com/es/film105392.html) (1992, Catherine Deneuve) —
        la epopeya colonial, rodada en Halong, Ninh Bình y Hué: **pisaréis sus escenarios**.
      - [***La guerra de Vietnam***](https://www.filmaffinity.com/es/film240310.html) (Ken Burns y Lynn
        Novick, 2017) — diez capítulos, diecisiete horas y —lo que la salva de ser otra mirada
        americana— **decenas de entrevistas a vietnamitas de los dos bandos**. El «para entender»
        definitivo.
      - Y el canon que *no* es Vietnam:
        [*Apocalypse Now*](https://www.filmaffinity.com/es/film701892.html), *Platoon*, *La chaqueta
        metálica*. Cine mayúsculo, pero rodado en Filipinas y contado desde la fiebre americana — la
        guerra como su trauma, no como país.
  - heading: Para abrir boca — documentales sin deberes
    body: |
      Y para quien no quiera empezar por la guerra, el otro Vietnam entra por la mesa y sin esfuerzo —
      los tres en Netflix:
      - [***Street Food: Asia***](https://www.filmaffinity.com/es/film933486.html) (2019) — el
        **episodio 7, «Ho Chi Minh City»**: la señora **Trước** perfeccionando durante décadas sus
        caracoles (**ốc**) y el **cơm tấm** (arroz roto) nacido de la escasez de los ochenta. Es Saigón,
        pero esa cultura de taburete en la acera es de todo el país.
      - [***Somebody Feed Phil***](https://www.filmaffinity.com/es/film528696.html) — el episodio
        **«Saigon» (T1E2)**: Phil Rosenthal, el más amable de los presentadores, con phở, bánh mì, bò lá
        lốt, los tallos de loto y el café de verdad. Vuestro **Stanley Tucci**, pero en Vietnam: cálido,
        curioso, cero postureo.
      - [***Anthony Bourdain: Parts Unknown***](https://www.filmaffinity.com/es/film661179.html) — el
        episodio de **Hanói (T8E1, 2016)**: la cena de **6 dólares con Obama** en [**Bún Chả Hương
        Liên**](#bun-cha-huong-lien), que sí pisaréis. El «documental de preparación» perfecto para
        vuestro perfil.
  - heading: El legado colonial, a la vista
    body: |
      La **Ópera** (1911, copia en miniatura del Garnier), la **catedral de San José** (1886, sobre el
      solar de una pagoda), el **puente Long Biên** (1902), las villas del barrio francés, el Palacio
      Presidencial (antigua residencia del Gobernador General). Francia duró menos de un siglo, pero
      la firmó en piedra.
  - heading: La Hanoi de la guerra
    body: |
      El **memorial de la captura de John McCain** en la orilla del lago **Trúc Bạch** —un relieve de
      1985 que marca dónde cayó su avión el 26 de octubre de 1967, hoy casi un monumento a la
      reconciliación—; la prisión de **Hỏa Lò**; el **búnker antiaéreo del Metropole** (donde Joan
      Baez grabó bajo las bombas de la Navidad del 72); y los restos del **B-52** que aún asoman del
      agua en el lago Hữu Tiệp, entre las casas del barrio de Ngọc Hà.
  - heading: '*El dolor de la guerra*, sobre el terreno'
    body: |
      Si leéis a **Bảo Ninh** antes de venir —y merece la pena—, estos rincones dejan de ser paradas y
      se vuelven páginas. El **B-52 hundido en el lago Hữu Tiệp** y el **búnker del Metropole** son el
      Hanoi bombardeado que respira la novela: las sirenas, los refugios, las evacuaciones bajo las
      bombas. Se queda pegada a la ciudad la escena en que **Kiên**, de permiso antes de partir al
      frente, cruza Hanoi buscando a **Phương** mientras aúlla la alarma antiaérea y evacúan su
      universidad —y pierden el tren entre la risa y el terror—. Y el libro arranca con Kiên recogiendo
      **restos de caídos** en el «Bosque de las Almas que Gritan»: después de leerlo, el culto
      vietnamita a los muertos que veréis en cada altar se lee de otra manera.
curiosidades:
  - >-
    Graham Greene escribió *El americano impasible* en el Metropole en 1951: **la profecía de la
    intervención estadounidense, años antes de que ocurriera**.
  - >-
    En el lago **Hữu Tiệp**, entre las casas del barrio de Ngọc Hà, siguen asomando del agua **los
    restos de un B-52 derribado** en la Navidad de 1972.
  - >-
    El memorial de la captura de John **McCain**, junto al lago Trúc Bạch, marca dónde cayó su avión
    en 1967 — y hoy funciona casi como un monumento a la reconciliación.
