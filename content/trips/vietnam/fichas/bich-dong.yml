epithet: >-
  «La segunda cueva más bella bajo el cielo del sur», la bautizó el mandarín que le puso nombre: tres
  templos que trepan la montaña por dentro de una gruta, el *tam giáo* hecho arquitectura.
sections:
  - heading: Tres templos que trepan la roca
    body: |
      Bích Động —«gruta de jade»— es el mejor ejemplo de una especialidad de Ninh Bình: la **pagoda
      en cueva**. **Tres templetes escalonados** —bajo, medio y alto— trepan la pared de la montaña,
      unidos por escaleras de piedra que se meten **por dentro de una gruta**; el del medio queda
      encajado en la mismísima boca de la cueva, con los altares budistas en penumbra. Se recorre
      entero en **tres cuartos de hora, y es gratis**.
  - heading: El tam giáo hecho piedra
    body: |
      ¿Por qué meter un templo dentro de una montaña? Porque la montaña **ya era sagrada** antes de
      que llegara el budismo, y este se limitó a instalarse en ella: es la lógica del *tam giáo* —las
      tres enseñanzas conviviendo— hecha arquitectura. Subir del templete bajo al alto es atravesar
      esa idea en pequeño, de la roca desnuda al altar, sin una línea que separe lo uno de lo otro.
  - heading: A rueda desde Tam Cốc, al caer la tarde
    body: |
      Se llega en **bicicleta** desde Tam Cốc —cinco o diez minutos entre arrozales—, y es el mejor
      plan para la **última hora del día**: cuando el calor de Ninh Bình afloja y el sol cae de oro
      sobre el campo. Como el conjunto **mira al poniente**, la postal y el termómetro coinciden en la
      misma hora.
curiosidades:
  - >-
    **Am Tien, la cueva de al lado**: cuenta la tradición que la corte de Hoa Lư guardaba allí su foso
    de ejecuciones —con tigres— para los condenados.
  - >-
    **La fundaron dos monjes en el siglo XV**: la tradición la data en 1428, con ampliaciones del
    XVIII — seis siglos de gente subiendo a rezar por dentro de la montaña.
  - >-
    **El templo del medio está metido en la boca de la gruta**: para ver sus altares budistas, en
    penumbra, hay que entrar literalmente en la roca.
