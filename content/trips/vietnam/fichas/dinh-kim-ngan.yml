kicker: Vietnam · la casa comunal
title: El Đình Kim Ngân
epithet: >-
  La casa comunal del gremio de plateros de Hàng Bạc: ni pagoda ni vivienda, sino el «ayuntamiento
  sagrado» de un oficio que labra la plata desde el siglo XV —restaurado, visitable y, tres noches por
  semana, sala de canto de cámara.
sections:
  - heading: "Ni pagoda ni templo: un đình"
    body: |
      Vietnam distingue tres edificios sagrados fáciles de confundir: la **chùa** (pagoda budista), el
      **đền** (templo de espíritus y héroes) y el **đình**, la **casa comunal**. El đình es el más civil
      de los tres: allí **reside el espíritu tutelar** del lugar y allí se reunía la asamblea vecinal —a
      la vez santuario y ayuntamiento, el corazón de cada pueblo del Vietnam rural. Lo insólito del Kim
      Ngân es encontrar uno **en plena ciudad**, sirviendo no a un pueblo sino a un **gremio**.
  - heading: El đình de los plateros
    body: |
      Está en **Hàng Bạc**, la calle de la plata, donde se funde y se labra metal precioso **desde el
      siglo XV**. El Đình Kim Ngân era la casa comunal de esa cofradía de **plateros y orfebres**: donde
      el oficio se reunía, rendía cuentas y honraba al **espíritu patrón** de su arte. Restaurado y hoy
      visitable, es la ventana más directa que queda en pie al **Hanoi gremial** —el de las «36
      calles»—: no la calle vista desde fuera, sino la institución que la ordenaba por dentro.
  - heading: De día, casa comunal; de noche, concierto
    body: |
      El mismo patio que de día se recorre en silencio se convierte, **tres noches por semana**, en
      escenario: el **Ca Trù Hanoi Club** canta aquí **ca trù**, el canto de cámara que la UNESCO
      declaró patrimonio *en peligro*, ante veinte o cuarenta personas (**miércoles, viernes y domingo
      a las 20:00**, entrada **~200.000 VND**). Recorrer la calle de los plateros de día y volver de
      noche a oír cantar en su casa comunal es ver el mismo edificio en sus dos vidas.
curiosidades:
  - >-
    El **ca trù** que suena aquí figura en la lista de la UNESCO de patrimonio **en peligro**: música
    minoritaria, de veinte oyentes, que estuvo a punto de extinguirse. Escucharla en la casa del gremio
    de plateros es doblemente raro.
  - >-
    El calendario del viaje ayuda: el đình solo canta **miércoles, viernes y domingo**, y el **domingo
    13** hay sesión —justo la noche en que estaréis en Hanoi.
