title: El mercado dominical de Mèo Vạc
epithet: >-
  El gran chợ phiên semanal, el latido social del altiplano: una vez por semana, hmong, dao y lô lô
  bajan a pie con el traje bueno. Solo es el domingo — y por eso el loop dura cinco días y no cuatro.
sections:
  - heading: El chợ phiên
    body: |
      El **mercado dominical de Mèo Vạc** es el gran **chợ phiên** semanal, y no es un sitio donde
      comprar: es **el acontecimiento social de la semana**. **Hmong, dao y lô lô** bajan a pie
      durante horas desde las aldeas con el traje bueno. Hay **mercado de ganado** —búfalos que
      cambian de dueño—, montañas de **thổ cẩm** (el brocado de las minorías, la palabra que buscar
      para comprar lo auténtico), **rượu ngô** (licor de maíz), **barberos al aire libre**… y ese
      trasiego que en el fondo es otra cosa: los mayores se ponen al día, los jóvenes se miran.
  - heading: Por qué el loop dura cinco días
    body: |
      El mercado **solo** es el domingo por la mañana temprano: arranca hacia las **05:00**, llega a
      su pico entre las **07:00 y las 09:30** y hacia las diez u once se ha disuelto. Por eso vuestro
      loop es de **cinco días y no de cuatro**: el formato estándar «4D/3N» os devolvería el sábado y
      os dejaría sin esto. Dormir en Mèo Vạc en vez de retroceder a Đồng Văn es lo que os pone, al
      amanecer del domingo, en la puerta del mayor y más auténtico de los mercados de la zona —con
      ganado y menos turistas que el de Đồng Văn.
  - heading: El fotógrafo, con permiso
    body: |
      Aquí la ética **es** la ventana. **Pedir permiso siempre** (gesto de cámara y sonrisa basta) y
      aceptar el no; y, sobre todo, **comprar algo antes de pedir la foto** —la mejor manera de
      «pagar» un retrato es dejar el dinero en la artesanía de quien la hace—. Es un mercado local,
      no turístico: el regateo es suave y nada de esto está puesto para vosotros. Luz rasante de
      primera hora y gentío en su punto; a las once ya no hay mercado.
curiosidades:
  - >-
    El mercado **solo** existe el domingo temprano: pedir el loop estándar «4D/3N» en vez del «5D/4N»
    os lo haría perder por un solo día — uno de los hallazgos del viaje al norte.
  - >-
    De esa mirada entre jóvenes en el mercado nació la institución más bella de estos valles, el
    **mercado del amor de Khâu Vai** (una vez al año, desde 1919): el día en que antiguos enamorados,
    hoy casados con otros, pueden reencontrarse sin que nadie se ofenda. El domingo de Mèo Vạc es su
    versión de cada semana.
  - >-
    La regla del fotógrafo aquí: **comprar antes de fotografiar**. Un textil de thổ cẩm comprado a
    quien lo teje vale más que cualquier propina, y convierte el retrato en un trato entre iguales.
