title: El Teatro Thăng Long
epithet: >-
  El *múa rối nước* —marionetas de agua— es un arte de aldea nacido hace mil años en los arrozales del
  delta. Es turístico *por definición*, pero no es una trampa: es la forma realista de ver vivo un arte
  milenario, y el Thăng Long es su casa histórica.
sections:
  - heading: Un arte nacido en el arrozal
    body: |
      El **múa rối nước** nació hace un milenio en los **arrozales inundados del delta del río Rojo**: los
      titiriteros, ocultos tras una cortina y **metidos hasta la cintura en el agua**, manejan con varas
      largas por debajo de la superficie unas **marionetas de madera lacada** que bailan sobre una piscina,
      entre **dragones que escupen fuego y campesinos que plantan arroz**. El campo del delta hecho teatro,
      sobre el agua.
  - heading: El Thăng Long, junto al lago
    body: |
      El **Teatro Thăng Long** (**57 Đinh Tiên Hoàng**, a un paso del lago **Hoàn Kiếm**) es el histórico y
      sigue siendo digno. La función dura **50 minutos** con **orquesta en vivo**, y el **đàn bầu** —la
      cítara de una sola cuerda— lleva la melodía. Hay **sesiones múltiples cada tarde**; conviene
      **reservar**. Precio orientativo, unos 100.000–200.000 VND.
  - heading: Cómo verlo bien
    body: |
      No lo penséis como alta cultura, sino como lo que es: un arte de pueblo llevado al escenario para que
      un extranjero pueda verlo sin vadear un arrozal. Con esa expectativa, no decepciona. Para el fotógrafo,
      **las filas delanteras, en los laterales**, dan el mejor ángulo sobre el agua y los reflejos. Y es,
      además, el plan de noche que **nunca falla** cuando el cuerpo del primer día pide algo cómodo y con
      asiento.
curiosidades:
  - >-
    Los titiriteros manejan las figuras **metidos hasta la cintura en el agua**, ocultos tras una cortina,
    con varas largas escondidas bajo la superficie: el escenario es una piscina y el telón, el agua.
  - >-
    La música no está grabada: una **orquesta en vivo** toca junto a la piscina, con el **đàn bầu** —la
    cítara de una sola cuerda— llevando la melodía mientras las marionetas bailan sobre el agua.
  - >-
    Es **turístico por definición** (un arte de aldea llevado a teatro) y aun así **no es una trampa**: es,
    sencillamente, la única manera realista de ver vivo un espectáculo de mil años.
