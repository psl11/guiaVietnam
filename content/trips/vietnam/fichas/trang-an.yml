title: Tràng An en barca
epithet: >-
  Ante los dos embarcaderos de Ninh Bình, elegid este: Tràng An no os pasea *ante* el karst, os mete
  *por dentro* —cuevas inundadas y templos entre farallones—, y en septiembre es el más verde, el más
  salvaje y el de menos gente.
sections:
  - heading: Remar por dentro de la montaña
    body: |
      Aquí no se contempla el karst desde fuera: se entra en él. Del embarcadero salen **tres rutas
      oficiales** —entre **dos horas y media y tres y media** sobre el agua, unos **250.000 VND
      (≈9 €)**— que se cuelan por **cuevas inundadas larguísimas** (una supera el kilómetro, agachando
      la cabeza bajo la roca) y desembocan en valles cerrados con **templos asomados al agua**. La
      **ruta 3** es la de las cuevas y los escenarios de *Kong*, algo menos concurrida; la 2, la más
      equilibrada. Y un lujo raro en el norte: **política estricta de no-venta**, cero acoso a bordo.
  - heading: El sello mixto de la UNESCO
    body: |
      Lo que se navega es, desde **2014**, **patrimonio mixto de la UNESCO —natural y cultural a la
      vez—**, el primero y único del sudeste asiático. Doble mérito: un **karst de torres tropical**
      de manual —valles cerrados, ríos que se cuelan bajo la piedra— y cuevas con **más de 30.000
      años** de huella humana, con la primera capital del país, **Hoa Lư**, incluida en el mismo
      recinto. (El porqué histórico está en la ficha de *Ninh Bình*.)
  - heading: Tràng An o Tam Cốc
    body: |
      Ninh Bình tiene dos embarcaderos y conviene no confundirlos. **Tam Cốc** es más corto —hora y
      media larga— y discurre entre arrozales pegados al río: precioso, pero su momento es la siega
      dorada de **mayo-junio**, no septiembre, y arrastra fama de vendedores insistentes. **Tràng An**
      es más largo, más salvaje y más dramático: cuevas, templos y la política de no-acoso. En
      septiembre, con el verde recién lavado por las lluvias, la balanza cae del lado de Tràng An sin
      discusión.
curiosidades:
  - >-
    **Una cueva de más de un kilómetro**: la barca la cruza casi a oscuras, agachando la cabeza bajo
    la roca, hasta salir a un valle escondido con un templo al fondo.
  - >-
    **Cero regateo, cero venta**: Tràng An aplica una política de no-acoso rarísima en la zona — el
    paseo va de mirar el paisaje, no de esquivar mercancía a bordo.
  - >-
    **Los ríos de Skull Island**: la ruta 3 pasa por los farallones donde *Kong: Skull Island* (2017)
    rodó la llegada en helicóptero; la reserva vecina de **Vân Long**, donde también filmaron, es la
    versión en silencio del mismo paisaje.
