title: El templo Ngọc Sơn y el lago de la Espada
epithet: >-
  En una isleta del lago Hoàn Kiếm, unida a la orilla por el puente rojo The Húc, el templo más
  fotografiado de Hanoi guarda la leyenda que da nombre al lago: la espada mágica devuelta a la tortuga
  dorada.
sections:
  - heading: La isleta y el puente rojo
    body: |
      Ngọc Sơn es un **đền** —un templo dedicado a héroes y espíritus deificados, no una pagoda
      budista— plantado en una **isleta del lago Hoàn Kiếm**, el corazón simbólico de Hanoi. Se entra por
      el **The Húc**, el puentecito de madera **lacado en rojo** que salva el agua hasta la isla y que
      es, por sí solo, la postal de la ciudad. La visita es breve —el recinto es pequeño—: **entrada
      ~50.000 VND** y **recato en la vestimenta**, como en todo templo en uso.
  - heading: La leyenda de la espada devuelta
    body: |
      El lago se llama **Hoàn Kiếm**, «la espada devuelta», y esta es la historia. En el siglo XV,
      **Lê Lợi** —el héroe que en 1428 expulsó a los Ming y fundó la dinastía Lê— habría vencido con una
      **espada mágica**. Un día, navegando por este lago, una **tortuga dorada** emergió del agua y le
      reclamó el arma: cumplida su misión, la espada volvía a sus dueños divinos. De ahí el nombre del
      lago, y de ahí que Ngọc Sơn sea, más que un templo, el relicario de la leyenda fundacional de
      Hanoi.
  - heading: Cuándo ir
    body: |
      El lago es el pulmón peatonal de Hanoi los fines de semana: **de viernes a las 19:00 hasta el lunes
      a las 6:00** se corta el tráfico y las orillas se llenan de paseantes. El mejor momento es el
      **amanecer del domingo**, con el **tai-chi** y el bádminton alrededor del agua —de lo mejor que da
      la ciudad— y la luz rasante sobre el The Húc para vuestra cámara. Entre semana, en cambio, este
      mismo lago vuelve a ser una rotonda de tráfico.
curiosidades:
  - >-
    El lago se llama **Hoàn Kiếm, «la espada devuelta»**: la leyenda cuenta que una **tortuga dorada**
    emergió para reclamarle a Lê Lợi la espada mágica con la que había expulsado a los Ming en 1428.
  - >-
    Se entra por el **The Húc**, un puente de madera lacado en un rojo intenso: es, por sí solo, la
    imagen más reconocible de Hanoi.
  - >-
    Los fines de semana **el lago entero se peatonaliza** (de viernes 19:00 a lunes 6:00); el **amanecer
    del domingo**, con tai-chi y bádminton en la orilla, es de lo mejor que ofrece Hanoi.
