  src: img/fichas/lago-b52.webp
  alt: "Los restos del bombardero B-52 asomando sobre el agua verde del lago Hữu Tiệp, en el barrio de Ngọc Hà (Hanói), con la estela roja conmemorativa y las casas del vecindario al fondo."
