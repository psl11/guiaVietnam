title: Angkor Wat, geometría y equinoccio
epithet: >-
  Angkor Wat no es solo una montaña de piedra: es un instrumento. Sus arquitectos lo orientaron, lo
  midieron y lo alinearon con el sol con una precisión que un artículo de *Science* documentó en 1976.
sections:
  - heading: La montaña es también un reloj
    body: |
      En 1976, tres investigadores de la Universidad de Michigan —Robert Stencel, Fred Gifford y
      Eleanor Moron— publicaron en la revista **Science** el estudio *«Astronomy and Cosmology at
      Angkor Wat»*: el arquitecto del templo, sostenían, cifró en la planta **temas calendáricos,
      históricos y cosmológicos**, y dejó alineaciones solares deliberadas —entre ellas una del
      solsticio de verano con la colina de **Phnom Bok**, a 14 km al noreste—. El templo no es solo
      un escenario ritual: funciona, a la vez, como **observatorio y calendario** de piedra.
  - heading: El equinoccio que vais a ver
    body: |
      La alineación más limpia es la que os toca. **Dos veces al año, en los equinoccios de marzo y
      septiembre, el sol naciente sube justo por detrás de la torre central** cuando se mira desde la
      calzada de la entrada oeste. La orientación al oeste de Angkor Wat —anómala: casi todos los
      templos jemeres miran al este— coloca esa salida del sol en el eje exacto del santuario. **El
      equinoccio de septiembre cae el 22-23**, y estaréis allí: en marzo eso reúne a decenas de miles
      de personas; en septiembre lo sabe casi nadie. Con la cámara, una lotería ganada si el cielo
      acompaña — y el famoso amanecer se ve **a contraluz**, con el sol *detrás* de las torres.
  - heading: Las medidas que cuentan el tiempo
    body: |
      Eleanor Mannikka (la misma Moron del artículo de *Science*) llevó la idea más lejos en su libro
      *Angkor Wat: Time, Space, and Kingship* (1996): las **distancias del templo, medidas en la
      unidad jemer —el *hat*— codificarían los ciclos solares y lunares del tiempo**, de modo que
      recorrer el eje desde la entrada hacia el santuario sería, simbólicamente, viajar a través de
      las edades del mundo hasta anclar el mandato divino del rey Suryavarman II en el corazón de
      piedra. Conviene la honestidad: esta lectura numérica ha recibido en el mundo académico *«una
      mezcla de interés y escepticismo»*. Lo que nadie discute es lo observable —el equinoccio, la
      orientación, la geometría del quincunce— y basta para cambiar cómo se mira el templo.
  - heading: Para leerlo sobre el terreno
    body: |
      Las **cinco torres en quincunce** son los cinco picos del monte Meru (ver *cómo leer un templo
      jemer*); el **foso de 190 metros**, el océano cósmico; la **calzada de 350 metros**, el puente
      entre mundos. Cruzarla al amanecer no es hacer cola para una foto: es recorrer, a pie, el mapa
      del universo que un rey mandó tallar para demostrar que su poder formaba parte de él.
curiosidades:
  - >-
    Levantar Angkor Wat llevó unos **37 años**, y las estimaciones hablan de **300.000 obreros y
    6.000 elefantes**. Es el mayor monumento religioso jamás construido.
  - >-
    Los 5-10 millones de bloques de arenisca llegaron **flotando**: los jemeres excavaron toda una
    red de canales desde la cantera del Phnom Kulen, a 40 km, para traerlos en balsas.
  - >-
    Angkor Wat mira al **oeste** —al revés que casi todos los templos jemeres—, así que el famoso
    amanecer se ve *a contraluz*, con el sol saliendo por detrás de las torres.
