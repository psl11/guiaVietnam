epithet: >-
  La aldea de los **lô lô negros** al pie de la torre de la bandera de Lũng Cú, el extremo norte de
  Vietnam: apenas unos miles de personas cuyos trajes de fiesta cuestan hasta un año de costura.
sections:
  - heading: Al pie de la torre de Lũng Cú
    body: |
      A los pies de la **torre de la bandera de Lũng Cú** —el punto más septentrional de Vietnam, con
      China al otro lado del horizonte— se esconde la aldea de **Lô Lô Chải**, la de los **lô lô
      negros**. Es de esas paradas que merecen más que la foto de rigor: si podéis, quedaos a dormir
      en uno de sus **homestays**, casas de la propia aldea abiertas al viajero, para amanecer en el
      extremo mismo del país en lugar de cruzarlo de paso.
  - heading: Los trajes de un año
    body: |
      Los lô lô son una minoría diminuta, **apenas unos miles** de personas repartidas por este
      rincón del altiplano. Su seña es el textil: los **trajes de fiesta** de las mujeres llevan
      **miles de triángulos de tela cosidos a mano**, y confeccionar uno puede costar **hasta un año
      entero de trabajo**. No es folclore para la cámara sino el ajuar de una vida — la mejor manera
      de «pagar» lo que veáis es comprar la artesanía real a quien la hace.
curiosidades:
  - >-
    Un traje de fiesta de las mujeres **lô lô** lleva miles de triángulos de tela cosidos a mano:
    puede ser **un año entero de trabajo** en una sola prenda.
