epithet: >-
  Tenido por el valle más bonito de la meseta de Đồng Văn: un puñado de casas de adobe hmong entre
  bolsas de arrozal y maíz que crece en la roca — «el valle de las flores», todavía a salvo de los
  puntos calientes del loop.
sections:
  - heading: El valle de las flores
    body: |
      Se arranca temprano hacia **Sủng Là**, un valle abierto entre paredes de caliza que los
      viajeros llaman «el valle de las flores» por los tapices de color que salpican la roca gris.
      Es el rincón más bonito de la meseta: **casas de adobe hmong** de muros de tierra apisonada
      color ocre, repartidas entre bolsas de arrozal y el maíz que crece entre las piedras. Sigue
      siendo un lugar tranquilo, lejos del gentío del resto del loop — si llegáis con la luz rasante
      de la mañana lo tendréis casi para vosotros.
  - heading: La casa de Pao
    body: |
      El corazón del valle es la **casa de Pao** (*Nhà của Pao*), la vivienda tradicional hmong
      donde se rodó **Chuyện của Pao** («Historia de Pao», 2006) —la casa tomó luego el nombre de su
      protagonista— y que hoy se visita como el arquetipo de la casa del
      altiplano. En ella se leen de un vistazo los tres materiales que definen la arquitectura de
      estas montañas: el **muro de tierra apisonada** (que aísla del frío del invierno de altura),
      el **tejado de teja** y la **cerca de piedra** seca que ciñe el patio. Recorrerla es entender
      cómo se vive en Sủng Là antes de fotografiarlo desde fuera.
curiosidades:
  - >-
    La **casa de Pao** (*Nhà của Pao*) es una vivienda hmong de verdad que se hizo célebre al rodarse
    en ella **Chuyện của Pao** (2006); hoy se recorre como el modelo mismo de la casa del altiplano —
    tierra apisonada, teja y cerca de piedra.
  - >-
    *Chuyện của Pao* ganó cuatro **Premios Cometa de Oro** (los «Óscar» del cine vietnamita), y su
    protagonista, **Đỗ Thị Hải Yến**, es la misma actriz de *El americano impasible* (2002) —la
    adaptación de Graham Greene rodada en parte en el Metropole de Hanoi—: un hilo fino que cose el
    altiplano con la ciudad.
