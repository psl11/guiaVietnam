title: Camboya hoy — danza, budismo y mesa
epithet: >-
  Las apsaras de los muros de Angkor no son arqueología: son un arte vivo. Casi todo lo que veréis
  en Siem Reap desciende, de un modo u otro, de la corte angkoriana — pasando por una catástrofe.
sections:
  - heading: La danza apsara
    body: |
      El **Ballet Real de Camboya**, con sus dedos hipercurvados hacia atrás y sus 4.500 gestos
      codificados, desciende de las danzantes de la corte. Los jemeres rojos lo exterminaron casi
      literalmente: murió alrededor del **90 % de los artistas de danza clásica**. La resurrección la
      lideró la princesa Norodom Buppha Devi, que tras 1979 reunió a los supervivientes para
      reconstruir de memoria las coreografías. Truco de conexión: id a un espectáculo *después* de
      haber mirado las apsaras de piedra — reconoceréis las posturas exactas.
  - heading: El sampeah y el trato
    body: |
      El saludo camboyano es el **sampeah**: palmas unidas ante el pecho con leve inclinación; cuanto
      más arriba las manos, más respeto. Responder al sampeah con sampeah, sonreír mucho, no tocar la
      cabeza de nadie, no señalar con los pies, y **contener el enfado**: levantar la voz hace «perder
      la cara» a todos, incluido uno mismo.
  - heading: Budismo theravada cotidiano
    body: |
      Al amanecer veréis la **ronda de limosnas**: monjes descalzos de naranja recogiendo arroz de
      los vecinos — observadlo con discreción, sin flash. En pagodas y santuarios activos: hombros y
      rodillas cubiertos, descalzarse donde lo hagan los locales, y las **mujeres no deben tocar a un
      monje ni entregarle nada directamente** (se deposita el objeto y él lo recoge). Una **krama**,
      el pañuelo de cuadros que es la prenda nacional, cuesta un par de dólares y resuelve el «hombro
      descubierto» además de ser el souvenir más auténtico posible.
  - heading: Gastronomía jemer
    body: |
      Menos picante que la tailandesa, más herbal, construida sobre el **kroeung** (pasta de
      citronela, galanga, cúrcuma, lima kaffir) y el **prahok**, la contundente pasta de pescado
      fermentado que es el «queso camboyano». Platos clave: **amok trey** —el plato nacional, pescado
      en una mousse de kroeung, coco y huevo, cocido al vapor en un cuenco de hoja de banano; el
      auténtico es cuajado, no una sopa de curry—; **lok lak** (ternera en dados con salsa de pimienta
      y lima); **num banh chok** (los fideos jemeres del desayuno); y la **pimienta de Kampot**,
      entre las mejores del mundo.
  - heading: Comer vegetariano — la palabra es *buos*
    body: |
      Es factible pero requiere insistencia: el prahok, la salsa de pescado y el caldo de pollo se
      esconden en casi todo. Siem Reap tiene muchos restaurantes con carta vegetariana explícita,
      incluidos excelentes veganos jemeres. La palabra clave es **buos**, la comida «de precepto
      budista» (sin ningún producto animal), que todo el mundo entiende. Frase: *«Khnhom nham buos —
      som kom dak sach, tuk trei, prahok»* («Como vegetariana, estilo budista — sin carne, salsa de
      pescado ni prahok»). Mínimo si la memoria falla: *«ot sach»* (sin carne) + *«kom dak tuk trei»*
      (no ponga salsa de pescado). **Llevadla escrita en jemer en el móvil**: funciona mejor que
      cualquier pronunciación.
curiosidades:
  - >-
    Los jemeres rojos exterminaron a cerca del **90 % de los bailarines de danza clásica**. La
    resurrección la lideró una princesa que, tras 1979, reunió a los supervivientes y **reconstruyó
    las coreografías de memoria**.
  - >-
    La **krama**, el pañuelo de cuadros, es bufanda, turbante, toalla, cesta y portabebés a la vez —
    la prenda nacional camboyana, y el souvenir más auténtico posible por un par de dólares.
  - >-
    Para comer vegetariano, la palabra mágica es **buos**: la comida «de precepto budista», sin
    ningún producto animal, que todo el mundo entiende.
