title: La torre de Lũng Cú
epithet: >-
  El punto más al norte de todo Vietnam: una gran bandera plantada sobre una torre en la mismísima
  frontera china. El *hito geográfico* del viaje —hasta aquí llega el país.
sections:
  - heading: El extremo norte
    body: |
      **Lũng Cú** es el punto más septentrional de Vietnam. Un desvío al norte lleva hasta la **torre
      de la bandera**, a la que se **sube por dentro**, con una enorme bandera nacional ondeando
      arriba y **China al otro lado del horizonte**. No hay mucho más que hacer que llegar, pero eso
      es justamente lo que se viene a hacer: tocar el borde del país y quedarse un momento con la idea
      —*hasta aquí llega Vietnam*—. Es el hito geográfico del loop.
  - heading: Lô Lô Chải, al pie de la torre
    body: |
      A los pies de la torre está la aldea de **Lô Lô Chải**, de los **lô lô negros** —apenas unos
      miles de personas en todo el país—. Sus **trajes de fiesta** llevan **miles de triángulos de
      tela cosidos a mano**: un solo traje puede costar **hasta un año de trabajo**. Conservan además
      **tambores de bronce rituales** que conectan con culturas del sudeste asiático de hace dos mil
      años. Muchas casas de la aldea abren como homestay, y compensa bajar de la torre a caminarla.
  - heading: Parad lo justo
    body: |
      Aviso realista: la torre de Lũng Cú es **uno de los puntos calientes del loop**, de los que se
      masifican en temporada alta. La jugada es parar **lo justo** para la foto de rigor y para el
      momento, y seguir hacia **Đồng Văn antes de que caiga la luz**. El silencio de verdad está
      abajo, en Lô Lô Chải, no en la explanada de la torre.
curiosidades:
  - >-
    Desde la torre **se toca el punto más al norte del país**, con la bandera ondeando sobre la
    frontera y China al otro lado del horizonte.
  - >-
    Un **traje de fiesta lô lô** lleva **miles de triángulos de tela cosidos a mano** — puede ser
    **un año entero de trabajo** en una sola prenda.
  - >-
    Los **lô lô conservan tambores de bronce rituales** que enlazan con culturas del sudeste
    asiático de hace **dos mil años**.
