title: "Hàng Thiếc, la calle del metal"
epithet: >-
  La calle de los hojalateros: uno de los poquísimos gremios del metal que sigue vivo y sonando en el
  casco viejo. No una calle-museo, sino un taller a cielo abierto donde la mercancía todavía se
  fabrica en la acera.
sections:
  - heading: La más auténtica de las «36 calles»
    body: |
      De todas las calles-gremio del casco viejo, Hàng Thiếc es **la que menos ha cambiado**. Aquí no se
      vende el recuerdo de un oficio: se **fabrica metal en plena acera**. El **martilleo** se oye antes
      de doblar la esquina, y los artesanos baten **láminas de hojalata** en cajas, moldes, linternas y
      **espejos**, entre interiores en penumbra y bocas de taller abiertas a la calle. Es ruidosa, poco
      turística y nada pintoresca —y por eso es la mejor—: donde otras calles conservan el nombre y han
      perdido la mercancía, esta conserva **las dos**.
  - heading: Oro puro para la cámara
    body: |
      Para un fotógrafo de calle es de lo mejor de Hanoi: **chispas, gestos, herramientas** e interiores
      oscuros recortados por la luz de una puerta. La ventana es **temprano, de 5:00 a 8:00**, cuando la
      calle trabaja sin público y la luz entra rasante. El consejo que vale para todo el barrio y aquí en
      especial: **disparad a la altura de la cadera**, que es donde ocurre el trabajo —el taburete, las
      manos, el yunque—, no a la altura de la cara. Y si retratáis a un artesano, el trato es simple:
      **pedid permiso, comprad algo o dejad propina**.
curiosidades:
  - >-
    Se **oye antes de verse**: el martilleo del metal delata la calle a media manzana. No hay que buscar
    Hàng Thiếc —basta seguir el ruido.
  - >-
    Los fotógrafos tienen un dicho para el casco viejo al alba: plantarse a las **cinco de la mañana** es
    *pescar en un barril*. Hàng Thiếc, ya trabajando y aún sin turistas a esa hora, es el mejor caladero.
