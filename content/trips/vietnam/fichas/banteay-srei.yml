epithet: >-
  La «ciudadela de las mujeres»: el templo más pequeño y más perfecto de Angkor, donde la arenisca
  rosa permitió una talla tan fina que parece labrada en madera o en marfil.
sections:
  - heading: La talla más fina de Angkor
    body: |
      Consagrado en **967** —casi siglo y medio antes que Angkor Wat—, es a la vez el más pequeño y
      el más precioso de los templos de Angkor. Su secreto está en la piedra: una **arenisca
      rosada**, fina y dura, que admite un tallado en miniatura imposible en la arenisca basta de los
      grandes templos. El resultado es **la talla más fina de todo el arte jemer** — y sus
      **frontones**, los tímpanos triangulares sobre las puertas, con escenas mitológicas enteras,
      son los mejores de Angkor. Es diminuto: en **tres cuartos de hora** se recorre, y justo por eso
      se saborea despacio, con la nariz casi pegada a la piedra.
  - heading: Lejos, y por eso primero
    body: |
      Banteay Srei está a **37 km** del recinto central, y esa lejanía es justo la razón de madrugar
      y venir aquí primero. La jugada entera es **llegar a la apertura, hacia las 7:30**: a las 9:30
      descargan los autobuses, y hasta entonces los patios son casi vuestros. Además la piedra rosa
      **pide luz de primera hora** —rasante y suave, saca el relieve de cada dintel y cada frontón—;
      a mediodía la misma talla se aplana y se apaga.
  - heading: Malraux y la anastilosis
    body: |
      Su fama tiene dos caras, la del ladrón y la del salvador. En **1923**, un joven **André
      Malraux** —futuro ministro de Cultura de Francia— fue **detenido por arrancar y llevarse
      bajorrelieves** de estos muros; noveló el episodio en *La Vía Real*. Y fue también Banteay Srei
      el **ejemplo estelar de la anastilosis**: la técnica, aprendida de los holandeses en Java, de
      desmontar un templo derruido y volver a levantarlo con sus **propias piedras numeradas**, pieza
      a pieza. Miradlo con esos dos ojos —el del expolio y el de la reconstrucción paciente— a las
      siete y media de la mañana.
curiosidades:
  - >-
    **André Malraux fue detenido aquí en 1923** por arrancar y robar bajorrelieves; el futuro
    ministro de Cultura francés lo noveló en *La Vía Real*.
  - >-
    La arenisca rosa admite una talla tan fina que **los frontones de Banteay Srei son los mejores de
    todo Angkor** — tímpanos con escenas mitológicas enteras a escala de joyero.
  - >-
    Es el **ejemplo estelar de la anastilosis**: se desmontó y se volvió a montar con sus propias
    piedras numeradas, la técnica que la EFEO aprendió de los holandeses en Java.
