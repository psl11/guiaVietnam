epithet: >-
  El escenario de los cinco días tiene nombre propio y sello de la UNESCO: **2.350 km²** donde el fondo
  de un mar tropical de hace *550 millones de años* quedó levantado, disuelto por la lluvia y, después,
  plantado de maíz.
sections:
  - heading: Qué es
    body: |
      Desde **2010**, todo el altiplano es el **primer Geoparque Global de la UNESCO de Vietnam**: 2.350
      km² de caliza en el extremo norte del país. No es un parque con taquilla ni un mirador concreto —
      **es el suelo entero por el que rueda el loop**. Cada hito de los cinco días cae dentro: Quản Bạ,
      Yên Minh, Đồng Văn, el paso de Mã Pí Lèng, Mèo Vạc. Entender qué se pisa cambia lo que se ve: no
      es «montaña bonita», es un archivo geológico a cielo abierto que se atraviesa en moto.
  - heading: De qué está hecho
    body: |
      Esto fue **fondo de un mar tropical**. Ese lecho se levantó y la lluvia, durante millones de años,
      lo fue disolviendo: eso es el **karst**. El resultado son **pináculos grises, dolinas y auténticos
      mares de roca desnuda** —el «bosque de piedra»— hasta donde alcanza la vista. La caliza guarda
      **550 millones de años** de historia terrestre, con huellas de **dos extinciones masivas** y
      **fósiles devónicos** —corales, trilobites, braquiópodos— de cuando esto era arrecife. Y tiene su
      herida maestra: el **cañón de Tu Sản**, bajo el paso de Mã Pí Lèng, con el **Nho Quế** verde jade
      corriendo **800 metros** más abajo — la garganta tenida por la más profunda del sudeste asiático.
  - heading: Geología habitada
    body: |
      Lo raro de Đồng Văn no es la roca: es que está **habitada hasta el último pliegue**. En esos mares
      de piedra donde no cabría un arado, los **hmong plantan maíz en los bolsillos de tierra entre las
      rocas** —el «cultivo entre piedras» que se ve por todo el loop—: geología de manual sembrada a
      mano. Un apunte para no confundir paisajes: este es karst **mineral y seco**, roca gris, nada que
      ver con el karst verde que emerge de los arrozales inundados de **Ninh Bình**. Son dos escenarios
      distintos del mismo fenómeno, no dos versiones del mismo sitio — por eso el viaje merece los dos.
curiosidades:
  - >-
    Bajo las ruedas del loop hay **corales, trilobites y braquiópodos** fósiles: el altiplano fue fondo
    de un mar tropical, y su caliza registra **550 millones de años** y las huellas de **dos extinciones
    masivas**.
  - >-
    Donde no cabría un arado, los hmong siembran **maíz en los huecos de tierra entre las piedras**. Ese
    «cultivo entre piedras» es la firma del geoparque: geología de manual cultivada a mano, pliegue a
    pliegue.
  - >-
    El famoso **trigo sarraceno rosa** que tapiza estas laderas en las fotos florece de octubre a
    diciembre — a mediados de septiembre es pronto, así que lo veréis verde, no rosa.
