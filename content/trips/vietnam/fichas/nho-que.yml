epithet: >-
  El río de agua turquesa que corre por el fondo del cañón de Tu Sản, tenido por la garganta más
  profunda del sudeste asiático; el contrapunto «desde abajo» del paso de Mã Pí Lèng.
sections:
  - heading: El río y el cañón
    body: |
      El **Nho Quế** baja de China convertido en una cinta de **agua verde jade** por el fondo del
      **cañón de Tu Sản**: paredes de caliza de **700 a 900 metros** —tenida por la más profunda del
      sudeste asiático— con el río corriendo **800 metros por debajo** del paso de Mã Pí Lèng. Desde
      el mirador es una raya turquesa en el abismo; desde el agua, un pasillo entre murallas
      verticales.
  - heading: La barca
    body: |
      La otra mitad de la jugada es **remontarlo en barca**. Se baja al **embarcadero de Tả Làng**
      (comuna Pai Lung, lado Đồng Văn) por unos **8 km de curvas muy empinadas** —vuestro easy rider
      los hace en moto, que aquí es lo natural— y la barca se adentra **de 45 a 90 minutos** en el
      cañón. Es el contrapunto **«desde abajo»** del mirador de Mã Pí Lèng: primero el río bajo
      vuestros pies desde el paso, luego las paredes cerrándose sobre vuestra cabeza.
  - heading: A primera hora
    body: |
      Ir **a primera hora** no es un consejo cualquiera: al alba el agua está en calma y sin viento
      —un espejo— y aún no han salido las otras barcas. **Septiembre-noviembre** es además su mejor
      época, con el caudal alto y el verde en su punto. Para la X100VI ese reflejo quieto de las
      paredes solo existe temprano; hacia media mañana entran la brisa y los grupos. (Tras una lluvia
      torrencial la travesía puede suspenderse por caudal.)
curiosidades:
  - >-
    El **cañón de Tu Sản** está tenido por la **garganta más profunda del sudeste asiático**: paredes
    de hasta 900 metros con el Nho Quế corriendo 800 metros por debajo del paso.
  - >-
    Al amanecer el agua queda tan quieta que **refleja las paredes como un espejo** — la ventana en la
    que existe la foto que buscáis, antes de que entren la brisa y las otras barcas.
  - >-
    La travesía cuesta una miseria (**~3,5-5 € por persona**) y suele venir incluida en el tour del
    loop; lo caro es madrugar lo bastante para pillar el cañón vacío.
