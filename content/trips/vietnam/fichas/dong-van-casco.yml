epithet: >-
  El viejo barrio de casas de adobe y teja de *Đồng Văn*, corazón del altiplano y del primer
  geoparque UNESCO de Vietnam: la plaza, el mercado y una cena con café en un balcón de madera para
  cerrar el día de moto.
sections:
  - heading: El casco viejo, de adobe y teja
    body: |
      **Đồng Văn** es el corazón del altiplano, y su **casco antiguo** es un puñado de calles de
      **casas de adobe y tejas centenarias** —muros de tierra apisonada, balcones de madera— en torno
      a una **plaza** y su **mercado**. Es el sitio para la **cena y un café en un balcón de madera**,
      con las piernas por fin quietas después de un día entero de moto. Al caer la tarde el barrio se
      llena de la vida tranquila del altiplano: la mejor manera de terminar la jornada más llena del
      loop.
  - heading: El corazón del geoparque
    body: |
      Todo lo que se ha cruzado hoy es, **desde 2010**, el **primer Geoparque Global de la UNESCO de
      Vietnam**: **2.350 km²** de caliza que registran **550 millones de años** de historia
      terrestre. La roca gris que rodea el casco —pináculos, dolinas, el «bosque de piedra»— fue en su
      día **fondo marino tropical**: guarda **fósiles devónicos** (corales, trilobites, braquiópodos)
      y las huellas de **dos extinciones masivas**. Geología de manual, habitada hasta el último
      pliegue.
  - heading: La base para la noche
    body: |
      Đồng Văn es la base natural para dormir: a primera hora de la mañana siguiente arranca el tramo
      **más espectacular del loop** —la **barca por el cañón del Nho Quế** y el paso de **Mã Pí
      Lèng**—, y conviene descansar cerca del arranque para **salir con el amanecer**. Una noche en el
      casco viejo y, con la luz, la carretera más bonita del viaje.
curiosidades:
  - >-
    Bajo el casco viejo hay **550 millones de años de caliza**: cuando esto era **fondo marino
    tropical** dejó fósiles de corales, trilobites y braquiópodos, y las huellas de **dos extinciones
    masivas**.
  - >-
    Las **casas del casco antiguo son de adobe y teja centenarias** —muros de tierra apisonada y
    balcones de madera—, el mejor sitio del altiplano para cenar y tomar un café en alto.
  - >-
    El **altiplano entero es Geoparque Global de la UNESCO desde 2010**, el primero de Vietnam:
    **2.350 km²** de karst habitado.
