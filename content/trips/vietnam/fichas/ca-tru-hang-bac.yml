epithet: >-
  El canto ceremonial de cámara de la corte y las casas de té: poesía cantada verso a verso ante veinte o
  cuarenta personas. Patrimonio inmaterial UNESCO *que necesita salvaguarda urgente* — íntimo, casi
  extinto. Esto sí es una gema.
sections:
  - heading: Qué es el ca trù
    body: |
      Canto de cámara de la **corte y las casas de té**, hoy en la lista de la UNESCO de patrimonio que
      **necesita salvaguarda urgente** — el nivel de alarma máximo, el de un arte a punto de perderse. El
      conjunto es mínimo: una **cantante** que marca el pulso con unas **castañuelas de bambú** (*phách*), un
      **laúd de tres cuerdas** y un **tambor de elogio**. Es lo contrario del espectáculo para autobuses:
      público de **veinte a cuarenta personas** en una casa comunal, casi al alcance de la mano.
  - heading: En la casa de los plateros
    body: |
      La sesión es en el **Đình Kim Ngân** (**42–44 Hàng Bạc**), la **casa comunal restaurada del gremio de
      plateros** — Hàng Bạc es la calle de la plata desde el siglo XV. Escucharlo aquí tiene doble filo: el
      canto más íntimo de Hanoi dentro del *đình* de un gremio, en la misma calle que de día es un pasillo
      de joyerías y de noche se convierte en sala de concierto. Entrada, ~200.000 VND (~6,5 €).
  - heading: La crítica se hace con las manos
    body: |
      El detalle que lo cambia todo: el **tambor de elogio** no lo toca el conjunto, lo toca **el público**,
      para **aprobar un verso** en el momento en que se canta. La crítica se hace con las manos, en tiempo
      real — un diálogo de mil años entre quien canta y quien escucha. El **Ca Trù Hanoi Club** toca solo
      **miércoles, viernes y domingo a las 20:00**; confirmad el día, que a veces rota.
curiosidades:
  - >-
    El ca trù está en la lista de la UNESCO de patrimonio **que necesita salvaguarda urgente** — el nivel de
    alarma máximo: no «en peligro» a secas, sino un arte al borde de desaparecer.
  - >-
    En el ca trù, **el público toca el tambor de elogio para aprobar un verso** en directo: la crítica se
    hace con las manos, en tiempo real, mientras la cantante sigue cantando.
  - >-
    Se canta en el **Đình Kim Ngân**, la casa comunal del **gremio de plateros** de Hàng Bạc: la calle que
    de día es de joyeros y de noche, tres veces por semana, alberga el canto más antiguo de la ciudad.
