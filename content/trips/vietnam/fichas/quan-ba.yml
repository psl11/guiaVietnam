epithet: >-
  La primera gran parada del loop de Hà Giang: el tajo en la roca por el que, tras 52 km de subida
  desde el valle, la carretera deja de ser carretera y el altiplano de Đồng Văn se abre de golpe —
  y abajo, redondas sobre el arrozal, dos colinas gemelas idénticas.
sections:
  - heading: La Puerta del Cielo (Cổng Trời)
    body: |
      Antes de llegar a Tam Sơn, la moto se detiene en el **Cổng Trời de Quản Bạ**, la «Puerta del
      Cielo»: un corte en la roca del puerto que funciona como un balcón sobre el valle entero. Es el
      primer umbral de verdad del loop — hasta aquí se ha subido entre curvas desde Hà Giang; a partir
      de aquí empieza la meseta kárstica de Đồng Văn, con sus pináculos grises y el maíz plantado entre
      las piedras. Desde el mirador se domina Quản Bạ, sus terrazas y las montañas gemelas al fondo.
  - heading: Las montañas gemelas (Núi Đôi)
    body: |
      Bajo el mirador, dos colinas perfectamente redondas e idénticas emergen del arrozal de Quản Bạ:
      son las **Núi Đôi**, las «montañas gemelas», conocidas popularmente como **las montañas del
      hada**. En septiembre las terrazas de Quản Bạ y **Nậm Đăm** que las enmarcan están doradas o casi
      —una de las pocas bolsas de oro que da el loop, ya que el karst de Đồng Văn es roca y maíz, no
      arroz de postal, y Hoàng Su Phì quedó descartado por falta de días.
  - body: |
      **Cómo verlo:** se llega **a media tarde** a propósito. La Puerta del Cielo es uno de los pocos
      puntos del loop que se masifican a la hora dorada; llegar antes deja la luz cayendo sobre las
      terrazas y las gemelas sin la aglomeración del ocaso — que es justo lo que busca la cámara. Ir en
      privado, no en grupo de diez motos, significa además parar donde la luz manda y no donde el grupo
      decide.
curiosidades:
  - >-
    Las **Núi Đôi Cô Tiên, «las montañas del hada»**: cuenta la leyenda que un hada bajó del cielo
    prendada de un joven hmong y su música de **đàn môi** (el arpa de boca); tuvieron un hijo, pero el
    Emperador de Jade la hizo volver al cielo, y ella, para no dejarlo sin alimento, abandonó **sus
    pechos convertidos en estas dos colinas** — y sus lágrimas formaron el río Miện que las riega.
  - >-
    El altiplano de Đồng Văn es **roca gris y maíz entre piedras, no arroz de postal**: las bolsas
    doradas del loop se cuentan con los dedos, y la de Quản Bạ/Nậm Đăm es la primera. El loop se elige
    por el karst y el cañón, no por el arroz.
  - >-
    La Puerta del Cielo es de los tres puntos del loop que **se masifican a la hora dorada** (con el
    Skywalk de Mã Pí Lèng y la torre de Lũng Cú); por eso aquí se llega a media tarde, con la luz aún
    cayendo sobre las gemelas y sin el gentío del ocaso.
