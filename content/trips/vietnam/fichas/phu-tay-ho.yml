epithet: >-
  El santuario más vivo del *Đạo Mẫu* en Hanoi: a la orilla del Lago del Oeste se venera a Liễu Hạnh,
  la Diosa Madre, y —si hay suerte— una médium entra en trance al son de los tambores del *chầu văn*.
sections:
  - heading: El templo de las Diosas Madres
    body: |
      El **Phủ Tây Hồ** —un *phủ*, el templo propio del culto a las **Diosas Madres**— es el santuario
      del **Đạo Mẫu** más concurrido de Hanoi. El Đạo Mẫu venera a las Madres de los reinos del **cielo,
      el agua y la montaña**, y este templo, asomado al **Lago del Oeste (Hồ Tây)**, está consagrado a la
      más célebre de ellas: **Liễu Hạnh**. No es un monumento que se «visita»: es un lugar de devoción en
      plena ebullición, de humo de incienso y ofrendas de fruta, flores y dinero votivo.
  - heading: El día 1 del mes lunar
    body: |
      Si queréis sentirlo vivo, id a **principio del mes lunar**: el **día 1**, cuando Hanoi acude a los
      templos a pedir **salud y fortuna**, el Phủ Tây Hồ se desborda de fieles, colas de ofrendas y una
      nube de incienso. Es un templo de **petición** más que de contemplación, y ahí está su interés:
      aquí se ve la religión vietnamita *funcionando*, no expuesta en una vitrina.
  - heading: Si coincidís con un hầu đồng
    body: |
      El Phủ Tây Hồ es uno de los lugares donde de verdad se celebra el **hầu đồng**, el rito estrella
      del Đạo Mẫu: una **médium entra en trance** y va encarnando a una galería de espíritus
      —cambiándose de traje para cada uno, bailando, repartiendo dinero de la suerte— al son de la música
      *chầu văn*. **No hay calendario público**: cruzarse con uno es cuestión de suerte. Lo que significa
      todo esto —el trance, las Madres, la UNESCO— se cuenta en la ficha del **tam giáo**; aquí basta con
      recordar el respeto de siempre: sin flash, y nunca fotografiar a quien reza o está en trance sin
      permiso.
curiosidades:
  - >-
    Es **el santuario del Đạo Mẫu más concurrido de Hanoi**, consagrado a **Liễu Hạnh**, la Diosa
    Madre: un templo de *petición*, no de museo.
  - >-
    A **principio del mes lunar** —el día 1— se desborda de fieles, ofrendas e incienso: es el mejor
    momento para verlo latir.
  - >-
    Aquí se celebra el **hầu đồng**, el trance en que una médium encarna a los espíritus al son del
    *chầu văn* — pero **sin calendario público**: cruzarse con uno es pura suerte.
