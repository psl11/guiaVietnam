epithet: >-
  El **Tonlé Sap** es el lago que late con el monzón; **Kampong Phluk**, un pueblo de casas sobre
  pilotes que vive suspendido sobre su respiración.
sections:
  - heading: El pueblo sobre pilotes
    body: |
      A unos **32 km de Siem Reap** (~45 min), en la orilla del gran lago **Tonlé Sap**, **Kampong
      Phluk** es un pueblo jemer de verdad —unos **3.000 habitantes** que viven de la pesca— con las
      casas encaramadas sobre **pilotes de seis a ocho metros**. No es la trampa turística de Chong Kneas
      (escuelas flotantes de atrezo y venta a presión, mejor evitarla): aquí la vida es real y cambia por
      completo según la estación. En la seca, los pilotes quedan a la vista, larguísimos, sobre un suelo
      agrietado; en la crecida, el agua sube hasta las casas. El pueblo entero está construido en torno a
      esa **subida y bajada** del lago.
  - heading: Septiembre, el agua alta
    body: |
      Y vais en el mejor momento. El Tonlé Sap **late con el monzón**: en la estación húmeda la crecida
      del Mekong empuja agua lago adentro y lo hincha hasta desbordarlo, anegando el bosque y las
      llanuras de la orilla. **En septiembre el agua está en su máximo**: los pilotes desaparecen bajo el
      agua, el **bosque inundado** de manglares queda sumergido y navegable, y podéis remar entre las
      copas de los árboles. Es **la mejor época del año** para verlo — y el **crepúsculo sobre el lago**
      desde la barca, con el cielo lavado de tormenta, es la postal que cierra el día grande.
  - heading: La canoa de remo
    body: |
      Dentro del bosque anegado se cambia la lancha de motor por una **canoa a remo** (unos 5–7 US$
      aparte de la barca): silencio, la quilla rozando las ramas, y **la reman mujeres del pueblo**, de
      modo que ese dinero se queda en la comunidad. Comprad **la barca en el embarcadero oficial** (~20–25
      US$ por persona; los intermediarios de Pub Street inflan un 30–40 %). Y recordad que esto es una
      comunidad viva, no un decorado: voz baja, permiso antes de retratar de cerca, refrescos en las
      tiendas familiares, y **nada de dar dinero o caramelos a los niños** ni de visitar «orfanatos
      flotantes».
curiosidades:
  - >-
    La **canoa a remo** por el bosque inundado la reman **mujeres del pueblo**, y ese dinero (5–7 US$) se
    queda allí — la forma más directa de que vuestra visita ayude a Kampong Phluk.
  - >-
    Es **el mismo pueblo y dos mundos** según el mes: en la seca los pilotes de 6–8 m se alzan sobre
    tierra agrietada; en septiembre desaparecen bajo el agua y se navega entre las copas de los árboles.
  - >-
    Huid de **Chong Kneas**, la trampa turística del lago (escuelas flotantes de atrezo y venta a
    presión). Kampong Phluk es el pueblo real — y se reserva directo en el embarcadero, no con
    revendedores de Pub Street.
