epithet: >-
  Una casa de mercader de finales del siglo XIX, restaurada y abierta al público, que en media hora
  enseña lo que ninguna calle cuenta: por qué el casco viejo entero creció estrecho por fuera y
  profundísimo por dentro.
sections:
  - heading: La lección más barata de Hanoi
    body: |
      De las casas-tubo íntegras que quedan en el casco viejo —**apenas catorce**— esta es la que se
      puede visitar: una casa de comerciante de **finales del siglo XIX**, restaurada y abierta como
      casa-museo. La entrada cuesta **10.000 VND** (~0,35 €, el precio de un té), abre de **8:00 a 17:00** y se
      recorre entera en **veinte o treinta minutos**. No hay mucho que «ver» en el sentido turístico;
      lo que hay es una **tipología** que, entendida aquí de una vez, se reconoce luego en cada portal
      del barrio.
  - heading: La lógica del tubo
    body: |
      La **nhà ống** («casa tubo») nació de un impuesto: la administración colonial gravaba cada casa
      **por la anchura de su fachada**, así que la ciudad, para pagar menos, creció hacia dentro. De ahí
      esta planta imposible —**fachada de unos tres metros, fondo de hasta treinta**— resuelta con
      **patios de luz encadenados** que ventilan e iluminan lo que, si no, sería un túnel a oscuras.
      Delante, el taller y la tienda abiertos a la calle; detrás y arriba, la vivienda de la familia:
      comercio, almacén y hogar en un mismo solar profundo.
  - heading: Dónde encaja
    body: |
      Está en el **número 87 de Mã Mây**, casi al final del eje clásico del casco viejo, justo antes de
      Tạ Hiện. Es la **última parada** natural del paseo gremial: después de oír el metal en Hàng Thiếc
      y cruzar la calle de los plateros de Hàng Bạc, la casa le pone techo —literalmente— a todo lo
      visto. Es donde la teoría de las «36 calles» se convierte en una habitación en la que entrar.
curiosidades:
  - >-
    El billete cuesta **10.000 VND** (~0,35 €), literalmente lo que un té en un taburete: es, seguramente, la
    entrada más barata y más útil de Hanoi. Paga por entender de golpe la forma de todo un barrio.
  - >-
    Algunas noches la casa se convierte en escenario: el grupo **Ca Trù Thăng Long** ofrece a veces aquí
    sus sesiones de canto de cámara (martes, jueves y sábado) —el mismo arte que la UNESCO declaró *en
    peligro*—, y oírlo en una casa de mercader del XIX es el marco perfecto.
