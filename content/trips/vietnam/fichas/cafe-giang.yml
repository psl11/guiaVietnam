title: "Café Giảng, la cuna del café-huevo"
epithet: >-
  El café escondido al fondo de un pasillo donde en 1946 nació el *cà phê trứng*, el café con yema
  batida. Lo inventó un barman del Metropole para suplir la leche que la guerra había hecho
  desaparecer, y sus herederos lo siguen batiendo en la misma casa.
sections:
  - heading: "1946: leche que no hay, huevo que sobra"
    body: |
      El café-huevo nació de una **carencia**. En 1946, con Hanoi en plena guerra contra Francia y la
      **leche fresca desaparecida**, **Nguyễn Văn Giảng** —entonces *barman* del hotel **Metropole**—
      resolvió el problema como un cocinero: si no hay leche que espumar, se **bate yema de huevo con
      azúcar** hasta una crema y se corona con ella el café. Funcionó tan bien que Giảng **dejó el hotel
      y abrió su propio café**. De aquella escasez salió la bebida más golosa de Hanoi.
  - heading: A qué sabe
    body: |
      Debajo, un café **robusta** denso, filtrado gota a gota; encima, una nube tibia de **yema batida
      con azúcar**, casi un flan aireado. El resultado **sabe a tiramisú líquido** —dulce, cálido, más
      postre que café— y cuesta unos **30.000–35.000 VND**. Es, además, de los cafés que **se piden sin
      preguntar**: yema, azúcar y robusta, sin la trampa de la salsa de pescado que acecha en
      la comida.
  - heading: La cuna, no la copia
    body: |
      El egg coffee se ha vuelto souvenir y hay versiones en media ciudad, pero **aquí es donde nació**,
      y beberlo en su origen no es lo mismo que en la cafetería de moda de turno. Giảng murió en
      **1987**; hoy el café lo lleva su **hijo, Nguyễn Trí Hòa**, en un local **escondido al fondo de un
      pasillo estrecho**, en el **39 de Nguyễn Hữu Huân**. Hay que meterse por el callejón y confiar: la
      sala buena está al final. Beberlo **al pie de la fuente**, y no en la copia, es la diferencia entre
      probar un plato y **entender de dónde viene**.
curiosidades:
  - >-
    La familia repartió el invento por la ciudad: mientras el hijo mantiene el Giảng, **la hija de
    Giảng**, la Sra. Bích, abrió en 1984 el **Cà Phê Đinh**, con balcón al lago Hoàn Kiếm y un
    café-huevo más ligero. Dos cafés, una misma receta de familia.
  - >-
    Giảng aprendió el oficio de *barman* en el **Metropole**, el gran hotel colonial de Chaplin y Graham
    Greene. De ahí el origen curioso del café-huevo: **técnica de coctelería fina** improvisada en plena
    penuria de guerra, acabada convirtiéndose en una de las bebidas insignia de Hanoi.
  - >-
    Vietnam es el **mayor productor mundial de robusta** —café fuerte y terroso, filtrado gota a gota en
    el *phin*—; el café-huevo es la respuesta local a cómo domar ese café cuando la leche escasea.
