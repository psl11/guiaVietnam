epithet: >-
  En un montículo del valle de Sà Phìn, entre Yên Minh y Đồng Văn, se alza la casa-fortaleza del
  hombre que gobernó el altiplano a principios del siglo XX con una fortuna hecha de opio:
  *Vương Chính Đức*, el rey de los hmong.
sections:
  - heading: La casa del rey de los meo
    body: |
      Los vietnamitas la llaman **Dinh Vua Mèo**, «la casa del rey de los meo». La levantaron
      artesanos chinos hacia **1898–1903** para **Vương Chính Đức** (1865–1947), y es una
      casa-fortaleza de **madera y piedra de estilo sur-chino**: planta de mansión **Qing** con
      elementos hmong y algún toque francés, plantada sobre un montículo con forma de **caparazón de
      tortuga** elegido por geomancia. Dentro caben **64 habitaciones** repartidas en patios
      empedrados, y hasta una **bañera de leche de cabra tallada en granito**. No es una parada de
      foto rápida: es el altiplano entero contado en un edificio.
  - heading: La fortuna era opio
    body: |
      El dinero que la pagó salió del **opio**. Sà Phìn era un nudo del comercio entre **Yunnan,
      Birmania e Indochina**, y el monopolio francés del opio necesitaba intermediarios: reconocieron
      a Vương como autoridad de facto del altiplano —les convenía— y él prosperó. El detalle que lo
      cuenta todo sin disimulo está en la piedra: los **capiteles de las columnas están tallados con
      forma de cápsula de amapola**.
  - heading: Del lado bueno del relato
    body: |
      La dinastía sobrevivió al cambio de siglo cambiando de bando a tiempo. El hijo del rey se
      **alió con Hồ Chí Minh** y llegó a **diputado de la primera Asamblea Nacional** del Vietnam
      independiente, y por eso la familia quedó del lado correcto del relato oficial —opio, franceses
      y geomancia incluidos—. Recorrerla con calma es la mejor lección de historia de todo el loop.
curiosidades:
  - >-
    Los **capiteles de piedra están tallados con forma de cápsula de amapola**: un guiño sin
    disimulo a la fortuna de opio que pagó la casa.
  - >-
    Entre sus **64 habitaciones** y sus patios empedrados hay una **bañera de leche de cabra tallada
    en granito** — el lujo de un rey de montaña a principios del siglo XX.
  - >-
    La familia **acabó del lado de Hồ Chí Minh**: el hijo del rey fue diputado de la primera
    Asamblea Nacional, y así la dinastía del opio se quedó del lado bueno del relato oficial.
