epithet: >-
  Quinientos escalones para ganar, de un tirón, la vista que explica Ninh Bình entera mejor que
  cualquier texto: el río dibujando su meandro entre agujas de roca y, a vuestros pies, un mar de
  arrozales.
sections:
  - heading: Los quinientos escalones
    body: |
      Desde la base, unos **500 escalones de piedra** trepan por el flanco de la montaña hasta la
      cresta —**100.000 VND de entrada**, más 10.000 de aparcamiento—. La subida es corta pero
      exigente y va **al descubierto**, sin una sombra: por eso la hora a la que se emprenda lo cambia
      todo. Arriba, la recompensa llega de golpe.
  - heading: El dragón y la vista aérea
    body: |
      La cresta está coronada por un **dragón de piedra** que repta por el filo de la roca —la estampa
      de todas las fotos—. Pero lo que deja mudo es lo que se abre debajo: la **vista aérea del
      meandro del río Ngô Đồng**, serpenteando entre las agujas kársticas, con **Tam Cốc** y su mar de
      arrozales desplegándose hasta el horizonte. Es, literalmente, la panorámica que ordena todo lo
      que se ha visto abajo desde la barca.
  - heading: Al amanecer, sin falta
    body: |
      Subid **al alba**, hacia las **06:30**. A esa hora se trepa en fresco y casi a solas: los
      autobuses que salen de Hanoi **no llegan hasta pasadas las nueve**, y el calor de mediodía en
      estas escaleras al sol es serio. De propina, la **niebla aún se deshilacha** sobre los arrozales
      y la luz entra rasante: la montaña se gana de un tirón y con su mejor cara. El atardecer también
      funciona, pero con más gente.
curiosidades:
  - >-
    **500 escalones sin una sombra**: la subida es breve pero al descubierto — de ahí la regla de oro
    de hacerla al alba y no a mediodía, cuando estas escaleras se vuelven una parrilla.
  - >-
    **El dragón no es la vista, es el marco**: la figura de piedra que corona la cresta sale en todas
    las fotos, pero lo que deja sin habla es el meandro del Ngô Đồng y Tam Cốc a sus pies.
  - >-
    **A las 06:30 la cima es casi vuestra**: los autobuses de Hanoi no aparecen hasta pasadas las
    nueve, así que quien madruga se queda el mirador —y la niebla sobre el arrozal— para sí solo.
