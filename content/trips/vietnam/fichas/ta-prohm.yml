title: Ta Prohm y la selva
epithet: >-
  El templo que Jayavarman VII dedicó a su madre, y el único que los restauradores decidieron dejar
  —a medias— en brazos de la selva.
sections:
  - heading: El templo de la madre
    body: |
      Lo levantó **Jayavarman VII** a finales del siglo XII, en pleno programa constructor budista
      sin paralelo en la historia jemer, y lo **dedicó a su madre** —como su gemelo del norte, Preah
      Khan, quedó dedicado a su padre—. Es un templo del **budismo mahayana**, y por eso lleva una
      cicatriz: cuando la reacción hinduista de **Jayavarman VIII** barrió el budismo en el siglo
      XIII, se picaron a cincel miles de budas de estos muros. Jugad a buscarlos — las **hornacinas
      vacías y los rectángulos de piedra picoteada** son el hueco exacto donde había un Buda sentado.
  - heading: En brazos de la selva
    body: |
      Lo que hace de Ta Prohm *el* templo de la jungla no es la ruina, sino una decisión: dejarlo —a
      medias— en manos de la selva. Mientras los demás templos se despejaron de vegetación, aquí las
      **ceibas de tronco pálido y las higueras estranguladoras** siguen encaramadas a los muros, con
      las raíces derramándose sobre la piedra como cera derretida, cosiendo y descosiendo la
      mampostería a la vez. Desde 2004 el *Archaeological Survey of India* lo estabiliza con
      discreción —pasarelas de madera, algún andamio puntual—, pero sin arrancarle los árboles: la
      fotogenia del abrazo entre la piedra y la raíz está deliberadamente conservada.
  - heading: El árbol de Tomb Raider
    body: |
      En 2001 **Angelina Jolie** rodó aquí *Lara Croft: Tomb Raider*, y una higuera concreta —la que
      se alza junto a la llamada **«puerta del cocodrilo»**— es hoy oficialmente el *Tomb Raider
      tree*, con su cola de fotos. Aquel rodaje hizo más que decorar una película: **relanzó el
      turismo de Angkor** tras décadas de guerra. La consecuencia práctica os afecta directamente:
      entre las **9:00 y las 11:00** el templo se atasca de grupos. Entrad a primera hora —como manda
      el plan del día grande— y tendréis los corredores de raíces casi para vosotros.
curiosidades:
  - >-
    El *Tomb Raider tree* se alza junto a la «puerta del cocodrilo»: el rodaje de 2001 con Angelina
    Jolie **relanzó el turismo de Angkor** tras décadas de guerra.
  - >-
    **Ta Prohm es el templo de la madre**: Jayavarman VII se lo dedicó a la suya, igual que dedicó
    Preah Khan, su gemelo, a su padre.
  - >-
    Buscad los **budas raspados a cincel**: la reacción hinduista de Jayavarman VIII picó miles de
    imágenes budistas de estos muros en el siglo XIII — cada muesca, un episodio de guerra ideológica.
