kicker: Vietnam · palabras que abren puertas
title: Micro-glosario cultural
epithet: >-
  Veinte palabras que no vienen en la guía de frases pero que, dichas o reconocidas a tiempo,
  cambian una interacción. De la mesa a la calle, del trato a la idea que lo resume todo.
sections:
  - heading: En la mesa
    body: |
      - **Bánh mì** — bocadillo en baguette de arroz y trigo: el legado comestible más feliz de
        Francia, vietnamizado con paté, cilantro, encurtidos y chile.
      - **Phở** — la sopa nacional. Se pronuncia «fó?», con tono ascendente, no «fou».
      - **Nước mắm** — salsa de pescado fermentado, el alma umami de la cocina. Para vegetarianos: el
        enemigo invisible.
      - **Phin** — el filtro metálico individual de café. Sinónimo de «no tengo prisa».
      - **Bia hơi** — cerveza fresca del día, sin pasteurizar, en taburete de plástico. Posiblemente
        la más barata del mundo.
  - heading: La gente y el trato
    body: |
      - **Ông / bà / em / anh / chị** — el vietnamita no tiene un «tú» neutro: cada pronombre te sitúa
        en la familia (abuelo, señora, hermano menor…). Toda conversación empieza calculando edades.
      - **Ơi!** — la interjección para llamar: *«Em ơi!»* al camarero joven, *«Chị ơi!»* a la señora.
        No es grosero: es lo correcto.
      - **Xe ôm** — «moto-abrazo»: el mototaxi. Hoy se pide por app (Grab).
      - **Nhà quê** — «del campo», paleto. Insulto suave entre urbanitas y orgullo reivindicado por
        otros; resume la tensión campo-ciudad del Vietnam del boom.
  - heading: La casa, la calle, el mercado
    body: |
      - **Ngõ** — los callejones-capilares del casco viejo, donde ocurre la vida real detrás de las
        fachadas.
      - **Nhà ống** — «casa tubo»: fachada de 3 metros, fondo de 30. Herencia de impuestos coloniales
        que gravaban por anchura de fachada.
      - **Chợ phiên** — mercado periódico de montaña: el calendario social del norte.
      - **Thổ cẩm** — el brocado/textil artesanal de las minorías. La palabra que buscar para comprar
        lo auténtico.
      - **Homestay** — en el loop, dormir en casa (a menudo de palafito tày) con cena familiar: la
        institución que sostiene el turismo rural.
  - heading: Cultura, religión, calendario
    body: |
      - **Áo dài** — túnica larga entallada sobre pantalón; su forma actual es un diseño de los años
        30, modernidad hecha tradición.
      - **Nón lá** — el sombrero cónico de hoja de palma. En el campo es herramienta (sol, lluvia,
        abanico, cesta), no souvenir.
      - **Chùa / đền / đình** — pagoda budista / templo de espíritus y héroes / casa comunal del
        pueblo. Distinguirlos es leer el paisaje religioso.
      - **Tết** — el Año Nuevo lunar, la fiesta total: el país entero vuelve al pueblo de sus
        ancestros. Todo se fecha «antes de Tết» o «después de Tết».
  - heading: Dos palabras que lo resumen todo
    body: |
      - **Đồng** — la moneda. Todos sois millonarios en Vietnam: un café son 30.000.
      - **Non nước** — «montaña y agua»: la palabra que significa a la vez *paisaje* y *patria*. Que
        sean la misma palabra es, quizá, el resumen de todo este corpus.
