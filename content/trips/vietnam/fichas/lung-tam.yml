title: El índigo de Lũng Tám
epithet: >-
  La cooperativa de tejido de las mujeres hmong de Lũng Tám: el valle donde el cáñamo pasa de la
  planta al telar y el índigo *chàm* tiñe el hilo hasta un azul casi negro — el mismo azul que da
  nombre a la paleta de esta guía.
sections:
  - heading: De la planta al telar
    body: |
      Camino de Yên Minh, la carretera se desvía al valle de **Lũng Tám**, la «aldea del lino», donde
      una cooperativa de mujeres **hmong** mantiene vivo el ciclo entero del textil de **cáñamo**:
      cultivan la planta, la hilan, la tejen en telares de pedal y la tiñen. Del gris crudo del cáñamo
      al azul casi negro del índigo, cada pieza pasa por muchas manos antes de doblarse en el mostrador.
      El **batik de índigo** —el dibujo reservado con cera antes del tinte— es la firma por la que son
      célebres.
  - heading: El índigo que tiñe la guía
    body: |
      El **índigo (*chàm*)** se fermenta en tinajas y agarra el hilo en inmersiones sucesivas, hasta ese
      azul profundo, casi negro, de los trajes de los hmong negros. Es **el mismo índigo que da nombre a
      la paleta «Sơn mài» de esta guía**: el segundo polo —junto al cinabrio de la laca— de todo lo que
      estáis leyendo. Teñir aquí no es una demostración montada para turistas: es el oficio del valle,
      y por eso vale la pena verlo despacio.
  - body: |
      **Cómo verlo:** ir **por la mañana**, que es cuando las mujeres tejen y la cooperativa está viva.
      Y aquí la regla fotográfica del loop se cumple sola: no se paga por un retrato ni se da dinero a
      los niños; la mejor manera de «pagar» una foto es **comprar el textil real de quien lo teje**. En
      Lũng Tám eso se puede hacer de verdad — y de las piezas, del gris del cáñamo al azul del índigo,
      se sale con algo en la mochila comprado a quien lo hizo.
curiosidades:
  - >-
    **El azul de esta guía se tiñe en Lũng Tám.** El índigo *chàm* de sus tinajas es el mismo que da
    nombre a la paleta «Sơn mài» —laca cinabrio e índigo— de todo el diseño que tenéis delante.
  - >-
    Del **gris crudo del cáñamo al azul casi negro del índigo**: una sola pieza pasa por cultivar la
    planta, hilarla, tejerla y teñirla en inmersiones sucesivas. Por eso el textil de cooperativa no
    vale lo mismo que la copia del puesto turístico.
  - >-
    La forma honesta de agradecer un retrato en el loop no es dar dinero, es **comprar la artesanía de
    quien la hace**. En Lũng Tám —cáñamo e índigo de las propias tejedoras— eso se puede hacer de
    verdad, y no con las copias de los puestos.
