title: La pagoda Trấn Quốc, la más antigua de Hanoi
epithet: >-
  La pagoda budista más antigua de Hanoi —cerca de 1.450 años, con orígenes en el siglo VI— sobre una
  península del Lago del Oeste. Al atardecer, su estupa roja de once pisos recortada contra el agua es
  el clásico fotográfico de la ciudad, y de los que merecen el cliché.
sections:
  - heading: La pagoda más antigua de Hanoi
    body: |
      Trấn Quốc es una **pagoda budista** —un *chùa*, no un *đền* de héroes deificados— y el templo más
      antiguo de Hanoi: unos **1.450 años**, con orígenes en el **siglo VI**. Se alza sobre una pequeña
      **península del Lago del Oeste (Hồ Tây)**, a la que se llega por la carretera Thanh Niên, junto al
      vecino lago Trúc Bạch. Es un templo vivo —incienso, ofrendas, comunidad monástica—, no una ruina
      para la foto.
  - heading: La estupa roja al atardecer
    body: |
      La imagen que buscáis es la **estupa roja de once pisos**: una torre de ladrillo que al caer la
      tarde se recorta **contra el sol bajo** sobre el Lago del Oeste. Es *el* clásico fotográfico de
      Hanoi —de los que merecen el cliché—, con los pescadores y las parejas en scooter mirando cómo se
      apaga la luz sobre el agua. Para vuestra cámara es un motivo de hora dorada y hora azul: llegad con
      margen antes del ocaso y quedaos hasta que se encienda la ciudad.
  - heading: Cómo visitarla
    body: |
      **Entrada gratuita**, pero rige el recato de cualquier templo en uso: **hombros y rodillas
      cubiertos**, nada de pantalones cortos ni tirantes. Cae en el mismo eje de tarde que el lago
      **Trúc Bạch** y el memorial de John McCain, de modo que la pagoda abre un circuito de atardecer por
      el noroeste que puede rematarse con un **phở cuốn** en la isla de **Ngũ Xã**. Horarios y cualquier
      detalle de acceso, a verificar in situ.
curiosidades:
  - >-
    Con cerca de **1.450 años** y orígenes en el **siglo VI**, es la pagoda más antigua de Hanoi.
  - >-
    Su **estupa roja de once pisos** recortada contra el sol bajo del Lago del Oeste es el clásico
    fotográfico de la ciudad; el mejor momento es el atardecer, no el mediodía.
  - >-
    En el mismo paseo de atardecer conviven la pagoda más antigua de Hanoi y el **relieve que marca
    dónde cayó el avión de McCain en 1967**: casi mil quinientos años de budismo y un derribo de la
    guerra, a unos metros.
