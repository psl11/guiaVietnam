body: >-
  **El** club de jazz de Hanoi, fundado en **1998** por **Quyền Văn Minh**, saxofonista y uno de los
  padres del jazz vietnamita. Nada de turistas de paso: aquí vienen los músicos locales a tocar y a
  escuchar, con **jazz en directo cada noche (21:00–23:00)** en una sala íntima. El plan de noche
  redondo: cena en el casco viejo → aquí a por jazz → y a cerrar con un cóctel en el Haflington.
