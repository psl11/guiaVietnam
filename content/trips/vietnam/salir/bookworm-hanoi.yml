body: >-
  Probablemente **la librería en inglés más famosa del país**: literatura vietnamita traducida,
  historia, fotografía, novelas asiáticas y hasta mapas antiguos. El sitio para llevarse un libro
  sobre Vietnam para el resto del viaje — empezando por *El dolor de la guerra* de Bảo Ninh, que ya
  vais a leer. Abierta 9:00–19:00.
