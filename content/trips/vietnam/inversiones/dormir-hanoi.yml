title: El Hòa Bình y el martini del Metropole
verdict: imprescindible
verdictLabel: La jugada lista
lede: >-
  Dormir en el **Hòa Bình** (palacete de 1926, ~60 €) y beberse el martini de Greene en el **Bamboo
  Bar del Metropole** (15 €) — en vez de pagar 300-500 € por la habitación del Metropole.
ledger:
  - label: Cuesta
    body: >-
      ~60 €/noche el Hòa Bình (3\*, verificado reservable en julio de 2026). El martini, ~15 €.
  - label: Qué compra
    body: >-
      **El Atlanta de Hanoi**: palacete colonial del barrio francés, escalera de madera original,
      grandeza desvaída, a **7 minutos andando** del Bamboo Bar. Duermes dentro del capítulo colonial
      por precio de gama media y pagas la copa en la historia de al lado.
  - label: La alternativa
    body: >-
      La habitación del Metropole (300-500 €) compra un colchón y el búnker «solo para huéspedes» —una
      sala de hormigón de 40 m²—. El relato lo tienes desde la barra por 15 €. Prescindible.
  - label: El veredicto
    body: >-
      **Hòa Bình + martini, y reservar pronto**: que en julio siga siendo un 3\* significa que la
      conversión al 5\* de lujo aún no ha ocurrido — última ventana. Para la noche del 25 (Trung Thu),
      dormir en el casco viejo, más cerca de Hàng Mã.
