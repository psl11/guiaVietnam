kicker: La tentación · el arroz dorado
title: El desvío a Hoàng Su Phì
verdict: prescindible
verdictLabel: Prescindible — por tiempo
lede: >-
  Ban Phung, la joya del arroz en terrazas, madura **exactamente en vuestras fechas**. Sobre el papel
  es vuestro sitio. Y aun así, no — y el motivo no es el dinero.
ledger:
  - label: Cuesta
    body: >-
      No dinero. **Dos días.** Son 2-3 h de carretera lenta al oeste de Hà Giang ciudad, mínimo una
      noche, y otras 2-3 h de vuelta.
  - label: El problema
    body: >-
      En 16 días no hay dos días libres. Los tres únicos donantes cobran caro: **Ninh Bình** (que no
      es redundante — es karst emergiendo de arrozales inundados, no el karst seco de Đồng Văn),
      **comprimir el loop** (adiós al mercado dominical de Mèo Vạc, un evento con fecha) o el **colchón
      anti-tifón del 21**.
  - label: El veredicto
    body: >-
      **No forzarlo.** No es tacañería, es aritmética: ninguna ficha de inversión arregla un
      calendario. La restricción de este viaje no es el dinero, son **16 días**. Disfrutad el oro por
      bolsas de Nậm Đăm, Lũng Tám y Yên Minh — y guardad Hoàng Su Phì para la próxima.
