title: Los vuelos HAN ⇄ Siem Reap
verdict: imprescindible
verdictLabel: Reservado ✓
lede: >-
  **Reservados los dos directos de la tarde.** Sin vuelo interno no hay Camboya en dos días —la
  alternativa es un bus de doce horas—, así que estos billetes son el esqueleto del tramo jemer.
ledger:
  - label: Lo reservado
    body: >-
      **Ida** — mar **22 sep**, HAN **16:20 → SAI 18:05** (1 h 45, directo). **Vuelta** — jue **24
      sep**, SAI **19:05 → HAN 20:50** (el VJ914 que ya barajábamos). Solo cabina, sin maleta
      facturada. Ojo con el aeropuerto: **SAI** es el **nuevo** de Siem Reap (abierto en 2023,
      sustituyó al viejo REP), y está a ~45 km del centro — el traslado al hotel es de casi una hora.
  - label: Por qué encajan
    body: >-
      La **vuelta el jueves 24 por la tarde** —no el viernes— deja **el viernes 25 entero libre para
      Trung Thu** en Hanoi, y aterriza a las 20:50, con margen de sobra ante el vuelo largo del 26. La
      **ida** llega a las 18:05: da para el traslado, la cena y el circo **Phare** esa misma noche,
      antes de que el despertador suene a las **4:15** para el amanecer del equinoccio en Angkor Wat.
  - label: El upgrade que no hizo falta
    body: >-
      Se sopesó pagar ~22 € más por el VN837 de Vietnam Airlines (llega a las 17:10, una hora antes)
      como colchón ante un posible retraso la víspera del amanecer. Al final, VietJet ida y vuelta:
      más simple, y el margen de la noche del 22 basta.
  - label: El veredicto
    body: >-
      **Cerrado.** Los internos eran el punto sin retorno del plan de Camboya; con la vuelta
      protegiendo el viernes de Trung Thu y el vuelo del 26, esta era la combinación buena.
