kicker: Reservar en julio · vuelos internos
title: Los vuelos HAN ⇄ Siem Reap
verdict: merece
verdictLabel: Merece la pena
lede: >-
  **VN837 a la ida + VJ914 a la vuelta = 163 €/persona.** El VN837 compra una hora de sueño antes
  del amanecer del equinoccio; el caro VN836 de la vuelta es prescindible.
ledger:
  - label: Cuesta
    body: >-
      22 €/persona más a la ida (VN837 a 89 € frente a VJ913 a 67 €). La vuelta, con el VJ914 a 74 €,
      es ya la barata.
  - label: Qué compra
    body: >-
      Llegar a Siem Reap a las 17:10 en vez de a las 18:05. Al día siguiente el despertador suena a
      las **4:15** para el amanecer del equinoccio en Angkor Wat: 44 € por pareja blindan una hora de
      sueño antes de *la* mañana del viaje. El argumento real no es la comodidad, es el colchón ante
      un retraso de VietJet.
  - label: La alternativa
    body: >-
      El VJ913 a la ida (67 €) llega a las 18:05, sin margen. Y el VN836 de vuelta (181 €) son **214 €
      por pareja por una hora** que, volando el jueves 24, no cambia nada: prescindible sin discusión.
  - label: El veredicto
    body: >-
      **VN837 + VJ914.** Voláis solo con cabina, así que las tarifas de VietJet sin maleta facturada
      no os penalizan. Confirmar en la pantalla que operan las fechas exactas (son diarios) al comprar.
