kicker: Reservar YA · Hà Giang
title: El loop, easy rider privado — *no* jeep
verdict: imprescindible
verdictLabel: Easy rider privado
lede: >-
  El jeep (~780 € la pareja) frente al easy rider privado (~430-590 €): el jeep es **prescindible, y
  además peor**. Donde de verdad va el dinero es en el formato privado.
ledger:
  - label: El jeep · prescindible
    body: >-
      ~340 € más por pareja para *no mojarte*. Pero la propia tabla lo dice: «cómodo si llueve, **mismas
      vistas**». Y Mã Pí Lèng desde una ventanilla es una postal; en la moto es la experiencia. El
      riesgo de septiembre no es la lluvia, es un **talud que corta la carretera** — y de eso un 4x4 no
      salva. El seguro real es la política de cambio de fecha.
  - label: Privado · imprescindible
    body: >-
      ~65 €/persona más para ir a vuestro ritmo. Jasmine parte las salidas grandes en **grupos de ~10
      motos** parando donde decide el grupo. Con un fotógrafo a bordo, eso no es un matiz: es el viaje.
  - label: Habitación privada
    body: >-
      +28-41 €/noche donde la ofrezcan: merece la pena tras un día de moto y lluvia, con equipo que
      secar. La autenticidad del homestay es la cena con la familia, no el colchón del altillo comunal.
  - label: Innegociable
    body: >-
      Por escrito al reservar: **permiso fronterizo incluido**, **política de cambio de fecha flexible**
      (el seguro antitifón real) y que la póliza de ella **cubra pasajero de moto** — la mayoría lo
      excluye si el piloto no tiene licencia, y eso condiciona el seguro que se contrata en agosto.
