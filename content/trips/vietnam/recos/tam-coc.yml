body: >-
  Dormir **entre los arrozales y los farallones kársticos**, no en la ciudad de Ninh Bình. Tam Coc
  Windy Fields (o similar) pone las montañas en la ventana y deja Hang Mua y la barca de Tràng An a
  tiro. Es la base del bloque de Ninh Bình antes de subir al norte.
