title: El traslado a Hà Giang, de día
area: Ninh Bình → Ha Giang · día 5
note: "Coche privado (~7-8 h) · o Ninh Bình → Hanoi → Ha Giang"
body: >-
  De Ninh Bình a Hà Giang **de día**, no en bus nocturno. Lo más cómodo es un **coche privado** (~7-8 h,
  con parada tranquila para comer, saliendo tras Hang Múa y llegando a media tarde); la alternativa,
  **furgoneta hasta Hanoi + limousine de enlace** a Hà Giang. Cuesta media jornada del día 5, pero se
  llega en cama y descansados: no hay que arrancar el loop reventados de una noche entera en autobús.
