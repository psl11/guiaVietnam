title: Comer chay (vegetariano)
note: "En todo el viaje · abundante, bueno y barato"
body: >-
  La palabra clave es **chay**: cocina vegetariana budista. En Vietnam no es una concesión —hay
  restaurantes *chay* por todas partes, y los días 1 y 15 del mes lunar muchos sitios sacan menú
  vegetariano—. Para ella no es una limitación, es una puerta. En Camboya cuesta un poco más, pero
  se resuelve avisando (como en Cuisine Wat Damnak).
