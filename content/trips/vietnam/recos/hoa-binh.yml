note: "Noches 12·13·21·24 sep · 3★ colonial, gama media"
body: >-
  **El Atlanta de Hanoi.** Palacete colonial de 1926 (el antiguo *Hôtel Splendide*, 27 Lý Thường
  Kiệt), escalera de madera original y grandeza desvaída — y a **7 minutos andando del Bamboo Bar
  del Metropole**. Duermes *dentro* del capítulo colonial por precio de gama media, y el martini de
  Graham Greene cuesta 15 € en la puerta de al lado en vez de 300-500 € la habitación. **Reservar
  YA, con cancelación gratuita, y recomprobar en agosto:** que siga siendo 3★ significa que la
  conversión al 5★ de lujo aún no ha ocurrido — es la última ventana.
