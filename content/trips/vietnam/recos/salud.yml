title: Salud, el dengue y la regla del paracetamol
area: Vietnam + Camboya · todo el viaje
note: "DEET 30-40% · paracetamol, nunca ibuprofeno"
body: >-
  **El riesgo real de estas fechas no es exótico: es el dengue.** Septiembre es plena temporada alta
  en el norte de Vietnam (más de 170.000 casos en 2024), es **urbano** —Hanoi incluida— y el mosquito
  que lo transmite **pica de día**, no al anochecer. Traducción práctica: **repelente con DEET ≥30-40%**
  reaplicado por la mañana y por la tarde, y manga larga ligera al amanecer y al atardecer. Llevadlo
  **desde España**.


  **Y la regla que de verdad importa saberse: con fiebre, paracetamol — NUNCA ibuprofeno ni
  aspirina.** Si esa fiebre fuera dengue, los antiinflamatorios aumentan el riesgo hemorrágico. Es el
  único dato de esta tarjeta que puede cambiar un desenlace.


  **Malaria: riesgo prácticamente nulo en todo el itinerario** (Hanoi, Ninh Bình, las zonas turísticas
  de Hà Giang, y Siem Reap ciudad con los templos, sin transmisión conocida). **No hay que tomar
  profilaxis** — solo protección antimosquitos. Ahorra una consulta y un tratamiento innecesario.


  **Vacunas** (ninguna obligatoria): **hepatitis A** es la esencial, **tétanos-difteria** al día, y
  **fiebre tifoidea** es recomendable en este viaje —mucha comida fuera y días en zona rural—. La
  encefalitis japonesa se indica sobre todo para estancias largas en el campo: para tres o cuatro días
  en Hà Giang el riesgo es muy bajo, decisión individual con el Centro de Vacunación. *(El seguro con
  evacuación y la cobertura como pasajero de moto están en [su propia ficha](#seguro-vacunas).)*


  **Agua y hielo:** jamás del grifo, ni para lavarse los dientes en hoteles baratos. El hielo de
  restaurantes y cafés establecidos es **industrial —cilíndrico y con agujero— y se considera seguro**;
  el picado callejero, no. Fruta pelada por vosotros, comida caliente y de rotación alta.


  **Botiquín:** sales de rehidratación, loperamida, **paracetamol**, antihistamínico, **biodramina para
  las curvas de Hà Giang**, tiritas, crema antibiótica y protector solar 50.
