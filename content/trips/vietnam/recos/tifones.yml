body: >-
  Agosto-octubre son **los** meses de tifones del golfo de Tonkín. En septiembre la trayectoria empieza
  a desplazarse hacia el centro del país, pero **el norte sigue expuesto**: Yagi tocó tierra cerca de
  Hanoi un **7 de septiembre**. Y si uno entra, lo que pasa es concreto: **dos o tres días de vuelos
  cancelados en Hanoi, carreteras de montaña cortadas, y riesgo de derrumbes en Hà Giang los dos o tres
  días siguientes** por saturación del terreno — el peligro no es la lluvia, es el talud.


  La guía ya lleva el airbag puesto: [el día colchón](#dia-11-hanoi-vuelta) y la flexibilidad del
  [loop](#loop-ha-giang). Lo que faltaba es **cómo saber que hay que usarlo**, porque esa decisión se
  toma **una semana antes de volar**, no sobre el terreno.


  **Cómo monitorizar, desde ~7 días antes:** **nchmf.gov.vn** (la agencia meteorológica oficial
  vietnamita, con versión en inglés), **Windy.com** con la capa de ciclones activada, zoomearth.com, y
  los avisos del **JTWC**.


  **La regla, sin adornos: con un tifón anunciado, se adelanta o se retrasa Hà Giang y os quedáis en
  ciudad.** Con una carretera de montaña mojada no se negocia.
