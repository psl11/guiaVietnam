title: Bún chả Hương Liên
area: Hanoi · el de Obama y Bourdain
note: "Bún chả · la «combo Obama», ~4 €"
body: >-
  Donde **Obama y Anthony Bourdain** cenaron por seis dólares en *Parts Unknown* (2016) — hay hasta
  una mesa-vitrina que lo conmemora. Bún chả: cerdo a la brasa con fideos de arroz y hierbas. De
  nuevo carne; aquí el valor es tanto el plato como la peregrinación cinéfila.
