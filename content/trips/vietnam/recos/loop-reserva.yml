note: "Easy rider privado · ~430-590 €/pareja · reservar YA"
body: >-
  **Reservar ya.** Easy rider privado (ni jeep, ni grupo). Innegociables, **por escrito**: (a)
  **permiso de zona fronterizo incluido**; (b) **política de cambio de fecha flexible** —el seguro
  antitifón de verdad—; (c) que reencaminen en tiempo real si se corta una carretera. **Ojo: es
  5D/4N, no 4D/3N** — pedir el formato corto os cuesta el mercado dominical de Mèo Vạc. Y si vais en
  moto, que la **póliza cubra al pasajero**. A cotizar: Ha Giang Epic, Jasmine Tours, QT
  Motorbikes.


  **La propina, que nadie explica y es el momento incómodo del viaje:** al easy rider se le da
  **100.000–170.000 ₫ por día y viajero** (o un **5-10 % del precio del tour**), **en đồng y en mano, al
  final**. Para estos 5 días y dos viajeros, la horquilla razonable sale de **1 a 1,7 millones de ₫**.
  No es obligatoria, pero es la norma — y con un conductor que os ha llevado cuatro noches por la
  montaña, llegar sin saberlo se nota.
