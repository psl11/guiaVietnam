title: Grab
area: "Hanoi (y Camboya: Grab / PassApp)"
note: "La app de coche y moto · precio cerrado"
body: >-
  El «Uber» del sudeste asiático: coche o moto con **precio cerrado en la app**, sin regatear ni
  malentendidos de idioma. Del aeropuerto de Nội Bài al casco viejo, ~7 €. En Camboya funciona Grab
  y también **PassApp** (los tuk-tuks con taxímetro).
