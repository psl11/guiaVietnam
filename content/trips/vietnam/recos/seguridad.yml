title: Los cinco timos, y la cámara en la mano
area: Hanoi sobre todo · también Siem Reap
note: "Grab siempre · correa de muñeca para la cámara"
body: >-
  Ninguno de estos es peligroso: son **sablazos de manual**, verificados y vigentes. Conocerlos los
  desactiva.


  **1. El taxímetro trucado.** Por eso [Grab](#grab) o Xanh SM (taxis eléctricos), siempre, con el
  precio cerrado antes de subir.


  **2. La pértiga de fruta** — y esta os interesa especialmente. Una vendedora **te planta la pértiga
  con los cestos al hombro** para que te hagas *la foto*, y acto seguido exige que compres una bolsa de
  fruta a precio disparatado. Es exactamente la estampa que vais a querer fotografiar en el casco
  viejo, así que va la regla: **no aceptéis nada que os pongan en la mano o al hombro**. Si queréis el
  retrato, se pide permiso —y comprar algo primero abre todas las puertas—.


  **3. El zapatero servicial** que se agacha, te **quita la sandalia** para «coserla» y luego pide
  200.000–500.000 ₫ (~7–17 €).


  **4. Los cyclos** que multiplican el precio pactado «por persona» al bajarse.


  **5. El estudiante de inglés.** Junto al **Hoàn Kiếm**, alguien de aspecto simpático te aborda para
  «practicar inglés» o «tomar un té»; acabas en un bar o café cómplice con una **cuenta de cientos de
  dólares**. Cortés pero sin pararte: la orilla del lago es zona de paseo, no de amigos nuevos que
  insisten.


  **El robo del móvil desde la moto sí es real** en Hanoi: tirones al vuelo junto al bordillo. **Bolso
  cruzado por el lado del edificio, el móvil nunca en la mano junto a la calzada**, y para la
  X100VI, **correa de muñeca** — que además es la que deja disparar rápido.


  **Camboya:** Siem Reap es tranquila; evitad callejones de noche y poco más. En los templos, dos
  sablazos suaves: **falsos monjes** que atan una pulsera «bendecida» y luego piden dinero, y quien te
  enciende **incienso en el Bayon** para cobrarte por la foto. Y una regla que esta guía ya defiende en
  Hà Giang: **no compréis a los niños vendedores ni les deis dinero** —alimenta que no pisen la
  escuela—; si queréis ayudar, mejor a una ONG. El problema serio del país (Sihanoukville, la frontera
  tailandesa) no os toca. Aviso de peso: las penas por drogas llegan
  a **cadena perpetua**. Y allí [Grab](#grab) convive con **PassApp**, la app local de tuk-tuks — tened
  las dos.
