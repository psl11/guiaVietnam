note: "Noche del 25 sep · La Siesta Classic o Maison d'Orient"
body: >-
  La noche del 25 es **distinta a las demás de Hanoi**: aterrizáis de Siem Reap a las 20:50, y
  **Hàng Mã** —la calle de Trung Thu— está a media hora andando del barrio francés, pero al lado del
  casco viejo. Y la mañana del 26 es casco viejo puro: Hàng Mã ya vacía, egg coffee en el balcón del
  **Café Đinh**. Para esa última noche, dormir aquí (La Siesta Classic Mã Mây, Maison d'Orient) — no
  cuesta más, y ya son estancias separadas de todas formas.
