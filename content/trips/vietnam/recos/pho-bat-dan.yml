title: Phở Bát Đàn
area: Hanoi · casco viejo
note: "Phở bò · se hace cola · ~2 €"
body: >-
  El phở de culto de Hanoi: se hace cola, se paga, se coge el cuenco y se come en un taburete. Es
  **phở bò** (de ternera), así que es cosa de él —ella tiene su universo *chay* al lado—. El
  desayuno más hanoiense que existe.
