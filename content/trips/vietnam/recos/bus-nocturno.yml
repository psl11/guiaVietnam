body: >-
  El directo **Ninh Bình → Hà Giang** de noche (Bằng Phấn, cabina VIP): se sale la tarde del 15 y se
  llega al amanecer del 16, justo para arrancar el loop — ahorra un día y una noche de hotel. Se
  reserva con antelación. Dormir en bus-cama cansa, y por eso la etapa del día 6 es corta a propósito.
