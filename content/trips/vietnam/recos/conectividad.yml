title: La SIM que hay que comprar nada más aterrizar
area: Noi Bai T2 · llegadas
note: "Viettel, ~10 USD ≈ 20+ GB · activa en 5 min"
body: >-
  **Se compra en la propia llegada de Noi Bai (T2)**, en los kioscos de Viettel y Vinaphone, abiertos
  de ~6:00 a 2:00. Y para **este** itinerario la elección no es indiferente: **Viettel**, porque su
  **cobertura en Hà Giang es claramente superior** a la del resto. Precio de turista: 125.000–375.000 ₫
  (5–15 USD), con la regla de oro de que **~10 USD son 20 GB o más**. La SIM física la activan con el
  pasaporte en cinco minutos, antes de salir a buscar el Grab.


  **En el loop**, la cobertura de Viettel es decente en los pueblos —Đồng Văn, Mèo Vạc, Yên Minh— pero
  hay **zonas muertas en los tramos de montaña**, Mã Pí Lèng incluido. De ahí que los **mapas offline**
  (Google Maps y Maps.me) haya que descargarlos **antes de subir**, no cuando hagan falta.


  **Camboya**, por tres días, no merece cola: **eSIM de Airalo (red Smart), 4,50–13,50 USD**, activada
  antes de aterrizar y lista al encender el móvil. Si preferís lo más barato, una SIM local Smart en el
  aeropuerto de Siem Reap son 5 USD por 30 GB / 15 días.
