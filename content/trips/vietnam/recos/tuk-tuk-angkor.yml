title: Tuk-tuk y guía en Angkor
area: Siem Reap · días 13 y 14
note: "Pase Angkor 62 US$/p (3 días) + tuk-tuk, guía y barca ~130-180 €"
body: >-
  La **entrada va aparte**: el pase de **Angkor Enterprise** es de **3 días y 62 US$/persona**, y
  conviene **comprarlo online la noche del 22** (angkorenterprise.gov.kh) — lleva foto, es **nominal**
  y se valida con **QR** en cada control. Ya dentro, el transporte es el **tuk-tuk**: el conductor os
  espera entre templo y templo y conoce los horarios de la luz. Para los bajorrelieves de Angkor Wat
  merece **una mañana de guía** que lea la piedra (un guía oficial con licencia son **~35 US$/día** en
  la oficina de turismo, buen ancla para lo que os cotice el hotel). El hotel os lo organiza; incluid la **barca del
  Tonlé Sap** (Kampong Phluk) del día 13. Propinas habituales: **1-2 US$/día al conductor, 5-10
  US$/día al guía**. Horarios: casi todos los templos abren **7:30–17:30**; **Angkor Wat abre a las
  5:00** para el amanecer, y **Pre Rup y Phnom Bakheng** cierran a las **19:00** (los del atardecer).
