title: Tuk-tuk y guía en Angkor
area: Siem Reap · días 13 y 14
note: "2 días tuk-tuk + 1 mañana de guía + barca · ~130-180 €"
body: >-
  En Angkor el transporte es el **tuk-tuk**: el conductor os espera entre templo y templo y conoce
  los horarios de la luz. Para los bajorrelieves de Angkor Wat merece **una mañana de guía** que lea
  la piedra. El hotel os lo organiza; incluid la **barca del Tonlé Sap** (Kampong Phluk) del día 13.
