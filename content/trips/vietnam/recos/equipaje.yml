title: Por qué el solo-cabina funciona (y el moho en las lentes)
area: Antes de volar
note: "Lavandería 1-1,5 €/kg · gel de sílice para la cámara"
body: >-
  **Lo que hace viable las dos mochilas de cabina para dieciséis días es la lavandería**, y conviene
  saberlo antes de hacer el equipaje: en el casco viejo de Hanoi son **30.000–50.000 ₫/kg (1-1,5 €)**
  con entrega en 4–24 h, y en Siem Reap **~1 USD/kg**. Con eso, **ropa para cinco o seis días y lavar
  dos veces** — no es una temeridad, es el plan.


  **Tres climas en una mochila.** Base de calor húmedo: camisetas técnicas o de lino, **pantalón
  ligero largo** (sirve para templos y para los mosquitos), sandalias y zapatillas. Para **Hà Giang**,
  añadid **un forro polar fino o midlayer** —las noches a 20 °C, en moto, se sienten frías— y un
  cortavientos. Lluvia: chubasquero fino sí, paraguas no (los ponchos cuestan 20.000 ₫ en cualquier
  tienda, y los tours del loop suelen prestar el de moto). Calzado que pueda mojarse y seque rápido.


  **Y el aviso para la cámara, que es de los que se agradecen tarde:** con **80-90 % de humedad** y
  entradas y salidas constantes del aire acondicionado, el objetivo se empaña y **el moho en las lentes
  es un riesgo real**, no una leyenda. Llevad **varias bolsas de gel de sílice** (regenerables) en la
  bolsa de la cámara, **aclimatad el equipo unos 10 minutos al salir del AC antes de abrirla**, y
  meted una bolsa estanca o un zip grande para los chaparrones de media tarde de Siem Reap.
