body: >-
  Dos noches (mar+mié) en la zona **Wat Bo / Wat Damnak**. Viroth's Villa, Baby Elephant o Rambutan
  — la clave es que **tenga piscina**: aquí no es lujo de folleto, es la **siesta que hace posible
  el doble turno de luz** del día grande (el amanecer del equinoccio en Angkor Wat y, doce horas
  después, el crepúsculo sobre el Tonlé Sap).
