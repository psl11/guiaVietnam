title: Egg coffee — Giảng y Đinh
area: Hanoi
note: "Cà phê trứng · la yema montada sobre el café"
body: >-
  El **cà phê trứng**: yema de huevo batida con leche condensada sobre café caliente, un postre
  líquido que inventó el **Café Giảng** en los años 40, cuando escaseaba la leche. El **Café Đinh**
  lo sirve en un balcón destartalado sobre el lago Hoàn Kiếm — el sitio para el último café del viaje.
