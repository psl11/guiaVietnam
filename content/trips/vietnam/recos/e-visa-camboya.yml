title: Visados y tarjetas de entrada
area: Camboya en agosto · Vietnam 72 h antes
status: pendiente
note: "Camboya e-visa ~36 US$ · Vietnam: tarjeta de llegada digital (gratis, obligatoria)"
body: >-
  **Vietnam:** **sin e-visa** (exención de 45 días para España; pasaporte válido hasta marzo 2027).
  **Pero desde el 15 de junio de 2026 es obligatoria la Tarjeta de Llegada Digital** —también para los
  exentos de visado, y aplica a Noi Bai—: es **gratis**, en la web **oficial**
  prearrival.immigration.gov.vn, se rellena en las **72 horas antes** de volar y genera un **QR** que se
  guarda para inmigración. Ojo con los clones de pago; la oficial es gratuita.


  **Camboya:** **e-visa en agosto**, solo en la web **oficial** (evisa.gov.kh) —hay clones que cobran el
  doble—; cuesta **~36 US$** (30 de visado + ~6 de gestión). Y del **15 al 21 de septiembre**, la
  **e-Arrival Card** de Camboya (gratis, en arrival.gov.kh; otro QR que guardar). Comprobad además que
  los pasaportes valgan **6 meses** desde la entrada.
