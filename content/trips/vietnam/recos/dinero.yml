title: Cajeros, tarjetas y los billetes que hay que traer de casa
area: Vietnam (đồng) + Camboya (USD)
note: "VPBank sin comisión · dólares nuevos para Camboya"
body: >-
  **Vietnam** (1 € ≈ 30.000 ₫). Casi todos los cajeros cobran 20.000–55.000 ₫ (~0,70–1,80 €) por reintegro con
  límites de 2–5 millones. La excepción que hay que buscar: **VPBank — sin comisión para tarjetas
  extranjeras y hasta 10.000.000 ₫ (~330 €) de una vez**, el mejor con diferencia. Y el aviso que las guías
  viejas no han actualizado: **TPBank dejó de ser gratis en junio de 2025** (~3,3 %) — evitadlo aunque
  lo sigáis leyendo recomendado por ahí.


  Dos reglas: **sacad importes grandes de una vez** (la comisión es por operación, no por cantidad) y
  **rechazad SIEMPRE la conversión dinámica** — cuando el cajero ofrezca cobrar en euros, elegid
  **«charge in VND»**. Aceptar la conversión es regalar entre un 3 y un 8 % en cada saque.


  Las tarjetas sin comisiones funcionan bien en cajeros, hoteles y restaurantes medios; **el comercio
  pequeño y el street food son efectivo**. Vietnam es «QR-first», pero los monederos locales exigen
  cuenta bancaria vietnamita: para un europeo, no es una opción.


  **Camboya funciona en dólares de facto** — el riel (≈4.100 por USD) es solo la calderilla para lo
  que baja de 1 USD. Y aquí está **la acción que hay que resolver en España, no allí**: llevad
  **billetes de dólar NUEVOS, de la serie posterior a 2006, sin roturas ni marcas** — los rotos o
  pintados se rechazan sin más. Composición ideal: **muchos de 1, 5 y 10**, y algún 20 o 50 para el
  hotel. **Los de 100 dan problemas.** Los cajeros de Siem Reap dispensan dólares, pero cobran 5-6 USD
  por reintegro.
