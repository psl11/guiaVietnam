body: >-
  La **alta cocina jemer** de Siem Reap, en la lista **Asia's 50 Best Discovery**. Detrás están los
  **«gemelos Kimsan»** (Kimsan Pol y Kimsan Sok) y un **equipo de cocina íntegramente femenino**, que
  reconstruyen recetas y técnicas camboyanas antiguas en un comedor luminoso y lleno de plantas. Menú
  degustación de temporada, y —clave para vosotros— **montan la degustación entera en versión vegetariana
  si se avisa al reservar**. La cena para tirar la casa por la ventana una noche.
