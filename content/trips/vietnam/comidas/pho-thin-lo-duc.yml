quePedir: >-
  Solo hay una cosa y se pide sola: **phở bò tái lăn**, el bol único de la casa. Ternera **salteada al
  ajo en el wok** antes de bañarla con el caldo —de ahí el brillo oscuro y el punto ahumado.
body: >-
  La **cuna del *phở tái lăn***: aquí el señor Thìn se sacó de la manga saltear la ternera con ajo antes
  de montar el bol, y cambió la gramática del plato. Caldo más oscuro y goloso, mucho *hành* (cebolleta),
  una cola que no para desde el desayuno. **Icono rotundamente cárnico** —por eso vive en los
  intocables—, y aun así una de las paradas de *phở* más legendarias de Hanoi.
