body: >-
  Una **villa colonial de 100 años** llena de plantas y de bocetos de artistas locales, donde se
  mezclan viajeros, escritores y estudiantes vietnamitas — el arquetipo del café como *tercer
  espacio* (se lee y se trabaja durante horas). Cocina paneuropea con carta vegetariana de verdad, y
  **noches de música en vivo**. Abierto 8:00–23:00.
