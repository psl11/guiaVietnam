quePedir: >-
  El *chè* que pida el cuerpo según el calor: *chè đỗ đen* (judía negra dulce), *chè thập cẩm* (surtido
  con jaleas y frutas) o el que marque la temporada —de ahí el nombre, «cuatro estaciones».
body: >-
  Más de **cuarenta años** sirviendo *chè* —los cuencos dulces de judía, jalea, fruta y hielo que son
  el postre-refresco de Hanoi— desde el mismo escaparate de Hàng Cân. Prácticamente **todo es vegetal**,
  así que es la parada de dulce más redonda para la pareja en pleno casco viejo. Fresquito, baratísimo,
  de toda la vida.
