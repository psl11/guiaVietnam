body: >-
  El **rooftop para el atardecer**: en lo alto del **Shinta Mani Angkor**, hotel de diseño en el Kandal
  Village, con vistas de 360º sobre la ciudad y los arrozales. Ambiente cuidado, servicio atento y una carta
  de cócteles que juega con **fruta y especias camboyanas**. Más caro que la coctelería del centro (es bar de
  hotel), pero el **aperitivo con el cielo encendido** lo justifica. Código *smart-casual*: nada de chanclas.
