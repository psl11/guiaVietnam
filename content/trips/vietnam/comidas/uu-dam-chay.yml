body: >-
  El **chay de referencia** de la ciudad, con **Bib Gourmand** y cocina *zero-waste* (los restos van
  a encurtidos; el arroz sobrante, a pasteles crujientes). Producto de primera y ambiente sereno de
  arte budista: es una **cena estupenda para los dos**, sin que ninguno renuncie a nada. La mejor
  respuesta a que los grandes clásicos de Hanoi no sean aptos para ella.
