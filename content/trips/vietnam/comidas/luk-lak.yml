quePedir: >-
  Los clásicos del norte pasados por alta cocina; para la mesa vegetariana, los **rollitos veganos**
  con menta, el **arroz frito en hoja de loto** con semillas y verduras, y la **berenjena** con salsa
  de chalota.
body: >-
  El **Bib Gourmand** más cómodo de recomendar: cocina vietnamita con oficio de hotel y precio todavía
  sensato, en un caserón colonial de tres plantas al sur del lago, a tres minutos de la Ópera. No es
  una casa vegetariana —el foco es carne y pescado— pero **trata sus platos veg como platos, no como
  guarnición**, que es justo lo que suele fallar en este nivel. Buen sitio para un almuerzo largo el
  día del barrio francés.
