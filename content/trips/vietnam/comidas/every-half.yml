quePedir: >-
  Un **single-origin en pour-over** de su selección rotativa por origen y temporada; los cold brews
  de autor; y si tienen **Liberica de procesado Koji**, no lo dejéis pasar.
body: >-
  El proyecto que mejor articula la tesis de la nueva ola vietnamita: *«el café de este país merecía
  una historia mejor»*. Tratan **arábica, robusta y liberica por igual**, sin complejos, con sourcing
  directo en Điện Biên, Pleiku, Lâm Đồng y Buôn Ma Thuột. Es vuestra parada **más seria** de café de
  especialidad en Hanoi — justo lo que pediste priorizar.
