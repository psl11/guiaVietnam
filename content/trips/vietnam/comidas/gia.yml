body: >-
  La **estrella con relato**: doce pases de estacionalidad vietnamita en una casa *indochine* de
  contraventanas y luz baja frente al Templo de la Literatura. Es la **cena-acontecimiento** del viaje
  —la que se reserva con semanas de antelación y se recuerda—, y admite un menú vegetariano completo
  avisando. Si de todo Hanoi elegís *un* golpe de alta cocina, este es el candidato.
