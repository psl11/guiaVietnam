body: >-
  El **desayuno más cómodo de recomendar** en Siem Reap: empresa social a la orilla del río, junto al
  Old Market, que **destina sus beneficios a APOPO** (la ONG que desmina Camboya con ratas rastreadoras).
  Cocina sana y luminosa con la carta más **veg-friendly** de la ciudad —bowls, ensaladas, opciones
  veganas y sin gluten señaladas—, así que aquí desayunáis los dos sin negociar nada. La parada natural
  antes de callejear el mercado.
