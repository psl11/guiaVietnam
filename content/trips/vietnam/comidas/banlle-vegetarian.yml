quePedir: >-
  Lo que salga del **huerto del día**: curris y salteados de temporada, flores y raíces, y la versión
  **vegetal del amok**. Carta corta que cambia con la cosecha.
body: >-
  La mesa **100% vegetal** de referencia en Siem Reap, del chef **Pola Siv** —uno de los cocineros más
  ecoconscientes del país—. Es **granja-a-mesa literal**: verduras, hierbas y flores crecen en el jardín
  que rodea la casa de madera, con compost propio y apoyo de la ONG agrícola Agrisud. Cocina jemer honesta
  con toques occidentales y **cero riesgo de salsa de pescado** por definición. La opción por defecto para
  comer tranquilos, a un paso del Old Market.
