quePedir: >-
  Un **single-origin en filtro** de su selección rotativa; si tienen **origen camboyano** (Mondulkiri,
  Ratanakiri), pedidlo: es justo la parada para probar el café del país en su versión de especialidad.
body: >-
  El **tostadero serio** de Siem Reap: sitio sencillo, sin postureo, con el tostador a la vista y grano
  de calidad tratado por origen. Es de los pocos lugares de la ciudad donde beber **café de especialidad
  de verdad** —y donde catar el **origen camboyano** frente al habitual robusta con leche condensada—.
  Vuestra parada de cafetero exigente, la que hace juego con la del norte de Vietnam. Está algo apartado
  del centro; encaja de paso o en taxi corto.
