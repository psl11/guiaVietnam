quePedir: >-
  El **cà phê trứng** (café-huevo) caliente, en su casa madre; en verano, la versión sobre hielo.
body: >-
  **Aquí nació el café-huevo**, en 1946, cuando **Nguyễn Văn Giảng** —barman del Metropole— batió yema
  con azúcar para suplir la leche que la guerra había hecho desaparecer. Se bebe al fondo de un
  **pasillo estrecho** en el nº 39, hoy en manos de su hijo: debajo, robusta filtrado gota a gota;
  encima, una crema tibia que **sabe a tiramisú líquido**. Beberlo en la fuente, y no en la copia de
  moda de turno, es la diferencia entre probar un plato y **entender de dónde viene**.
