body: >-
  El **callejón del mercado Đồng Xuân**: puestos que llevan generaciones en el mismo palmo, cada uno
  con **su** especialidad y una **rotación altísima** —la mejor garantía de frescura que existe—. Es el
  sitio para ver el filtro funcionando solo: seguid a la clientela local y al humo. Ojo veg, que los
  caldos estrella (*bún riêu*, *bún ốc*) llevan pasta de gamba o cangrejo; lo dulce y algún *bún* sin
  carne sí entran.
