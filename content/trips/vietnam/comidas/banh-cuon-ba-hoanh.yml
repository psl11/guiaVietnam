quePedir: >-
  **Bánh cuốn**: finísimas láminas de arroz cocidas al vapor *al momento* y enrolladas sobre carne
  picada y *shiitake*, con chalota frita por encima. En versión veg, pedirlos *không nhân* (sin
  relleno) o solo de seta, y dejar fuera el *chả*. El extra de *cà cuống* (esencia de escarabajo de
  agua) es la nota de autor que dispara el precio.
body: >-
  Más de **70 años** cociendo bánh cuốn en la misma esquina de Tô Hiến Thành, con la lámina hecha al
  vapor delante de vosotros: la prueba de que el plato vive de la **frescura al segundo**, no de la
  receta. Está en la **selección Michelin** y presume de currículum diplomático —fue uno de los
  bocados servidos en la cumbre EE. UU.–Corea del Norte de 2019 en Hanoi—. Queda algo al sur del
  casco viejo: un paseo corto o un *Grab* de camino a otra cosa.
