body: >-
  **El primer bar vietnamita que entró en el Top 50 de Asia's 50 Best Bars** (nº 47 en 2024, con el
  premio al Mejor Bar de Vietnam; nº 87 en la lista de 2025). Un *speakeasy* escondido tras un pasillo
  estrecho de Hàng Mã —pavo real disecado al pie de la escalera— que despliega dos y tres plantas de
  casa colonial como un **museo de historia natural** victoriano, con un **esqueleto de dinosaurio**
  suspendido sobre la barra. Coctelería clásica de altísimo nivel, y en pleno casco viejo: la copa de
  autor más fácil de encajar cualquier noche.
