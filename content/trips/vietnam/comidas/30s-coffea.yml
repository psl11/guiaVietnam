body: >-
  Roaster-retailer con **varias sedes en el casco viejo** y **tueste propio**: uno de esos sitios donde
  el café que bebéis se ha tostado a metros de la barra. Su fundador acumula **más de diez años** de
  barra y tostador, y la carta reparte juego entre **arábica de altura y fine robusta**. **Sprudge** lo
  cita como muestra de la Hanoi que está reescribiendo su café — y, por ubicación, es el tostadero de
  especialidad **más cómodo de encajar** cualquier día del casco viejo.
