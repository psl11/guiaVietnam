body: >-
  Tạ Hiện es la **esquina de la cerveza** del casco viejo —taburetes de plástico, jarras heladas,
  bullicio hasta tarde— y también la más turística, así que conviene saber **leer un puesto**. Las
  cuatro señales que rara vez fallan en Hanoi: **(1) clientela local** comiendo (si solo hay turistas,
  sospechad); **(2) especialización** —el bueno hace *una* cosa, no una carta de veinte—; **(3)
  rotación** —producto que vuela es producto fresco—; y **(4) todo a la vista**, cocinado delante de
  vosotros. Con ese filtro, hasta la calle más turística da alegrías.
