quePedir: >-
  El **chả cá**: *cá lăng* (siluro) marinado en cúrcuma y galanga, a la brasa y luego **salteado en la
  mesa** en sartén al chisporroteo con montañas de eneldo y cebolleta. Se come con *bún*, cacahuete y
  *mắm tôm*.
body: >-
  El plato que tiene **calle propia** en Hanoi, aquí con **Bib Gourmand** y sin la turistada del vecino
  más famoso: os traen la sartén encendida y el ritual se remata en vuestra mesa —cúrcuma, eneldo a
  puñados, humo—. Es **pescado de principio a fin**, así que va a los intocables, pero como espectáculo
  de cena en el casco viejo cuesta encontrar algo tan hanoiense.
