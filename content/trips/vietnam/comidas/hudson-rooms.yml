body: >-
  El **rooftop** del Capella Hanoi, junto a la Ópera, que recrea la **Nueva York dorada de los años
  veinte** con guiño a Wes Anderson. La carta es un viaje en tren desde Grand Central —cuatro rutas,
  cuatro familias de tragos— y la barra guarda la **mayor colección de whiskies de Vietnam** (unas 200
  etiquetas). Entró en la lista ampliada de **Asia's 50 Best Bars 2024**. Copa de autor con vistas, en
  el mismo barrio francés del paseo del Día 3.
