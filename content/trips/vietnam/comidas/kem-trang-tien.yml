quePedir: >-
  El *kem que* (helado de palo) en los sabores de la casa: *đậu xanh* (judía verde), *cốm* (arroz joven)
  y coco. Se compra en ventanilla y se come de pie, en el patio, con todo Hanoi.
body: >-
  **Institución nacional desde 1958**: no es una heladería, es un **rito hanoiense**. Se entra al patio,
  se compra en ventanilla y se come **de pie**, hombro con hombro con familias y parejas, en un sabor
  que huele a era socialista. Los de agua —judía verde, *cốm*, coco— son **aptos sin problema**. Cae en
  Tràng Tiền, entre la Ópera y el lago: postre de paso perfecto.
