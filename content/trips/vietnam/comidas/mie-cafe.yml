body: >-
  El **jemer creativo** del chef **Pola Siv** —el mismo de Banlle—, aquí en la casa de madera de su abuela,
  con huerto propio en el patio. Formado en Suiza y en cocina de estrella, hace versiones **finas y estacionales**
  de los platos de su infancia, servidas con mimo europeo y carta que cambia a menudo. La parte vegetariana
  **hay que pedirla por adelantado** (no hay apartado fijo), pero con aviso montan algo a medida. Cena con
  alma, a un paso del museo.
