quePedir: >-
  Un **cà phê nâu** (café con leche condensada) en phin, el clásico de la casa, mientras se leen las
  paredes.
body: >-
  El café de los **artistas** desde finales de los cuarenta. En los sesenta y setenta, pintores como
  **Bùi Xuân Phái, Nguyễn Sáng o Dương Bích Liên** y escritores como **Văn Cao** pagaban aquí sus
  consumiciones **con cuadros**: el dueño, el señor Lâm, acabó siendo coleccionista sin proponérselo, y
  las paredes son hoy una **pinacoteca informal** del arte moderno vietnamita. Se viene tanto por la
  historia colgada como por el café — el reverso bohemio del egg coffee que se sirve calle abajo.
