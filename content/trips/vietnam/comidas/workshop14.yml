body: >-
  El **fichaje del año**: abrió junto al **Lago del Oeste** a finales de 2024 y en siete meses se llevó
  el **Campari One To Watch** de Asia's 50 Best Bars 2025, debutando en el puesto 83. Fusiona
  **ingredientes vietnamitas** y técnica de vanguardia —destilación molecular, redestilados al vacío—
  en un espacio donde la artesanía tradicional se cruza con el diseño contemporáneo. Su ubicación lo
  ata al **día del Lago del Oeste**: es la copa con la que rematar esa jornada, no una escapada desde
  el casco viejo.
