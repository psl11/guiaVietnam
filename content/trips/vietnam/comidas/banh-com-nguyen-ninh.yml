quePedir: >-
  El **bánh cốm**: un cuadrado verde de *cốm* (arroz joven prensado) relleno de pasta dulce de judía
  verde, envuelto y perfumado. Se venden sueltos o en cajas para regalo.
body: >-
  La **casa madre del bánh cốm**: un obrador de **1865** en Hàng Than —la «calle de los dulces de
  boda»— que sigue haciendo a mano el pastelito verde que se regala en pedidas y bodas. No es sitio de
  sentarse: se entra, se compra la caja y se sigue. Un **souvenir comestible** con siglo y medio detrás,
  y de paso la excusa para ver Hàng Than. Enteramente vegetal.
