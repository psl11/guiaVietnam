body: >-
  El **chay del Lago del Oeste**: cuatro plantas serenas junto al lago de Trúc Bạch, con una carta
  larguísima de cocina budista vegetal, cuidada de sabor y de plato. Cae **al lado de Ngũ Xã**, así que
  remata de maravilla el día que subís a Tây Hồ: paseo por el agua, *phở cuốn* de picoteo y aquí la
  cena tranquila. Uno de los *chay* mejor valorados por la comunidad vegetariana de la ciudad.
