quePedir: >-
  La **degustación de dulces jemer**: *bobor* de arroz negro con longan y jaca, arroz glutinoso con crema
  de taro, mango con jalea de coco y sirope de loto, plátano caramelizado con fritura de arroz crujiente.
body: >-
  Una ventana a la **repostería jemer tradicional** —dulces de arroz, coco, taro y fruta— servida como
  **tabla de degustación** en una casa colonial frente al Old Market. Es un proyecto de **Senteurs d'Angkor**,
  la marca de productos naturales camboyanos, con café/tienda y spa. **Aviso importante**: la casa ha virado
  hacia el spa y hay señales contradictorias sobre si mantiene la carta de postres (Google Maps llegó a
  marcarla como cerrada; hay página de Facebook activa de 2024). **Confirmad antes de ir**; si sigue, es de
  los pocos sitios donde probar el dulce jemer de un tirón.
