body: >-
  La coctelería que ayudó a abrir el camino de la mixología moderna en Hanoi (desde 2017), en un local
  pequeño y penumbroso con música en vivo, a un paso del lago. Su leyenda es el **cóctel «Phở»**, que
  traslada el plato nacional a la copa: **gin infusionado con las especias del caldo**, obra de
  **Phạm Tiến Tiệp**, elegido Mejor Bartender de Vietnam en el World Class. Pedir un phở para *beber*,
  después de haberlo comido a cucharadas, es el mejor guiño gastronómico de la ciudad.
