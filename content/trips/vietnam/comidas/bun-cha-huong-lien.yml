body: >-
  Donde **Obama y Anthony Bourdain** cenaron por seis dólares en *Parts Unknown* (2016) — hay una
  mesa-vitrina que lo conmemora. Bún chả honesto y barato: cerdo a la brasa con fideos de arroz y
  hierbas. El valor es tanto el plato como la peregrinación cinéfila.
