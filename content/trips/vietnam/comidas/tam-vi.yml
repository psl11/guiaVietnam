quePedir: >-
  El *mâm cơm*, la mesa familiar del norte: pescado en cazuela de barro (*cá kho*), *nem*, y —para la
  parte vegetariana— *rau muống xào tỏi* (espinaca de agua al ajo), tofu y una *canh* (sopa clara) de
  temporada. Se comparte todo, como en casa.
body: >-
  La **estrella Michelin menos intimidante** de Hanoi (distinguida sin interrupción desde 2023): nada
  de vanguardia, sino la **comida casera del norte llevada a su punto exacto**, en una casa de madera
  con olor a arroz caliente y *nước mắm* junto al Templo de la Literatura. Avisando al reservar montan
  una mesa vegetariana honesta con verduras y tofu, así que **cabe una cena de una estrella sin dejar
  a nadie fuera**. Encaja el día que caéis por Văn Miếu.
