quePedir: >-
  El **Asana Sling** o el **martini de pimienta de Kampot**, hechos con ingredientes jemer —cúrcuma,
  jengibre, lima silvestre, tamarindo, vino de arroz Sombai—. Ofrecen también **clase de coctelería jemer**.
body: >-
  Beber dentro de la **última casa de madera jemer tradicional** del barrio del Old Market: una construcción
  sobre pilotes de finales de los años cincuenta que **sobrevivió a los Jemeres Rojos y a la piqueta del
  hormigón**, mientras a su alrededor caían todas las demás. Nada del bullicio de Pub Street: aquí se bebe
  entre cojines y hamacas, con **cócteles de ingredientes locales** (pimienta de Kampot, tamarindo, vino de
  arroz). El sitio con más carácter para una copa, e incluso una **clase de coctelería** si os pica.
