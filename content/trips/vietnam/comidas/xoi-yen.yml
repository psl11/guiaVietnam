quePedir: >-
  El **xôi xéo**: arroz glutinoso teñido de cúrcuma, *đậu xanh* (puré de soja amarilla laminado)
  y *hành phi* (chalota crujiente). Pedido *«không thịt»* queda enteramente vegetal; las coberturas
  de carne (pollo desmenuzado, *chả*, paté, salchicha china) se añaden aparte.
body: >-
  La **catedral del xôi** en Hanoi: un local de esquina, abierto de la mañana a la medianoche, donde
  el desayuno de toda la vida se sirve tibio en cuenco o en hoja. El *xôi xéo* es de los pocos clásicos
  de la ciudad que **nacen ya vegetales** —arroz, soja y chalota—, así que aquí desayunáis los dos sin
  negociar nada. A dos pasos del extremo noreste del lago, es la parada natural antes de callejear.
