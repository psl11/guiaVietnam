body: >-
  El **mercado viejo** de Siem Reap: laberinto de souvenirs y, en el centro, un **mercado húmedo** real
  —fruta, pescado, *prahok*— con una **zona de puestos de comida** a precio de calle. Aquí conviene saber
  **leer un puesto**. Las cuatro señales que rara vez fallan: **(1) clientela local** comiendo; **(2)
  especialización** —el bueno hace *una* cosa, no una carta de veinte—; **(3) rotación** —producto que
  vuela es producto fresco—; y **(4) todo a la vista**, cocinado delante de vosotros. La mesa vegetariana
  rasca poco (casi todo lleva cerdo o pescado), pero los **batidos de fruta** y el ambiente valen la visita.
