quePedir: >-
  La cocina *chay giả mặn* —vegetal que **imita** a la carne—: «pollo» de tofu a la citronela,
  «cerdo» de seta, *nem* vegetales. El menú cerrado es la vía cómoda para probar de todo.
body: >-
  El **abuelo de los vegetarianos de Hanoi**: abierto en **1995**, fue el primer restaurante *chay*
  de la ciudad, y sigue en sus trece —tofu y fruto del pan convertidos en «carnes» con una destreza
  que desarma—. Escondido entre embajadas en Trần Hưng Đạo, es una **cena vegetariana con solera**, a
  un paseo del casco viejo. La casa donde el *chay* de Hanoi empezó a tomarse en serio.
