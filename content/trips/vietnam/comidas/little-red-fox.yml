body: >-
  El **mejor café de la ciudad**, y el corazón del **Kandal Village**, el barrio-boutique de Siem Reap.
  Proyecto australiano de café de especialidad con más de una década a la espalda, grano bien tostado y
  una carta de desayuno amable con la mesa vegetariana. **Ojo con la agenda: cierra los miércoles** (7:00
  a 17:00 el resto de días), así que cuadradlo con el itinerario para no plantaros ante la persiana bajada.
