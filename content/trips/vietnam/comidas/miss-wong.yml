body: >-
  El **mejor cóctel de Siem Reap**, en un local con **alma de Shanghái de los años veinte**: farolillos
  rojos, paredes verde azuladas, penumbra elegante lejos del ruido de Pub Street. Coctelería de autor que
  **trabaja los ingredientes locales** —lima kaffir, hierba limón, tamarindo— y acompaña con **dim sum casero
  con opciones vegetarianas**. Copas de nivel a precio muy razonable (~5-6 US$): la parada obligada para la
  primera o la última noche.
