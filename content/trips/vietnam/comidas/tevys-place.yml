quePedir: >-
  El desayuno jemer con *num banh chok* o el *bai sach chrouk* (arroz con cerdo a la brasa) para quien coma carne;
  en veg, el **amok de verduras**, salteados de temporada y los cuencos de fideos sin carne.
body: >-
  El **local familiar** que da de comer de verdad y con causa: lo lleva Tevy, superviviente del
  genocidio, y **forma y emplea a mujeres jóvenes** de entornos difíciles. Cocina casera jemer (y algún
  clásico occidental) con **producto ecológico** y precios de barrio, en la tranquila zona de Wat Bo.
  Sitio honesto para un desayuno pausado o un almuerzo, con la mesa vegetariana atendida sin problema
  si se avisa.
