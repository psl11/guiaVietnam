quePedir: >-
  El *bánh trôi tàu*: bolas de arroz glutinoso rellenas de sésamo negro o *đậu xanh*, flotando en
  **jarabe caliente de jengibre**. Y sus primos, el *lục tàu xá* (crema de soja) y el *chí mà phù*
  (crema de sésamo negro).
body: >-
  Un **clásico con nombre propio**: el puesto del recordado actor cómico **Phạm Bằng**, hoy en manos de
  la familia, sirviendo cuencos calientes de *bánh trôi tàu* en Hàng Giầy. El jengibre entona, el sésamo
  reconforta: es el postre **de tarde fresca**, más de noche entrada que de mediodía de calor —tenedlo en
  cuenta en septiembre, que Hanoi aún aprieta—. **Todo vegetal**, y una postal del casco viejo de siempre.
