  El **cà phê cốt dừa** (coconut coffee): sorbete de leche de coco coronado con robusta fuerte. Se
  remueve según se bebe.
body: >-
  La cadena que convirtió la **nostalgia del período de subsidios** (*bao cấp*) en estética: carteles
  de propaganda descoloridos, radios y máquinas de coser viejas, tazas de esmalte, uniforme caqui. La
  abrió en 2007 la excantante **Linh Dung**; hoy pasa de **cien locales** en tres continentes. Su
  invento estrella es el **coconut coffee** —helado de coco con robusta por encima—, dulce y adictivo,
  y de paso la **mejor baza vegana** de esta lista. Es *chain* e *instagrameable*, sí, pero el
  coco-café salió de aquí y la puesta en escena retro merece la parada.
