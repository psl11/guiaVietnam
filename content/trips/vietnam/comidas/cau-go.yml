quePedir: >-
  Cocina vietnamita clásica bien ejecutada; hay **apartado vegetariano/vegano** de carta y menú. Pero
  lo que se reserva aquí es **el asiento**: pedid ventana o la terraza de la última planta.
body: >-
  El **truco de vistas que sí merece la pena**: en las plantas altas de un edificio de Cầu Gỗ, con una
  terraza volada **sobre el lago Hoàn Kiếm** y los tejados del casco viejo. Está en la guía Michelin
  (*selección*), la cocina cumple y —raro en un sitio de panorama— la **mesa vegetariana está
  contemplada de serie**. Reservad junto a la ventana para la primera o la última noche, cuando apetece
  cenar mirando el agua.
