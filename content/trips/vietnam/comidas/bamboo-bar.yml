body: >-
  El bar del gran hotel colonial de Indochina (1901), **junto a la piscina** y bajo techo de paja. Aquí
  se bebe el **«Graham Greene Martini»** —Tanqueray, cassis, vermut seco y sorbete de frambuesa—,
  bautizado por el novelista que se alojó en el hotel en 1951 mientras gestaba *El americano
  impasible*. La habitación cuesta un ojo; el homenaje inteligente es esta copa, en la misma casa por
  la que pasaron Chaplin, Maugham y, bajo las bombas, Joan Baez. **El siglo XX vietnamita se bebe por
  el precio de un martini.**
