quePedir: >-
  **Phở cuốn**: la lámina de *phở* sin cortar, enrollada con ternera salteada y hierbas, para mojar. Y
  el *phở chiên phồng*, la misma lámina frita e hinchada. Hay quien lo hace de tofu si se pide.
body: >-
  Ngũ Xã es **monotema y con denominación de origen**: aquí nació el *phở cuốn* —el *phở* convertido en
  rollito fresco— y una hilera de locales compite por él a orillas de Trúc Bạch. Es la mejor versión del
  filtro «**especialización**»: calle entera dedicada a un plato, imposible que salga flojo. Cae **junto
  a Aummee y al Lago del Oeste**, así que es el picoteo natural del Día 15: rollos, cerveza y paseo por
  el agua.
