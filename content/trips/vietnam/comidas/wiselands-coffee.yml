body: >-
  Café de especialidad de varias plantas con **biblioteca libre**: interior de madera, silencio y una
  buena colección de libros en inglés. Otro *tercer espacio* de manual —estudiantes trabajando,
  gente leyendo horas— con muy buen diseño y precios razonables. Para escribir, leer o dejar pasar la
  tarde.
