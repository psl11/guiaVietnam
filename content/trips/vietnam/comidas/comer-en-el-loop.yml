quePedir: >-
  No es carta: **avisad al guía** (él lo traduce al anfitrión). Seguros que nunca fallan: **đậu sốt cà
  chua** (tofu en salsa de tomate), **rau muống xào** (espinaca de agua salteada), **trứng** (huevo) y
  arroz.
body: >-
  La cena del loop es un **festín comunal** que cocina la familia anfitriona: carnes ahumadas o a la
  brasa, verduras salteadas, tofu, arroz o maíz y sopa, todo **compartido del centro de la mesa** y
  regado con chupitos de **rượu ngô** (el «*happy water*»). Para vegetarianos es el tramo **más difícil**
  del viaje, pero **manejable si se avisa con antelación**: decídselo al guía la víspera o al llegar, y
  llevad la frase escrita en el móvil — **«Tôi ăn chay»** («como vegetariana»). Con tofu, verdura de
  huerta y huevo casi siempre se resuelve.
