quePedir: >-
  **Bún chả**: pella de cerdo y panceta **a la brasa**, en un cuenco de caldo agridulce templado donde
  se moja el *bún* y las hierbas. Un *nem* (rollito) de propina para el crujiente.
body: >-
  **Bib Gourmand** en un puesto de seis mesas que se desborda a la acera: solo abre a mediodía
  (11:00–15:00), solo efectivo, y clava el **bún chả** —la pella ahumada, forrada de hoja de cilantro
  espinoso antes de la brasa—. En el extremo norte del casco viejo, a tiro de piedra del hotel. Es
  **cerdo sin rodeos**: intocable, pero de los buenos.
