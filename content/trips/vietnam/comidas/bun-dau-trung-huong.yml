quePedir: >-
  **Bún đậu**: tofu recién frito, *bún* (fideos de arroz en tortas), *tía tô* (perilla) y un cesto de
  hierbas. La salsa de la casa es *mắm tôm* (pasta de gamba fermentada); en versión veg se pide con
  *nước tương* (soja) y se dejan fuera el *chả cốm* y los embutidos.
body: >-
  En el **callejón de Phất Lộc**, el rincón del bún đậu del casco viejo, Trung Hương lleva décadas
  friendo el **đậu dos veces al día** —crujiente por fuera, sedoso dentro— con pasta de gamba traída
  de Thanh Hóa para quien la quiera. Es de los pocos clásicos callejeros que **se sostienen en veg sin
  inventos**: el tofu, los fideos y las hierbas ya son el plato; basta cambiar la salsa. Mesas bajas,
  taburetes y trasiego de barrio.
