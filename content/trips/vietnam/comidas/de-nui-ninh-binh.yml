quePedir: >-
  *Dê tái chanh* (carpaccio de cabra con limón) o *dê nướng* (a la brasa) — para quien coma carne.
body: >-
  La **seña de identidad** de Ninh Bình: cabras criadas en libertad sobre el karst de piedra caliza,
  pastando **hierbas de montaña** — carne firme, magra, con un fondo levemente herbal y **sin el olor
  fuerte** de la cabra de granja. El maridaje local por excelencia: **cabra con cơm cháy**. Marcado como
  **no apto para vegetarianos** — el único plato de esta parada que no lo es.
