quePedir: >-
  Su **egg coffee** de textura *mousse* —de los mejores de la ciudad— y el **pour-over** del día, con
  grano tostado allí mismo.
body: >-
  Casa esquinera de dos plantas y azotea en Hàng Bún, con **tueste propio a diario** y una carta que
  cubre todo el espectro: espresso, cold brew, pour-over, cafés vietnamitas. Lo que la corona es un
  **café-huevo** de nube densa que planta cara a los clásicos, servido en un local cuidado hasta el
  último detalle. Es la versión *specialty* del *cà phê trứng*, sin el rótulo turístico — el puente
  perfecto entre el café de origen y el icono goloso de Hanoi.
