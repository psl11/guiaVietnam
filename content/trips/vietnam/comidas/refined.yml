body: >-
  El proyecto que se propuso **quitarle el complejo al robusta**: mientras el mundo *specialty* solo
  adora el arábica, Refined apostó por el **fine robusta** vietnamita filtrado a la manera de siempre,
  en **phin**. Su seña es el filtro de **cerámica de Bát Tràng** —el pueblo alfarero de Hanoi—, hoy
  objeto de culto que fabrican ellos mismos. Local todo en negro para que solo miréis la taza; abrió en
  2021 junto al Templo de la Literatura y tiene sede a un paso de la catedral. **Sprudge** lo retrata
  como una de las caras de la nueva ola — justo el café de origen que pediste priorizar.
