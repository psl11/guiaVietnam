quePedir: >-
  Lo que tenga buena pinta y **rote** en los puestos de comida; batidos de fruta y dulces jemer para
  picar mientras se mira la artesanía. Preguntad siempre por la versión sin carne ni pescado.
body: >-
  Más **curado** y tranquilo que Psar Chaa: un mercado cubierto en el complejo **King's Road Angkor**, a
  cinco minutos de Pub Street, que reúne **artesanía y empresas sociales** (Saomao, Rehash Trash, Friends
  International) junto a algunos **puestos de comida**. Ambiente relajado para picar algo y comprar con
  sentido —el dinero va a proyectos locales—. Mismo filtro de siempre para elegir puesto: **especializado,
  con rotación y todo a la vista**. Abre solo de mediodía en adelante.
