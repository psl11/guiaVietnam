body: >-
  Tres plantas en un edificio colonial francés con **zonas de silencio impuesto**: mitad barra de
  especialidad, mitad biblioteca. El café son **microlotes de Cầu Đất**, en la meseta de Đà Lạt, y de
  Đắk Nông —el *single-origin* de altura que buscabas—: los *pour-over* van 100% arábica; los phin,
  robusta. **Sprudge** lo incluye en su guía de Hanoi, y con razón — *«el silencio dentro del bien
  llamado Tranquil»*. El sitio para leer y catar sin ruido en una ciudad que no calla.
