quePedir: >-
  La especialidad de la calle es el *gà tần* (pollo estofado en hierbas medicinales) y los caldos de
  madrugada; en veg, poco más que un *bún* o *cháo* sin carne si lo preparan.
body: >-
  La **calle que no cierra**: cuando el casco viejo baja la persiana, Tống Duy Tân y su callejón *Cấm
  Chỉ* siguen con las cocinas encendidas. Es la parada de la cena tardía o del hambre de after. Mismo
  filtro que en toda la ciudad —**puesto especializado, con cola local y todo a la vista**—; aquí manda
  el pollo en caldo de hierbas, así que la mesa vegetariana rasca poco: mejor como curiosidad nocturna
  que como plan de cena veg.
