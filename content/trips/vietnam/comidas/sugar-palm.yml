quePedir: >-
  El **amok** —el plato-emblema de Camboya, aquí en versión de referencia—; pedidlo de **verduras** para
  la mesa vegetariana. Y los curris jemer con leche de coco fresca.
body: >-
  La **institución de la cocina jemer de la ciudad**, en una hermosa casa de madera. La chef **Kethana
  Dunnett** recuperó los platos de su madre y su abuela tras la ruptura cultural de los años setenta, y
  se ha vuelto una autoridad tal que **enseñó a preparar el amok a Gordon Ramsay** cuando rodó en Camboya.
  Producto de primera y sabor de casa, con **opciones vegetarianas cuidadas** (el amok se hace igual de
  bien sin pescado). El sitio para entender de qué va la comida camboyana.
