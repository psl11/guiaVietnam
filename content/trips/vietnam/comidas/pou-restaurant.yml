quePedir: >-
  Los clásicos jemer **reinterpretados** —street food de autor, *num banh chok*, ensaladas de pomelo—;
  para la mesa vegetariana, el **apartado veg de la carta**: curris, pasteles de verdura y ensaladas.
body: >-
  El **jemer moderno** más simpático de la ciudad: cocina camboyana con giro creativo y buena presentación,
  en un **patio-jardín** con encanto dentro del alojamiento Maison 557. Reinventa la comida de calle y de
  familia sin perder el sabor de origen, y —lo que aquí importa— **reserva un apartado vegetariano propio
  en la carta**, tratado como platos y no como guarnición. Buen almuerzo largo o cena informal.
