body: >-
  El **restaurante-escuela** de la red **Tree Alliance** (ONG Friends International): cada cena **paga la
  formación hostelera de jóvenes** de la calle y en riesgo. Cocina jemer en formato de platos para compartir,
  en un **jardín** agradable, con una carta **fuerte en verduras** que hace fácil una mesa vegetariana variada.
  **Se mudó**: ahora está dentro de **F3 Siem Reap (8 Wat Polank Rd)**, abre de lunes a sábado solo por la noche.
  Comer aquí, además de rico, hace bien.
