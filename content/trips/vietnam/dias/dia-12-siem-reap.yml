navLabel: "Día 12 · Siem Reap"
trip: vietnam
order: 12
eyebrow: El plan · Día 12 · mar 22 sep
title: "*Llegada* a Siem Reap"
dek: >-
  Un día partido entre dos países. La mañana todavía es Hanoi; al caer la tarde, un vuelo de hora y
  media os deja al otro lado del mapa de Indochina, en la ciudad de los templos. Y la noche se abre
  con un circo que es, en realidad, una escuela.
blocks:
  - block: Mañana
    time: "mañana libre"
    title: Última mañana en Hanoi
    body: >-
      No hay directo matinal a Siem Reap —solo dos vuelos al día, y los dos vespertinos—, así que la
      mañana del 22 se queda en Hanoi. Un café con calma, lo que quedara pendiente del casco viejo, la
      maleta grande a buen recaudo en el Hòa Bình. Sin agenda: el día de verdad empieza en el aeropuerto.
    window:
      label: Por qué así
      body: >-
        El brief soñaba con "llegar el martes por la mañana", pero en directo eso no existe. Aceptado el
        hecho, la mañana libre deja de ser un fallo del plan y pasa a ser una mañana **ganada** — la única
        sin hora de salida antes de que empiece Angkor.
  - block: Tarde
    time: "16:20–19:15"
    title: El vuelo VJ913 a Siem Reap
    body: >-
      Traslado a Nội Bài y **vuelo VJ913 (VietJet), ya reservado: Hanoi 16:20 → Siem Reap 18:05**,
      directo, hora y media escasa rumbo al suroeste sobre Laos. Se aterriza en **SAI**, el aeropuerto
      nuevo (inaugurado a finales de 2023, a unos 45 km al este de la ciudad): transfer del hotel, casi
      una hora entre campos, y a la habitación de la zona de **Wat Bo** hacia las 19:15.
    window:
      label: Por qué este vuelo
      body: >-
        De los dos únicos directos —los dos de tarde— este es el barato, y llega con margen de sobra: da
        tiempo a dejar la maleta, cenar algo y sentarse en el circo. El colchón contra un retraso se guarda
        para lo que de verdad importa —el amanecer de mañana—; esta noche, si VietJet se demora, no se
        pierde nada irremplazable.
  - block: Noche
    time: "~20:00"
    title: Cena en Wat Bo y el circo Phare
    body: >-
      Cena rápida en la zona de **Wat Bo** y, a las **20:00**, **Phare, el circo camboyano**:
      teatro-circo narrativo, sin animales, unos setenta minutos bajo una carpa pequeña. No es solo un
      espectáculo. Phare nació de **Phare Ponleu Selpak**, la escuela de artes que nueve jóvenes
      ex-refugiados fundaron en Battambang en 1994 —habían aprendido a dibujar como terapia en un campo
      tras los jemeres rojos—, y los artistas de la pista son sus alumnos becados: cada entrada financia
      la escuela. La manera de que la primera noche en Camboya no sea solo un traslado.
    window:
      label: Ventana óptima
      body: >-
        El Phare se mete **en la noche de llegada** a propósito: es la única velada en que aún no
        madrugáis. Las dos tardes de templos que vienen se reservan para el crepúsculo sobre el agua, y
        esta noche —sin amanecer todavía que preparar— es la que sobra para sentarse bajo la carpa. Eso
        sí: el despertador suena a las **4:15**, así que a la cama pronto.
