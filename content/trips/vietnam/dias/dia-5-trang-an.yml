eyebrow: El plan · Día 5 · mar 15 sep
title: Del *dragón* al bus nocturno
dek: >-
  El día se exprime por los dos extremos y se deja flojo el centro. De madrugada, los quinientos
  escalones del dragón antes de que lleguen el sol y los autobuses; a las nueve, la barca que se
  cuela por las cuevas donde rodó *Kong*. La tarde afloja —una capital del siglo X, si el cuerpo la
  pide—, y al caer, un bus-cama arranca hacia el norte: esta noche se duerme en ruta.
blocks:
  - block: Amanecer
    time: "06:30"
    title: Hang Múa, los 500 escalones del dragón
    body: >-
      Despertador de madrugada para **Hang Múa** a las **06:30**. Son unos **500 escalones** de
      piedra —la entrada, 100.000 VND— que trepan por el flanco de la montaña hasta el **mirador del
      dragón**, una cresta coronada por la figura del animal. Arriba espera la vista que explica todo
      Ninh Bình mejor que cualquier texto: el río serpenteando entre agujas de roca y **Tam Cốc** a
      vuestros pies, en un mar de arrozales.
    window:
      label: Ventana óptima
      body: >-
        A las seis y media se sube en fresco y casi a solas: los tours que salen de Hanoi no llegan
        **hasta pasadas las nueve**, y el calor de mediodía en estas escaleras al descubierto es
        serio. A esa hora, además, la niebla aún se deshilacha sobre los arrozales y la luz entra
        rasante — la montaña se gana de un tirón y con su mejor cara.
  - block: Mañana
    time: "09:00"
    title: La barca de Tràng An, la ruta 3
    body: >-
      A las **09:00**, la barca de **Tràng An** —no la de Tam Cốc—. Se elige aquí por el karst más
      cercano y dramático, por las cuevas larguísimas (una de más de un kilómetro), por los templos
      entre las aguas y por una política estricta de no-venta: cero acoso a bordo. Se toma la **ruta
      3**, la de las **cuevas** y los **escenarios de *Kong: Skull Island***, algo menos concurrida;
      entre dos horas y media y tres y media remando por debajo de las montañas, por unos 9 €. En
      septiembre el verde, recién lavado por las lluvias, lo llena todo.
    window:
      label: Ventana óptima
      body: >-
        La barca, **a primera hora**, antes de que llegue el grueso de las embarcaciones y antes de
        los chubascos que suelen descargar por la tarde. Recién bajados del dragón, encadenar el
        embarcadero a las nueve os pone en el agua con el karst todavía en calma — el mismo recorrido,
        más tarde, se llena de proa a proa.
  - block: Tarde
    time: "tarde libre"
    title: La tarde afloja, o la primera capital
    body: >-
      Después de una madrugada y una barca larga, la tarde se deja libre a propósito. Quien tenga
      cuerpo puede acercarse a **Hoa Lư**, la **capital del siglo X**: aquí se coronó emperador **Đinh
      Bộ Lĩnh** en 968, y eligió estos farallones porque eran **murallas gratis** contra la caballería
      china. Fue capital cuarenta y dos años, hasta que en 1010 la corte se mudó a Thăng Long —la
      futura Hanoi—. Se ve en tres cuartos de hora, y es el molde original del que Hanoi es el
      vaciado.
    window:
      label: Por qué así
      body: >-
        El día se armó cargando la mañana para poder soltar la tarde: no hay hotel esta noche que
        deshacer ni prisa que meter, porque se duerme en el bus. Hoa Lư es «neutral» —pequeña, una
        parada corta—; entra si apetece, y si no, mejor reservar las fuerzas para la noche en ruta y
        el loop que arranca al amanecer.
  - block: Noche
    time: "~17:30"
    title: El bus nocturno directo a Ha Giang
    body: >-
      Hacia las **17:30** arranca el **bus-cama directo a Ha Giang** —**Bằng Phấn**, la especialista
      de la ruta, con cabinas sleeper modernas; la **cabina VIP** ronda los 15 €—. Recoge en Ninh
      Bình (algunos servicios, en la propia zona de Tam Cốc) y rueda de noche los cerca de 400 km
      hacia el norte para dejaros en Ha Giang **de madrugada**, a tiempo de desayunar y arrancar el
      loop ese mismo día.
    window:
      label: Por qué este bus
      body: >-
        Es el hallazgo logístico del viaje: **existe directo, sin volver a Hanoi**. La noche en ruta
        hace doble función —transporte y cama— y os deposita en la línea de salida del loop al
        amanecer, que es justo lo que hacen los operadores. El matiz honesto: dormir en bus-cama la
        víspera cansa; lo compensa que la primera etapa del loop, al día siguiente, es corta a
        propósito y se duerme pronto.
