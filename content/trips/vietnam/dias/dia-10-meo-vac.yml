trip: vietnam
order: 10
eyebrow: El plan · Día 10 · dom 20 sep
title: El domingo en *Mèo Vạc*
dek: >-
  La mañana alrededor de la cual se construyó todo el loop de cinco días: el gran mercado dominical de
  Mèo Vạc, el latido social del altiplano una vez por semana. Y luego el largo tirón de vuelta, cerrando
  el círculo de karst para dormir una última noche en Hà Giang antes de bajar a Hanoi, mañana y de día.
blocks:
  - block: Amanecer · el mercado
    time: "06:30–09:30"
    title: El mercado dominical de Mèo Vạc
    body: >-
      El corazón del viaje al norte cabe en tres horas. El **mercado dominical de Mèo Vạc** arranca hacia
      las **05:00** y llega a su pico entre las **07:00 y las 09:30**; hacia las diez u once se disuelve.
      Es el gran **chợ phiên** semanal: **hmong, dao y lô lô** bajan a pie horas desde las aldeas con el
      traje bueno. Hay mercado de **ganado** —búfalos que cambian de dueño—, montañas de **thổ cẩm** (el
      brocado de las minorías, la palabra que buscar para comprar lo auténtico), **rượu ngô** (licor de
      maíz), barberos al aire libre, y ese trasiego que no es comprar sino **el acontecimiento social de la
      semana**: los mayores se ponen al día, los jóvenes se miran. De esa mirada nació la institución más
      bella de estos valles, el legendario **mercado del amor de Khâu Vai** —una vez al año, desde 1919, el
      día en que antiguos enamorados pueden reencontrarse sin ofensa—; el domingo de Mèo Vạc es su versión
      de cada semana.
    window:
      label: Ventana óptima
      body: >-
        El mercado **solo** es el domingo por la mañana temprano — y por eso vuestro loop es de cinco días
        y no de cuatro. Pedir el formato estándar «4D/3N» os devolvería el sábado y os dejaría sin esto, uno
        de los hallazgos del viaje. Para el fotógrafo, la ética es la ventana: **pedir permiso siempre, y
        comprar algo antes de pedir la foto**; el regateo aquí es suave, es mercado local y no turístico.
        Luz rasante de primera hora y gentío en su punto — a las once ya no hay mercado.
  - block: Mediodía · el regreso
    time: "~10:00–15:00"
    title: El regreso a la ciudad de Hà Giang
    body: >-
      Hacia las **10:00**, cuando el mercado se deshace, se emprende la vuelta: **unos 155 km, cerca de 5
      horas** por Mậu Duệ y Minh Ngọc de regreso a la **ciudad de Hà Giang**, con llegada sobre las
      **15:00–16:00**. Es el último tramo del loop —unos **350-384 km** de karst en total— y el paisaje se
      va destensando, de la piedra vertical del altiplano a valles más abiertos. La carretera (la DT182)
      arrastra alguna obra histórica y, tras la lluvia, gravilla; nada que un piloto local no conozca.
    window:
      label: Por qué el mercado primero
      body: >-
        Hacer el de Mèo Vạc en vez del de Đồng Văn evita retroceder 23 km de puerto de montaña, así que el
        regreso es una sola línea limpia en lugar de un rodeo. Saliendo a las diez, se llega a Hà Giang con
        la tarde por delante para descansar, y **el día 21 en Hanoi queda garantizado con margen**.
  - block: Noche
    time: noche
    title: Última noche en Hà Giang
    body: >-
      Y en Hà Giang, la última noche del norte: se duerme aquí y mañana se baja a Hanoi en el **bus
      diurno** (6-7 h, con salida de mañana). Cena, ducha caliente y a la cama — cinco días de moto y
      karst se cierran con el altiplano ya a la espalda y sin más carretera hasta mañana.
    window:
      label: Por qué de día
      body: >-
        Existe un sleeper nocturno que ahorraría un día, pero ya sabéis la respuesta del viaje: **nada de
        pasar la noche en un autobús para llegar molidos**. Se duerme en cama, se baja de día —con el
        conductor viendo bien la carretera de montaña, que en septiembre no es poco— y el día 21 en Hanoi
        hace de colchón sin prisa. El norte se despide en horizontal.
