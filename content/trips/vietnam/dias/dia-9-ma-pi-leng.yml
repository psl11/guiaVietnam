slug: dia-9-ma-pi-leng
navLabel: "Día 9 · Mã Pí Lèng"
trip: vietnam
order: 9
eyebrow: El plan · Día 9 · sáb 19 sep
title: El cañón y *el rey de los pasos*
dek: >-
  El día de las dos miradas al mismo río. A primera hora, el Nho Quế desde abajo —el agua esmeralda
  en calma, remontando la garganta de Tu Sản—; a media mañana, el mismo cañón desde arriba, cruzando
  el paso que es el motivo mismo del loop. Entre uno y otro, la ventaja de ir en moto y a vuestro ritmo.
blocks:
  - block: Amanecer
    time: "a primera hora"
    title: La barca por el cañón del Nho Quế
    body: >-
      Se sale de **Đồng Văn** con la primera luz y se enfila la carretera del paso; antes de coronarlo,
      una bajada de **unos 8 km de curvas muy empinadas** desciende al embarcadero de **Tả Làng** (comuna
      Pai Lung, lado Đồng Văn), y vuestro easy rider la hace en moto, que aquí es lo natural. Entonces la
      barca entra en el **cañón de Tu Sản**: paredes de **700 a 900 metros**, el **Nho Quế** verde jade
      **800 metros** por debajo del paso, la garganta tenida por la más profunda del sudeste asiático.
      Cuarenta y cinco a noventa minutos de agua esmeralda entre murallas de caliza — el contrapunto
      «desde abajo» del mirador que veréis luego desde arriba.
    window:
      label: Ventana óptima
      body: >-
        La barca **a primera hora** es media jugada del día. Al alba el agua está en calma y sin viento
        —espejo— y aún no han salido las otras barcas; **septiembre-noviembre** es además su mejor época,
        con el caudal alto y el verde en su punto. Para la X100VI ese reflejo quieto de las paredes solo
        existe temprano: hacia media mañana entra la brisa y llegan los grupos. (Tras una lluvia torrencial
        puede suspenderse por caudal — otra razón para el colchón del día 21.)
  - block: Media mañana
    time: "media mañana"
    title: Mã Pí Lèng, el rey de los pasos
    body: >-
      De vuelta a la carretera, el plato fuerte: el **paso de Mã Pí Lèng**, los **23 km** de Đồng Văn a
      Mèo Vạc tallados en el flanco del cañón, con el Nho Quế verde jade **800 metros más abajo**. Es el
      punto culminante del **Geoparque Global UNESCO de Đồng Văn** —2.350 km² de caliza que guardan 550
      millones de años de historia terrestre— y la «herida maestra» de todo el karst. Pero, sobre todo,
      **es el motivo mismo del loop**: no se viene a Hà Giang a ver el karst, se viene a atravesarlo.
      Desde una ventanilla es una postal; en la moto es la experiencia.
    window:
      label: Ventana óptima
      body: >-
        Aquí se cobra la decisión de ir en **easy rider privado** y no en grupo. Una salida grande son
        diez motos que paran donde el grupo decide; vosotros paráis **donde está la luz, no donde toca**.
        Con un fotógrafo a bordo eso no es un matiz: es la diferencia entre la foto y la foto que no fue.
        El mirador del Skywalk es el punto caliente del loop — teniendo la moto, la ventaja es precisamente
        esquivarlo y buscar vuestro propio recodo del paso.
  - block: Tarde–noche
    time: "tarde–noche"
    title: Noche en Mèo Vạc, a las puertas del mercado
    body: >-
      El paso desemboca en **Mèo Vạc**, y como la etapa es corta —esos 23 km— la tarde queda holgada:
      llegar sin prisa, deshacer el equipaje en el homestay, **secar el equipo y cargar baterías** tras el
      día de moto. Aquí se duerme, y no es un detalle logístico cualquiera: dormir en Mèo Vạc en lugar de
      retroceder a Đồng Văn es exactamente lo que os pone mañana, al amanecer, en la puerta de su mercado.
    window:
      label: Por qué aquí esta noche
      body: >-
        Todo el formato de **5 días / 4 noches** existe para esto: amanecer el domingo en Mèo Vạc. Su
        mercado dominical es mayor y más auténtico que el de Đồng Văn, y quedarse aquí evita retroceder 23
        km de puerto de montaña. La cena con la familia del homestay es, además, la autenticidad de verdad
        del loop —no el colchón donde durmáis—. Mañana es el corazón del viaje al norte: hoy se madruga poco
        y se acuesta pronto.
