slug: dia-11-hanoi-vuelta
navLabel: "Día 11 · Hanoi"
trip: vietnam
order: 11
eyebrow: El plan · Día 11 · lun 21 sep
title: Hanoi, y el *día colchón*
dek: >-
  El día que el plan guarda flojo a propósito. Es el airbag contra un tifón de septiembre; si el loop
  fue según lo previsto, se convierte en un lunes regalado en Hanoi. Y lunes manda: con casi todos los
  museos cerrados, el ancla es el gran templo que no cierra —la primera universidad del país— y, por lo
  demás, dejar que el cuerpo se recupere de cinco días de moto.
blocks:
  - block: Mañana · el colchón
    time: "día flexible"
    title: La vuelta a Hanoi, y el colchón
    body: >-
      El día empieza con el **bus diurno de Hà Giang a Hanoi**: 6-7 horas (~300 km, la mitad por carretera
      de montaña), con salida de mañana y llegada a media tarde. Y sea cual sea la hora exacta, **este es el
      día que se defiende vacío**. No hay que llenarlo de antemano: su verdadero trabajo es ser colchón.
    window:
      label: Por qué en blanco
      body: >-
        Este día es la principal válvula anti-tifón del plan. Septiembre es plena temporada en el golfo de
        Tonkín, y un temporal que corte una carretera con un desprendimiento retrasaría el loop; para eso
        está este día. Si todo ha ido según lo previsto, es una jornada regalada; si no, es el airbag. Y
        protege lo que viene: **mañana, martes 22, se vuela a Siem Reap** y empieza Angkor. Por eso se guarda
        vacío — no es pereza, es red de seguridad.
  - block: Tarde
    time: tarde
    title: El Templo de la Literatura, un lunes
    body: >-
      El **lunes** juega en contra de los museos: casi todos cierran (Etnología y también Hoa
      Lo; el [Museo de la Mujer](#museo-mujer) probablemente sí abre, confirmadlo). Así que la tarde es de calle, café y templo — y el ancla es el [**Templo de la Literatura**](#van-mieu) (Văn
      Miếu, 1070), la primera universidad de Vietnam, que **no** cierra los lunes (8:00–17:00). Tiene
      además una **visita nocturna con 3D-mapping** —«Tinh Hoa Đạo Học», 19:00–22:00, sorprendentemente
      bien hecha y casi desconocida entre occidentales—, pero **solo miércoles, sábados y domingos**: esta
      noche de lunes no toca.
    window:
      label: Por qué hoy el Văn Miếu
      body: >-
        Precisamente porque es lunes: con los museos cerrados, es el gran monumento que sigue abierto — y de
        los que mejor absorben un lunes sin prisa. Los patios de estelas de los doctores piden calma, y
        hoy, que es el día sin agenda, la hay.
  - block: Noche
    time: noche
    title: Recuperar, sin más
    body: >-
      Y poco más: tras cinco días de moto, la noche del colchón es para eso, colchón. Una cena tranquila
      en el casco viejo, la colada, cargar del todo las baterías —las de la cámara y las vuestras— y
      dormir en cama blanda. El Lago del Oeste, el martini del Metropole y lo que quede de Hanoi esperan
      al **Día 15** (el viernes 25 en Hanoi), ya sin loop a la espalda y con toda una jornada por delante.
    window:
      label: Por qué guardarlo
      body: >-
        Hay tentación de exprimir la vuelta, pero este día se defiende vacío por una razón, y el viaje aún
        guarda un día entero de Hanoi sin prisas (el 15). Mejor llegar a Camboya descansados que arañar un
        atardecer más hoy: lo que hoy se ahorra, el viernes se disfruta con calma.
