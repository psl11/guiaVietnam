eyebrow: El plan · Día 11 · lun 21 sep
title: Hanoi, y el *día colchón*
dek: >-
  El día que el plan guarda flojo a propósito. Es el airbag contra un tifón de septiembre; si el loop
  fue según lo previsto, se convierte en un lunes regalado en Hanoi. Y lunes manda: con los museos
  cerrados, la ciudad se recorre por sus templos, sus cafés y el atardecer sobre el Lago del Oeste.
blocks:
  - block: Mañana · el colchón
    time: "día flexible"
    title: La vuelta a Hanoi, y el colchón
    body: >-
      Según lo de anoche, el día empieza de dos maneras: si subisteis al **nocturno**, ya estáis en Hanoi
      al amanecer con la jornada entera por delante; si no, es un **bus diurno de 6-7 horas** (~300 km, la
      mitad por carretera de montaña) que os deja a media tarde. En cualquier caso, **este es el día que se
      defiende vacío**. No hay que llenarlo de antemano: su verdadero trabajo es ser colchón.
    window:
      label: Por qué en blanco
      body: >-
        El día 21 es la principal válvula anti-tifón del plan. Septiembre es plena temporada en el golfo de
        Tonkín, y un temporal que corte una carretera con un desprendimiento retrasaría el loop; para eso
        está este día. Si todo ha ido según lo previsto, es una jornada regalada; si no, es el airbag. Y
        protege lo que viene: **mañana, día 22, se vuela a Siem Reap** y empieza Angkor. Por eso se guarda
        vacío — no es pereza, es red de seguridad.
  - block: Tarde
    time: tarde
    title: El Templo de la Literatura, un lunes
    body: >-
      El **lunes** juega en contra de los museos: casi todos cierran (Etnología, la Mujer, y también Hoa
      Lo). Así que la tarde es de calle, café y templo — y el ancla es el **Templo de la Literatura (Văn
      Miếu, 1070)**, la primera universidad de Vietnam, que **no** cierra los lunes (8:00–17:00). Si
      preferís la noche, tiene una **visita nocturna con 3D-mapping** —«Tinh Hoa Đạo Học», 19:00–22:00—
      sorprendentemente bien hecha y casi desconocida entre occidentales.
    window:
      label: Por qué hoy el Văn Miếu
      body: >-
        Precisamente porque es lunes: con los museos cerrados, es el gran monumento que sigue abierto, y su
        espectáculo nocturno de proyección es una carta que pocos extranjeros conocen para un lunes por la
        tarde. Los patios de estelas de los doctores piden calma — y hoy, que es el día sin agenda, la hay.
  - block: Atardecer
    time: atardecer
    title: El Lago del Oeste al atardecer
    body: >-
      Y si el cuerpo, tras el loop, pide una última vuelta suave, el mismo eje del noroeste la ofrece a la
      caída del sol: la **pagoda Trấn Quốc**, la más antigua de Hanoi (unos **1.450 años**), con su estupa
      roja de once pisos sobre una península del **Lago del Oeste (Hồ Tây)**; al lado, en el lago **Trúc
      Bạch**, el **memorial de John McCain** —el relieve de 1985 que marca dónde cayó su A-4 Skyhawk el 26
      de octubre de 1967, hoy casi un monumento a la reconciliación—. Y para cerrar, **phở cuốn** en la isla
      de **Ngũ Xã**, el barrio de los antiguos fundidores de bronce donde se inventó el plato: rollos
      frescos de lámina de phở con ternera y hierbas (los hacen **sin carne** en varios locales, para ella).
    window:
      label: Ventana óptima
      body: >-
        En un día que se defiende vacío, esta es la única cita con hora: **Trấn Quốc quiere el sol bajo**,
        no el mediodía — la estupa roja encendida por la última luz sobre el agua. Después de cinco días de
        karst y moto, el Lago del Oeste es puro respiro: horizonte, pescadores, parejas en scooter, la
        ciudad aflojando. Y para la X100VI, la sola foto que este día de descanso concede.
