slug: dia-8-dong-van
navLabel: "Día 8 · Đồng Văn"
trip: vietnam
order: 8
eyebrow: El plan · Día 8 · vie 18 sep
title: Hasta el *extremo norte*
dek: >-
  La jornada más llena del loop: el valle más bonito de la meseta, el palacio del rey del opio, el
  punto más al norte de todo Vietnam y, al caer la tarde, el [casco antiguo de Đồng Văn](#dong-van-casco). Cuatro hitos
  en un día, y todos merecen bajarse de la moto.
blocks:
  - block: Mañana
    time: "primera hora"
    title: El valle de Sủng Là
    body: >-
      Se arranca temprano hacia [**Sủng Là**](#sung-la), tenido por el valle más bonito de la meseta: **casas de
      adobe hmong** de muros de tierra apisonada color ocre, salpicadas entre bolsas de arrozal y el
      maíz que crece entre las piedras. Es uno de los rincones que siguen tranquilos, lejos de los
      puntos calientes del loop.
    window:
      label: Ventana óptima
      body: >-
        Sủng Là con la **luz de la mañana**, cuando el sol rasante modela los muros de tierra y el
        valle todavía está en silencio. Para el fotógrafo es la primera cita ineludible del día; más
        tarde la luz se aplana y el encanto se diluye.
  - block: Mediodía
    time: "mediodía"
    title: El palacio del rey hmong (Sà Phìn)
    body: >-
      En el valle de **Sà Phìn**, la casa-fortaleza de [**Vương Chính Đức**](#palacio-vuong) (1865–1947), el «rey de los
      hmong». La levantaron artesanos chinos hacia 1900 mezclando mansión Qing, elementos hmong y
      toques franceses, sobre un montículo con forma de caparazón de tortuga elegido por geomancia. La
      fortuna que la pagó fue el **opio** —Sà Phìn era nudo del comercio entre Yunnan, Birmania e
      Indochina— y los capiteles de piedra están tallados con forma de **cápsula de amapola**. Sus 64
      habitaciones, los patios empedrados y una bañera de leche de cabra tallada en granito la
      convierten en la mejor lección de historia del loop.
    window:
      label: Por qué aquí
      body: >-
        No es una parada de foto rápida: es el relato entero del altiplano metido en un edificio —opio,
        franceses, geomancia y una dinastía hmong que acabó aliándose con **Hồ Chí Minh** y quedándose
        del lado bueno del relato oficial. Merece recorrerla con calma, no de pasada.
  - block: Tarde
    time: "tarde"
    title: La torre de la bandera de Lũng Cú
    body: >-
      Un desvío al norte lleva a la [**torre de la bandera de Lũng Cú**](#lung-cu), el punto más septentrional de
      Vietnam: una gran bandera ondeando sobre una torre a la que se sube, con China al otro lado del
      horizonte. A sus pies, la aldea de [**Lô Lô Chải**](#lo-lo-chai), de los **lô lô negros** —apenas unos miles—,
      cuyos trajes de fiesta llevan miles de triángulos de tela cosidos a mano, hasta un año entero de
      trabajo en cada uno.
    window:
      label: Ventana óptima
      body: >-
        Lũng Cú es el **hito geográfico** del viaje: se toca el extremo norte del país. Es también uno
        de los puntos que se masifican, así que se para lo justo para la foto de rigor y para el momento
        —«hasta aquí llega Vietnam»— y se sigue hacia Đồng Văn antes de que caiga la luz.
  - block: Anochecer
    time: "anochecer"
    title: Đồng Văn y su casco antiguo
    body: >-
      Se cierra el día en **Đồng Văn**, corazón del altiplano y del [**Geoparque Global UNESCO**](#geoparque-dong-van) del
      mismo nombre. En su **casco antiguo** —el sitio para la cena y un café en un balcón de madera— se
      descansan las piernas después de un día de moto. Todo lo cruzado hoy es, desde 2010, el primer
      geoparque de la UNESCO en Vietnam: 2.350 km² y 550 millones de años de caliza habitada hasta el
      último pliegue.
    window:
      label: Por qué aquí
      body: >-
        Đồng Văn es la base natural para la noche: mañana, a primera hora, arranca el tramo más
        espectacular del loop —la barca por el cañón del Nho Quế y el paso de **Mã Pí Lèng**—, y conviene
        dormir cerca del arranque para salir con el amanecer.
