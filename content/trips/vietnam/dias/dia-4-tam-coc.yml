slug: dia-4-tam-coc
navLabel: "Día 4 · Ninh Bình"
trip: vietnam
order: 4
eyebrow: El plan · Día 4 · lun 14 sep
title: El karst entre *arrozales*
dek: >-
  Se cambia la ciudad por la piedra. A media mañana una furgoneta os deja en Tam Cốc —puerta a
  puerta, sin trasbordos—, entre farallones que brotan del arrozal; la tarde es la barca de Tràng An
  colándose por las cuevas, y el atardecer, una bici hasta una pagoda metida en una gruta. Es el día
  de aterrizar en el paisaje: el único de Ninh Bình sin madrugón.
blocks:
  - block: Mañana
    time: "media mañana"
    title: La furgoneta a Tam Cốc
    body: >-
      Nada de despertador: se sale de Hanoi a media mañana en **limousine van** —una furgoneta de
      nueve plazas que recoge en el hotel del casco viejo y os deja en la puerta del alojamiento de
      **Tam Cốc**—. Son unos **95 km** y, con las recogidas por el Old Quarter, dos horas y media
      largas de puerta a puerta por unos **10 € por cabeza**. Salen casi cada hora; basta reservar la
      víspera.
    window:
      label: Por qué así
      body: >-
        El tren es más barato y más pintoresco, pero descarga en la estación de Ninh Bình y todavía
        hay que negociar un taxi hasta Tam Cốc. La furgoneta ahorra ese último trasbordo y, saliendo
        a media mañana, convierte el traslado en lo único que hay que hacer antes del mediodía: hoy se
        aterriza, no se corre.
  - block: Tarde
    time: "primera hora de la tarde"
    title: La barca de Tràng An, la ruta 3
    body: >-
      Con las mochilas en el homestay y algo de comida, la tarde arranca en el embarcadero de [**Tràng An**](#trang-an) —no el de Tam Cốc—. Se elige aquí por el karst más cercano y dramático, por las cuevas
      larguísimas (una de más de un kilómetro), por los templos metidos entre las aguas y por una
      política estricta de no-venta: cero acoso a bordo. Se toma la **ruta 3**, la de las **cuevas** y los
      **escenarios de *Kong: Skull Island***, entre dos horas y media y tres remando por debajo de las
      montañas, por unos 9 €. En septiembre el verde, recién lavado por las lluvias, lo llena todo.
    window:
      label: Ventana óptima
      body: >-
        La barca por la tarde, cuando el grueso de excursiones que salen de Hanoi a mediodía ya ha
        aflojado y antes de los chubascos del final del día. Con el karst reflejado en calma y las cuevas
        frescas, es el mejor primer contacto con el paisaje que os espera —y deja el amanecer del dragón
        para mañana.
  - block: Atardecer
    time: "última hora de la tarde"
    title: En bici entre arrozales, hasta Bích Động
    body: >-
      Al bajar de la barca, y con el sol ya declinando, la última hora es de **bicicleta**. El mejor terreno es el campo
      **entre Tam Cốc y Bích Động**: arrozales de un verde jugoso —septiembre viene de lluvias— y
      farallones kársticos que se levantan de la nada, a cinco o diez minutos de pedaleo del pueblo.
      La ruta muere en [**Bích Động**](#bich-dong), «la gruta de jade»: una **pagoda en cueva** de tres niveles
      escalonados en la pared de la montaña, con el templete del medio metido en la boca de una
      gruta. Es gratis, se ve en tres cuartos de hora y es el tam giáo hecho arquitectura —la montaña
      ya era sagrada; el budismo se limitó a instalarse en ella—.
    window:
      label: Ventana óptima
      body: >-
        La bici se deja para **última hora**: a mediodía el calor de Ninh Bình —treinta y tantos
        grados con humedad— desaconseja pedalear, y es también cuando peor cae la luz. Al declinar la
        tarde el aire afloja y el sol se pone de oro sobre el arrozal; Bích Động, además, cierra el
        paseo mirando al poniente. La postal y el termómetro coinciden en la misma hora.
  - block: Noche
    time: "noche"
    title: La primera noche entre los picos
    body: >-
      Cena tranquila en el campo y poco más: el alojamiento de la zona —bungalós al borde del
      arrozal, con piscina asomada a los picos— invita a no moverse. Conviene, eso sí, recogerse
      pronto, porque mañana el despertador suena de madrugada.
    window:
      label: Por qué ahora
      body: >-
        Mañana el plan arranca a las **06:30 en Hang Múa**, subiendo escalones antes de que aprieten
        el sol y los autobuses. Esta noche —sin nada que coger todavía— es la que sobra para dormir de
        un tirón antes del único gran madrugón de Ninh Bình.
