title: Hanoi, y la noche de *Trung Thu*
dek: >-
  El día que el plan revisado regaló: Hanoi entera, sin un solo vuelo ni traslado. Los lagos del
  oeste al atardecer, el martini de Graham Greene donde se gestó su novela, y una noche —la más
  luminosa del año— entre farolillos en Hàng Mã.
blocks:
  - block: Mañana
    time: "sin prisas"
    title: Hanoi sin agenda
    body: >-
      Primer día del viaje sin nada que coger —ni vuelo, ni bus, ni tour—. La mañana es para lo que
      quedara pendiente: un cà phê trứng en un balcón sobre el lago **Hoàn Kiếm**, el casco viejo de los
      gremios, un museo si apetece. El plan viejo llenaba este viernes de aeropuerto; el revisado lo dejó
      en blanco a propósito.
    window:
      label: Por qué así
      body: >-
        Es el único hueco del viaje sin hora de salida. Todo lo demás se ha ganado su sitio a fuerza de
        logística; hoy no hay más ventana que perseguir que la de no perseguir ninguna. Guardar fuerzas,
        eso sí, para la noche.
  - block: Tarde
    time: "atardecer"
    title: El Lago del Oeste y el martini de Greene
    body: >-
      Circuito de tarde por el noroeste: la **pagoda Trấn Quốc**, la más antigua de Hanoi (unos 1.450
      años), con su estupa roja de once pisos sobre una península del **Lago del Oeste (Hồ Tây)**; y en
      el vecino lago **Trúc Bạch**, el **memorial de John McCain** —el relieve de 1985 que marca dónde
      cayó su A-4 Skyhawk en octubre de 1967, hoy casi un monumento a la reconciliación—. De ahí, a la
      puerta de al lado de vuestra propia historia colonial: un **martini "Graham Greene" en el Bamboo
      Bar del Metropole**, el hotel donde el escritor gestó *El americano impasible* en 1951. Y, si el
      cuerpo pide cena, phở cuốn en la isla de **Ngũ Xã**.
    window:
      label: Ventana óptima
      body: >-
        El Lago del Oeste es un atardecer, no un mediodía: la estupa de Trấn Quốc **contra el sol bajo**,
        los pescadores y las parejas en scooter mirando cómo se apaga la luz. Es el respiro perfecto —agua
        y horizonte— antes de zambullirse en el gentío de Hàng Mã al caer la noche.
  - block: Noche
    time: "noche"
    title: Trung Thu en Hàng Mã
    body: >-
      Y la culminación: la calle **Hàng Mã** en la noche de **Tết Trung Thu**, el Festival del Medio
      Otoño. La calle del papel votivo y la decoración festiva estalla una vez al año en farolillos de
      colores, cabezas de león, tambores y una marea de familias con niños. Se llega **a pie y con
      tiempo** —el casco viejo está al lado— para verla en plena ebullición, no de refilón. Es, sin
      discusión, la noche más fotogénica del año en Hanoi.
    window:
      label: Ventana óptima
      body: >-
        La noche del **25 de septiembre de 2026 cae exactamente en Trung Thu**: Hàng Mã no vuelve a
        arder así hasta dentro de un año. Y aquí está el porqué del plan revisado — en la versión vieja se
        volaba desde Siem Reap este mismo viernes y se llegaba pasadas las nueve, con prisa y con maletas.
        Ahora llegáis **andando y descansados**, con la noche entera por delante. Y mañana temprano, la
        misma calle decorada y vacía: la otra foto.
