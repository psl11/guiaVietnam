title: El índigo de *Lũng Tám*
dek: >-
  Un día más corto y más artesano: de Quản Bạ se baja a la aldea del lino de Lũng Tám, donde las
  mujeres hmong tejen el cáñamo y lo tiñen de índigo, y luego la carretera sube a Yên Minh entre
  bosques de pinos. La jornada dura llega mañana; hoy manda el telar.
blocks:
  - block: Mañana
    time: "mañana"
    title: La cooperativa de tejido de Lũng Tám
    body: >-
      Camino de Yên Minh se desvía al valle de **Lũng Tám**, donde una cooperativa de mujeres **hmong**
      mantiene vivo el ciclo entero del textil: cultivan el cáñamo, lo hilan, lo tejen y lo tiñen con
      **índigo (*chàm*)** en tinajas fermentadas, con ese batik por el que son célebres. De las piezas
      —del gris crudo del cáñamo al azul casi negro del índigo— se sale con algo en la mochila, comprado
      allí mismo a quien lo hace.
    window:
      label: Ventana óptima
      body: >-
        Lũng Tám **por la mañana**, que es cuando las mujeres tejen y la cooperativa está viva. Y aquí
        la regla fotográfica del loop se cumple sola: no se paga por un retrato ni se da dinero a los
        niños; la manera de «pagar» una foto es comprar el textil real de quien lo teje. En Lũng Tám
        eso se puede hacer de verdad.
  - block: Carretera
    time: "36–53 km"
    title: Subida a Yên Minh entre pinares
    body: >-
      De Lũng Tám a **Yên Minh** son pocas decenas de kilómetros, pero cambia el mundo: el karst pelado
      da paso a **bosques de pinos**, un verde inesperado en pleno altiplano. Los valles de Yên Minh
      guardan también bolsas de arroz que a mediados de septiembre viran ya al dorado. Se para donde la
      luz se cuela entre los troncos y se duerme en Yên Minh.
    window:
      label: Por qué así
      body: >-
        Etapa de nuevo contenida —el grueso del kilometraje duro es cosa de mañana, con Lũng Cú y el
        palacio del rey hmong—, así que la tarde se toma con calma. Los pinares son el descanso visual
        del loop: ni karst mineral ni terrazas, sino sombra y resina.
  - block: Noche
    time: "noche"
    title: Noche en Yên Minh
    body: >-
      Yên Minh es un pueblo tranquilo de paso, sin grandes monumentos: la parada lógica antes del día
      grande del loop. Cena de homestay, **mapas offline descargados** —en los tramos de montaña que
      vienen hay zonas sin cobertura— y a dormir con el pasaporte a mano para los controles del permiso
      fronterizo.
    window:
      label: Por qué ahora
      body: >-
        Mañana es la jornada más cargada: Sủng Là, el palacio de los Vương, el extremo norte de Lũng Cú
        y, al final, Đồng Văn. Conviene llegar descansado y con el depósito lleno —el de la moto y el de
        las baterías.
