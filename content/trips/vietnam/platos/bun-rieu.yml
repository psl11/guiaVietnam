queEs: >-
  Sopa norteña de fideos en **caldo agrio de tomate**, coronada por unos flanes esponjosos de
  **cangrejo de arrozal** (*cua đồng*), que se maja entero —con caparazón— y se cuela: el líquido hace
  el caldo, la pasta se cuaja en grumos (*riêu*) que flotan arriba. Lleva tofu frito, tomate, pasta de
  gamba (*mắm tôm*) y *bún*, con hierbas y flor de plátano. Variantes: *cua* (cangrejo), *ốc* (caracol),
  *cá* (pescado).
historia: >-
  Sopa humilde de diario, de puesto y de mercado. El **cangrejo de arrozal** es su alma, y el tomate
  con tamarindo le da ese punto ácido que la separa del *phở*.
dondeMejor: Hanoi — puestos de calle, de desayuno o mediodía
picante: Suave (la guindilla en pasta va aparte, al gusto)
veg: >-
  Sí, como **bún riêu chay**: el «cangrejo» se imita con tofu y seta, y el caldo se hace vegetal —
  pedidlo en un *quán chay*. El clásico **no** lo es (cangrejo, pasta de gamba, caldo de carne).
