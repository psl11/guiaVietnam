image:
  src: img/platos/bun-cha.webp
  alt: "Mesa de bún chả de Hanói: cuencos de cerdo a la brasa en caldo, fideos bún, hierbas frescas y nems fritos."
  credit: "Larry · CC BY-SA 2.0"
  creditUrl: "https://commons.wikimedia.org/wiki/File:B%C3%BAn_ch%E1%BA%A3_H%C3%A0ng_M%C3%A0nh.jpg"
queEs: >-
  El plato-emblema de Hanoi: pluma y albóndigas de cerdo **a la brasa sobre carbón**, servidas en un
  cuenco de caldo agridulce templado (vinagre, azúcar, salsa de pescado), con fideos de arroz (*bún*)
  y un plato de hierbas aparte. Se moja el fideo en el caldo.
historia: >-
  El escritor Vũ Bằng ya decía en 1959 que Hanoi estaba «hechizada por el bún chả». Saltó a la fama
  mundial en **mayo de 2016**, cuando **Obama y Anthony Bourdain** cenaron uno: la cuenta fue de 6
  dólares y la pagó Bourdain. Se come **solo a mediodía**, nunca de cena.
dondeMejor: Hanoi, a mediodía
picante: Suave (el chili va en el caldo, opcional)
veg: >-
  **No** en su forma clásica (cerdo a la brasa + salsa de pescado). No hay un «bún chả chay» de calle
  fiable; para algo parecido, fideos con tofu/seta a la brasa en un restaurante vegetariano.
