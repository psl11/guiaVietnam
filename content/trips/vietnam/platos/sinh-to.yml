image:
  src: img/platos/sinh-to.webp
  alt: "Sinh tố bơ: batido vietnamita de aguacate, espeso y de color verde pálido, servido con cuchara."
  credit: "Hoangkid · dominio público"
  creditUrl: "https://commons.wikimedia.org/wiki/File:Sinh_t%E1%BB%91_b%C6%A1.jpg"
queEs: >-
  El **batido de fruta** vietnamita: fruta fresca triturada con hielo y (casi siempre) leche condensada
  — mango, chirimoya y el favorito de culto, el ***sinh tố bơ*** (**aguacate**, espeso y dulce, tratado
  como fruta). A veces con yogur (*sữa chua*).
historia: >-
  La abundancia de **fruta tropical** más el lácteo francés dieron el hábito del batido; el de aguacate
  es el icono absoluto.
dondeMejor: Puestos de zumos y mercados, en todas partes
picante: "—"
veg: >-
  Vegetariano; para vegano, pedidlo **sin leche condensada ni yogur** (muchos puestos lo hacen solo con
  fruta y hielo).
