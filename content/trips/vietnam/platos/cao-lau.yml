title: Cao lầu
navLabel: "Cao lầu"
queEs: >-
  El fideo de **un solo pueblo**. Tallarines gruesos y correosos, color ámbar (parecen *udon*),
  salteados casi **sin caldo** con lonchas de cerdo estilo *char siu*, **picatostes** crujientes (cuadros
  de fideo frito), verduras y hierbas. Ni sopa ni fideo seco: algo intermedio, único.
historia: >-
  Se dice que **solo puede hacerse en Hội An**: el arroz se trata con **lejía de ceniza** de árboles de
  las **islas Cham** (*Cù Lao Chàm*) y con agua del antiguo **pozo Bá Lễ** — una química mineral, dicen,
  irreproducible en otra parte. En el viejo puerto comercial convergen el *udon* japonés, el *char siu*
  chino y el legado cham.
dondeMejor: Solo en Hội An (centro) — fuera de vuestra ruta del norte; razón para una escapada si alargáis el viaje
picante: Suave
veg: >-
  Existe **cao lầu chay** (tofu o seta en vez de cerdo) en los vegetarianos de Hội An; el fideo en sí es
  vegetal. El auténtico, eso sí, lleva cerdo.
