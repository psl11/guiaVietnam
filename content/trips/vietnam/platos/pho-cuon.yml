slug: pho-cuon
trip: vietnam
kind: plato
order: 6
title: Phở cuốn
navLabel: "Phở cuốn"
queEs: >-
  El *phở* «enrollado»: en vez de sopa, la **lámina fresca de fideo de arroz sin cortar** envuelve
  **ternera salteada**, lechuga y hierbas, y se moja en *nước chấm* agridulce. Un phở frío, de verano,
  que se come con las manos.
historia: >-
  Nació **hacia el año 2000 en Ngũ Xã** —una antigua aldea de fundidores de bronce junto al lago
  **Trúc Bạch**, en Hanoi— cuando una cocinera, viendo que con el calor nadie quería sopa caliente,
  enrolló el fideo con la carne. Hoy es especialidad reconocida por la **guía Michelin** (*Phở Cuốn
  Chinh Thắng*).
dondeMejor: Hanoi — el barrio de Ngũ Xã, junto a Trúc Bạch, su cuna
picante: Suave
veg: >-
  Posible como **phở cuốn chay** (tofu o seta en vez de ternera) en sitios vegetarianos, pero el
  clásico lleva ternera y salsa de pescado — pedid *«chay»* y *«không nước mắm»* (sin salsa de pescado).
