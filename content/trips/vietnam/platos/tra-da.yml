title: Trà đá
navLabel: "Trà đá"
queEs: >-
  El **té helado** de la calle: té verde flojo, pálido y levemente amargo, sobre hielo, que se sirve
  **gratis o casi** en las casas de comidas y en los puestos de acera con sus taburetes enanos. El
  lubricante social y el quitased de la vida callejera.
historia: >-
  Toda una **«economía del trà đá»**: los puestos de té de acera son focos informales de reunión y
  cotilleo, y muchas veces la jarra llega **de cortesía** con la comida.
dondeMejor: Cualquier puesto de acera o casa de comidas, en todas partes
picante: "—"
veg: >-
  Apto y vegano: té y hielo.
