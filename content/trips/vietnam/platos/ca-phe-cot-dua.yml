title: Cà phê cốt dừa (coconut coffee)
navLabel: "Coconut coffee"
queEs: >-
  El **café de coco**: un granizado-sorbete de **leche de coco** y leche condensada, coronado por un
  chorro de robusta fuerte. Más postre que café — un batido helado de cafeína que se come a cucharadas
  tanto como se bebe.
historia: >-
  Invento **reciente de Hanoi** (años 2010). La cadena **Cộng Cà Phê** —la de estética socialista
  *retro*, fundada en 2007— lo popularizó hasta convertirlo en su bebida estrella.
dondeMejor: Cafés de Hanoi (Cộng y compañía)
picante: "—"
veg: >-
  Vegetariano; suele llevar leche condensada (lácteo), así que **no siempre vegano** — pedid que sea
  solo de coco.
