title: Chả cá
navLabel: "Chả cá"
queEs: >-
  El pescado a la cúrcuma de Hanoi, la firma exclusiva del norte. Tacos de *cá lăng* (un siluro de río)
  marinados en **cúrcuma, galangal y arroz fermentado** (*mẻ*) que se terminan de freír **en la propia
  mesa**, en una sartén con una montaña de **eneldo** y cebolleta. Se come sobre *bún* con cacahuete,
  hierbas y *mắm tôm* (pasta de gamba).
historia: >-
  La familia **Đoàn** freía pescado para sus vecinos del casco viejo hasta que, en **1871**, abrió local
  en la calle 14 Hàng Sơn — hoy rebautizada **calle Chả Cá**. *«Lã Vọng»* es la estatua del sabio
  pescador que presidía el comedor. El restaurante original sigue abierto y **solo sirve este plato**.
dondeMejor: Hanoi — los locales históricos de la calle Chả Cá. Es plato de restaurante, no de calle
picante: Suave
veg: >-
  **No**: es pescado rematado con pasta de gamba. No hay *chả cá chay* fiable de calle; un *quán chay*
  podría versionarlo con seta o tofu a la cúrcuma, pero es raro.
