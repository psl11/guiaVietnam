queEs: >-
  La baguette colonial *vietnamizada* en el mejor bocadillo del mundo. Un pan de corteza fina y
  crujiente y miga aireada (lleva harina de arroz), abierto y relleno de **paté**, mayonesa, embutidos
  (*chả lụa*), **encurtido de zanahoria y daikon** (*đồ chua*), pepino, cilantro, chili y un chorro de
  salsa de soja o Maggi. Frío, caliente, crujiente y ácido a la vez.
historia: >-
  La baguette llegó con los franceses a la Cochinchina a mediados del s. XIX; pan de ricos hasta que se
  abarató. El **bocadillo tal cual lo conocemos nació en Saigón hacia 1958** (se atribuye a la familia
  Lê, en *Hòa Mã*). En 2009 **Anthony Bourdain** coronó el de *Bánh Mì Phượng* en Hội An como *«una
  sinfonía en un sándwich»* — y lo lanzó al mundo.
dondeMejor: En todas partes; el templo es Hội An (Phượng, Madam Khánh), pero en Hanoi los carritos de desayuno son excelentes
picante: Suave (el chili es opcional)
veg: >-
  Sí, como **bánh mì chay**: relleno de tofu, seta y paté de soja — pedidlo *«chay»*. Ojo: el paté,
  la mayonesa y los embutidos del clásico **no** lo son. Alternativa fácil: *bánh mì trứng* (con huevo)
  o solo con tofu y encurtidos.
