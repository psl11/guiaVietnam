title: Bún bò Huế
navLabel: "Bún bò Huế"
image:
  src: img/platos/bun-bo-hue.webp
  alt: "Bún bò Huế: cuenco de caldo rojizo picante con lonchas de ternera, rodajas de chả, cebolla y cilantro."
  credit: "TarnishedPath · CC BY-SA 4.0"
  creditUrl: "https://commons.wikimedia.org/wiki/File:B%C3%BAn_b%C3%B2_Hu%E1%BA%BF-Feb_2025.jpg"
queEs: >-
  La sopa **picante** de ternera y cerdo de Huế. Fideos de arroz **redondos y gruesos** en un caldo
  cocido con huesos de res y cerdo, perfumado de **citronela**, teñido de rojo con aceite de achiote y
  ahondado con **pasta de gamba fermentada** (*mắm ruốc*); encima, jarrete de ternera, codillo de cerdo,
  cubos de sangre cuajada y guindilla. Más audaz y **mucho más picante** que el *phở*.
historia: >-
  De **Huế**, la antigua capital imperial (señores Nguyễn, s. XVI-XVII), con fama de raíces en las
  **cocinas de palacio**. En **junio de 2025** fue declarada **Patrimonio Cultural Inmaterial** de
  Vietnam.
dondeMejor: Huế (centro); también hay buenas versiones en Hanoi y Saigón
picante: Alto (la citronela y la guindilla son su seña)
veg: >-
  Existe **bún bò Huế chay**: caldo vegetal con citronela y guindilla, tofu y seta — se encuentra en
  *quán chay*. El clásico es rotundamente **no apto** (pasta de gamba, huesos, sangre).
