queEs: >-
  **Zumo de caña de azúcar** prensado al momento: los tallos —a menudo con un **kumquat** (*tắc*) para el
  punto cítrico— pasan por el rodillo de la prensa y el jugo cae sobre hielo. Verde pálido, dulce a
  hierba, de un refrescante brutal con el calor.
historia: >-
  La prensa de caña de carretera es ubicua; el toque vietnamita es el **kumquat** exprimido junto a la
  caña, que le quita el empalago.
dondeMejor: Prensas de calle, en cualquier parte
picante: "—"
veg: >-
  Apto y vegano: caña y hielo.
