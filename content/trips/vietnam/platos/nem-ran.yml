title: Nem rán
navLabel: "Nem rán"
queEs: >-
  El **rollito frito** del norte (en el sur lo llaman *chả giò*): paquetitos de papel de arroz rellenos
  de cerdo picado, **cangrejo o gamba**, fideo de cristal, oreja de madera, zanahoria y huevo, fritos
  hasta quedar ampollados y crujientes. Se mojan en *nước chấm* y se comen envueltos en lechuga y
  hierbas. La pieza central de la mesa del **Tết**.
historia: >-
  Comida de fiesta y celebración. En el norte es *nem rán*; en el sur, *chả giò* — la misma idea, dos
  nombres. Y son los *nem* que acompañan a un buen *bún chả*.
dondeMejor: En toda Vietnam; de fiesta y en los sets de bún chả
picante: Suave
veg: >-
  Sí, como **nem chay** (o *nem rau*): relleno de tofu, fideo de cristal, seta y taro o zanahoria — muy
  común en los *quán chay*. Pedid *«nem chay»*.
