  src: img/platos/xoi.webp
  alt: "Xôi ngũ sắc: arroz glutinoso de cinco colores (morado, rojo, amarillo, blanco y naranja) sobre hoja de plátano."
  credit: "Khương Việt Hà · dominio público"
  creditUrl: "https://commons.wikimedia.org/wiki/File:X%C3%B4i_ng%C5%A9_s%E1%BA%AFc.JPG"
queEs: >-
  El **arroz glutinoso** cocido al vapor, el desayuno que se lleva en la mano. En versión salada, el rey
  es el ***xôi xéo***: teñido de amarillo con cúrcuma, con puré de **judía mung**, una lluvia de
  **chalota frita crujiente** y un unto de grasa. También *xôi gà/thịt* (pollo/cerdo). En dulce,
  *xôi gấc* (rojo, de fiesta), *xôi ngô* (maíz) o el *xôi ngũ sắc* de cinco colores de las minorías del
  norte. Se vende de cestas, envuelto en hoja de plátano.
historia: >-
  Comida ritual y de diario a la vez: el rojo del **xôi gấc** simboliza la suerte en bodas y en el Tết,
  y el *xôi xéo* es el icono callejero de las mañanas de Hanoi.
dondeMejor: Hanoi — los carritos de primera hora
picante: "—"
veg: >-
  Sí, y muy fácil: la base del *xôi xéo* (arroz, judía mung, chalota frita) es **vegetal**, igual que los
  dulces. Basta pedirlo sin el *topping* de carne o *floss* — decid *«xôi chay»* o simplemente el
  básico.
