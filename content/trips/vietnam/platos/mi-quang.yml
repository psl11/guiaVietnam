title: Mì Quảng
navLabel: "Mì Quảng"
queEs: >-
  El fideo a la cúrcuma del centro. Tallarines de arroz anchos, teñidos de **dorado con cúrcuma**,
  **vestidos —no ahogados—** en apenas un cazo de caldo intenso que los baña en vez de cubrirlos; encima,
  gamba, cerdo o pollo (o huevo), **cacahuete tostado**, hierbas y un trozo de **galleta de sésamo**
  (*bánh tráng*) que se rompe dentro. Entre la sopa y el fideo seco.
historia: >-
  De la provincia de **Quảng Nam** (región de Đà Nẵng y Hội An), es la comida de diario, de casa y de
  mercado del centro. Reconocido **Patrimonio Cultural Inmaterial** nacional.
dondeMejor: Đà Nẵng y Quảng Nam (centro); también se encuentra en Hanoi
picante: Medio (la guindilla, al gusto)
veg: >-
  **Mì Quảng chay** es habitual en el centro (tofu y seta, sin gamba ni huevo) — pedidlo *«chay»*. El
  fideo, el cacahuete y las hierbas ya son vegetales.
