image:
  src: img/platos/banh-cuon.webp
  alt: "Bánh cuốn: rollos de lámina de arroz al vapor con chalota frita y albahaca, junto a un cuenco de nước chấm."
  credit: "Casablanca1911 · dominio público"
  creditUrl: "https://commons.wikimedia.org/wiki/File:B%C3%A1nh_cu%E1%BB%91n_Thanh_Tr%C3%AC.jpg"
queEs: >-
  Crepes sedosas de **masa de arroz al vapor**, finísimas, enrolladas en torno a carne de cerdo picada,
  **oreja de madera** (seta) y chalota, cubiertas de chalota frita crujiente y servidas con *chả*
  (embutido) y *nước chấm* tibio. Se hacen al momento, vertiendo la masa sobre un tambor de tela tensada
  al vapor — un espectáculo.
historia: >-
  La aldea de **Thanh Trì** (Hanoi) es la cuna de la versión más pura, sin relleno. Un desayuno
  norteño por excelencia.
dondeMejor: Hanoi — estilo Thanh Trì, de desayuno
picante: Suave
veg: >-
  Existe **bánh cuốn chay** (relleno solo de seta, o la lámina lisa de Thanh Trì), pero la salsa de mojar
  lleva pescado — pedid *«không nước mắm»*. En un *quán chay* se resuelve sin problema.
