<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8432e"/>
      <stop offset="1" stop-color="#7d2d20"/>
    </linearGradient>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg   { fill: #15171a; }
        .ring { stroke: #c9a768; }
        .glyph{ fill: #e7e2d6; }
      }
    </style>
  </defs>

  <!-- Fondo (cinabrio de laca) -->
  <rect class="bg" width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Anillo dorado -->
  <circle class="ring" cx="32" cy="32" r="26.5" fill="none" stroke="#c6a25f" stroke-width="1.4" opacity="0.85"/>

  <!-- "V" de Vietnam -->
  <text class="glyph" x="32" y="46" font-family="Georgia, 'Times New Roman', Times, serif"
        font-size="40" font-weight="700" text-anchor="middle" fill="#ece7db">V</text>
</svg>
