<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0" stop-color="#a44a4a"/>
      <stop offset="0.6" stop-color="#8b3a3a"/>
      <stop offset="1" stop-color="#6f2e2e"/>
    </radialGradient>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg    { fill: #221d18; }
        .ring  { stroke: #d4b88a; }
        .ring2 { stroke: #d4b88a; }
        .gold  { fill: #d4b88a; }
        .glyph { fill: #e8dfd0; }
      }
    </style>
  </defs>

  <!-- Fondo -->
  <rect class="bg" width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Doble anillo dorado -->
  <circle class="ring"  cx="90" cy="90" r="76" fill="none" stroke="#c4a373" stroke-width="3"/>
  <circle class="ring2" cx="90" cy="90" r="69" fill="none" stroke="#c4a373" stroke-width="1.2" opacity="0.65"/>

  <!-- Estrella superior -->
  <text class="gold" x="90" y="48" font-family="Georgia, 'Times New Roman', serif"
        font-size="20" text-anchor="middle" fill="#c4a373">&#10022;</text>

  <!-- "R" de Roma -->
  <text class="glyph" x="90" y="124" font-family="Georgia, 'Times New Roman', Times, serif"
        font-size="104" font-weight="700" text-anchor="middle" fill="#f5f0e8">R</text>

  <!-- Wordmark inferior -->
  <text class="gold" x="90" y="150" font-family="Georgia, 'Times New Roman', serif"
        font-size="13" letter-spacing="5" text-anchor="middle" fill="#c4a373">ROMA</text>
</svg>
