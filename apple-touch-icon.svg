<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0" stop-color="#b04a32"/>
      <stop offset="0.6" stop-color="#9c3a2a"/>
      <stop offset="1" stop-color="#722a1e"/>
    </radialGradient>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg    { fill: #15171a; }
        .ring  { stroke: #c9a768; }
        .ring2 { stroke: #c9a768; }
        .gold  { fill: #c9a768; }
        .glyph { fill: #e7e2d6; }
      }
    </style>
  </defs>

  <!-- Fondo (cinabrio de laca) -->
  <rect class="bg" width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Doble anillo dorado -->
  <circle class="ring"  cx="90" cy="90" r="76" fill="none" stroke="#c6a25f" stroke-width="3"/>
  <circle class="ring2" cx="90" cy="90" r="69" fill="none" stroke="#c6a25f" stroke-width="1.2" opacity="0.65"/>

  <!-- Estrella superior -->
  <text class="gold" x="90" y="48" font-family="Georgia, 'Times New Roman', serif"
        font-size="20" text-anchor="middle" fill="#c6a25f">&#10022;</text>

  <!-- "V" de Vietnam -->
  <text class="glyph" x="90" y="124" font-family="Georgia, 'Times New Roman', Times, serif"
        font-size="104" font-weight="700" text-anchor="middle" fill="#ece7db">V</text>

  <!-- Wordmark inferior -->
  <text class="gold" x="90" y="150" font-family="Georgia, 'Times New Roman', serif"
        font-size="13" letter-spacing="5" text-anchor="middle" fill="#c6a25f">VIETNAM</text>
</svg>
